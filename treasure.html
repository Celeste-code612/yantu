<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>科研工作台 | 科研宝藏库</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ── 与科研工作台完全一致的风格 ── */
        :root {
            --primary: #2D5A7B;
            --primary-light: #4A7A9B;
            --primary-dark: #1E4060;
            --secondary: #E8F0F5;
            --accent: #E07B54;
            --success: #5B9A6B;
            --warning: #D4A84B;
            --danger: #C75B5B;
            --text-primary: #2C3E50;
            --text-secondary: #6B7C8A;
            --text-muted: #9CA3AF;
            --bg-main: #F8FAFC;
            --bg-card: #FFFFFF;
            --bg-sidebar: #FFFFFF;
            --border: #E2E8F0;
            --border-light: #F1F5F9;
            --shadow-sm: 0 1px 3px rgba(45, 90, 123, 0.04);
            --shadow-md: 0 2px 8px rgba(45, 90, 123, 0.06);
            --shadow-lg: 0 4px 16px rgba(45, 90, 123, 0.08);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --mono: 'JetBrains Mono', monospace;
            --serif: 'Noto Serif SC', serif;
            --sans: 'Noto Sans SC', 'PingFang SC', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-main); color: var(--text-primary); font-family: var(--sans); overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::selection { background: var(--primary); color: white; }

        .navbar {
            position: fixed; top: 0; left: 0; right: 0; height: 64px;
            background: var(--bg-card); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 28px; z-index: 1000;
            box-shadow: var(--shadow-sm);
        }
        .navbar-logo {
            display: flex; align-items: center; gap: 10px;
            font-family: var(--serif); font-size: 20px; font-weight: 600;
            color: var(--primary); text-decoration: none;
        }
        .navbar-logo svg { width: 30px; height: 30px; stroke: currentColor; stroke-width: 1.5; fill: none; }
        .navbar-nav { display: flex; gap: 6px; margin-left: 40px; }
        .nav-link {
            padding: 8px 18px; font-size: 14px; font-weight: 500;
            color: var(--text-secondary); border-radius: 30px;
            cursor: pointer; transition: var(--transition); text-decoration: none;
        }
        .nav-link:hover { background: var(--secondary); color: var(--primary); }
        .nav-link.active { background: var(--primary); color: white; }
        .nav-search { margin-left: auto; margin-right: 12px; position: relative; }
        .nav-search input {
            background: var(--bg-main); border: 1px solid var(--border);
            padding: 8px 12px 8px 34px; border-radius: 30px; font-size: 13px;
            width: 220px; transition: var(--transition); outline: none;
        }
        .nav-search input:focus { width: 260px; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(45,90,123,0.1); }
        .nav-search svg {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            width: 14px; height: 14px; color: var(--text-muted);
        }
        /* 主布局 */
        .shell { padding-top: 64px; display: flex; min-height: calc(100vh - 64px); }
        /* 左侧分类面板 */
        .sidebar {
            position: sticky; top: 64px; width: 260px; flex-shrink: 0;
            height: calc(100vh - 64px); overflow-y: auto;
            background: var(--bg-card); border-right: 1px solid var(--border);
            padding: 24px 20px;
        }
        .filter-section { margin-bottom: 28px; }
        .filter-title {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; color: var(--text-muted); margin-bottom: 12px;
        }
        .filter-options { display: flex; flex-direction: column; gap: 4px; }
        .f-opt {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 12px; border-radius: var(--radius-md);
            font-size: 13px; color: var(--text-secondary);
            cursor: pointer; transition: var(--transition);
        }
        .f-opt:hover { background: var(--secondary); color: var(--primary); }
        .f-opt.active { background: var(--secondary); color: var(--primary); font-weight: 500; }
        .f-opt-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
        .f-opt.active .f-opt-dot { background: var(--primary); }
        .f-opt-handle {
            font-size: 12px; color: var(--text-muted); cursor: grab;
            margin-left: auto; flex-shrink: 0; user-select: none;
            opacity: 0; transition: opacity 0.15s;
        }
        .f-opt:hover .f-opt-handle { opacity: 1; }
        .f-opt.dragging { opacity: 0.4; background: var(--secondary); }
        .f-opt.drag-over { border: 2px dashed var(--primary); }

        /* 主内容区 */
        .main { flex: 1; overflow: hidden; padding: 0 28px 40px 28px; }
        /* 英雄区域 */
        .hero {
            background: var(--bg-card); border-radius: var(--radius-lg);
            padding: 24px 32px; margin: 24px 0 28px 0;
            display: flex; align-items: center; gap: 24px;
            border: 1px solid var(--border-light); box-shadow: var(--shadow-sm);
        }
        .hero-icon { width: 100px; height: 100px; object-fit: contain; flex-shrink: 0; }
        .hero-text { flex: 1; }
        .hero-title { font-family: var(--serif); font-size: 28px; font-weight: 700; color: var(--text-primary); }
        .hero-sub { font-size: 13px; color: var(--text-secondary); margin-top: 6px; line-height: 1.5; }
        .hero-stats { display: flex; gap: 28px; margin-top: 14px; }
        .stat-item { text-align: center; }
        .stat-num { font-family: var(--mono); font-size: 26px; font-weight: 600; color: var(--primary); line-height: 1; }
        .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        /* 工具栏 */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
            background: var(--bg-card); padding: 14px 20px; border-radius: var(--radius-lg); border: 1px solid var(--border-light); }

        /* 卡片网格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }
        /* 工具卡片 - 与竞赛卡片风格统一 */
        .tool-card {
            background: var(--bg-card); border-radius: var(--radius-lg);
            border: 1px solid var(--border-light); transition: var(--transition);
            overflow: hidden; animation: fadeInUp 0.3s ease;
            display: flex; flex-direction: column;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .tool-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--border); }
        .urgency-bar { height: 4px; width: 100%; }
        .urgency-blue { background: linear-gradient(90deg, var(--primary-light), #60a5fa); }
        .urgency-green { background: linear-gradient(90deg, #22c55e, #4ade80); }
        .urgency-orange { background: linear-gradient(90deg, #f97316, #fb923c); }
        .urgency-purple { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
        .urgency-teal { background: linear-gradient(90deg, #14b8a6, #2dd4bf); }
        .urgency-pink { background: linear-gradient(90deg, #ec4899, #f472b6); }
        .card-inner { padding: 18px 20px; display: flex; flex-direction: column; flex: 1; }
        .card-header {
            padding: 16px 20px; background: linear-gradient(135deg, #EDF2F8 0%, #FFFFFF 100%);
            border-bottom: 1px solid var(--border-light);
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .card-header-left { flex: 1; }
        .card-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
        .badge {
            font-size: 11px; font-weight: 600; padding: 3px 10px;
            border-radius: 30px; background: var(--secondary); color: var(--primary);
        }
        .tool-name { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
        .tool-brief {
            font-size: 13px; color: var(--text-secondary); line-height: 1.55;
        }
        .card-body { padding: 16px 20px; flex: 1; display: flex; flex-direction: column; }
        .tool-functions {
            font-size: 13px; color: var(--text-secondary);
            background: #f8fafc; padding: 16px 18px;
            border-radius: var(--radius-md); margin-bottom: 12px;
            line-height: 1.5; white-space: pre-wrap; word-break: break-word;
            max-height: 220px; overflow-y: auto;
            font-family: var(--sans);
            border: 1px solid #e2e8f0;
        }
        /* 功能描述格式化排版 - 一级标题加粗突出 */
        .tool-functions strong {
            color: #1e40af; font-size: 14px; font-weight: 700;
            display: block; padding-top: 5px; margin-top: 4px; margin-bottom: 1px;
            line-height: 1.5; letter-spacing: 0.5px;
        }
        .tool-functions strong:first-child { padding-top: 0; margin-top: 0; }
        .tool-functions br {
            line-height: 0.6;
        }
        .func-section-break {
            display: block; height: 0; margin: 6px 0;
            border-bottom: 1px dashed #e2e8f0;
        }
        .func-sub-item {
            display: block; padding-left: 24px; margin: 0; line-height: 1.3;
            position: relative; text-indent: 0;
        }
        .func-sub-item::before {
            content: '•'; position: absolute; left: 8px; top: 0;
            color: var(--accent); font-weight: 700; font-size: 14px;
        }
        .func-sub-item + br {
            display: none;
        }
         .tool-functions strong + br {
        display: none;
        }
        .func-text {
            display: block; line-height: 1.7;
        }
        .func-paragraph {
            display: block; text-indent: 2em; margin: 6px 0; line-height: 1.7;
        }
        .tool-functions .highlight {
            background: #fef3c7; color: #d97706; padding: 2px 6px;
            border-radius: 3px; font-weight: 600;
        }
        .tool-functions .code {
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            background: #1e293b; color: #e2e8f0;
            padding: 4px 8px; border-radius: 4px;
            font-size: 12px;
        }
        @media (max-width: 768px) {
            .tool-functions {
                padding: 12px 14px; font-size: 12px;
                line-height: 1.8;
            }
            .func-sub-item {
                padding-left: 20px;
            }
            .func-sub-item::before {
                left: 6px;
            }
        }
        .tool-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
        .tag {
            padding: 3px 10px; border-radius: 20px; font-size: 11px;
            background: var(--secondary); color: var(--primary); font-weight: 500;
            border: 1px solid transparent; transition: var(--transition);
        }
        .tag:hover { background: #dbeafe; }
        .tool-link { font-size: 12px; word-break: break-all; margin-top: auto; }
        .tool-link a { color: var(--primary); text-decoration: none; transition: var(--transition); }
        .tool-link a:hover { color: var(--primary-dark); text-decoration: underline; }
        .card-footer {
            padding: 12px 20px 16px; border-top: 1px solid var(--border-light);
            display: flex; justify-content: flex-end;
        }
        .btn-detail {
            background: var(--primary); border: 1px solid var(--primary);
            padding: 7px 18px; border-radius: 20px; font-size: 12px;
            cursor: pointer; color: #fff; transition: var(--transition);
        }
        .btn-detail:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
        .fav-btn {
            background: transparent; border: none; cursor: pointer; color: var(--text-muted);
            transition: var(--transition); font-size: 0; width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
        }
        .fav-btn::after { font-size: 20px; content: "☆"; color: var(--text-muted); }
        .fav-btn.on::after { content: "★"; color: #f59e0b; }
        .fav-btn:hover::after { color: #f59e0b; }
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 10px 24px;
            border-radius: 40px; font-size: 13px; z-index: 2000;
            opacity: 0; transition: 0.2s ease; pointer-events: none;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; }
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
        .page-btn { padding: 8px 14px; border: 1px solid var(--border); background: white; border-radius: var(--radius-md); cursor: pointer; font-size: 13px; transition: var(--transition); }
        .page-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }

        /* 弹窗样式 - 与竞赛页一致 */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.45);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
            animation: fadeIn 0.2s ease; visibility: hidden; opacity: 0; transition: 0.2s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal {
            background: var(--bg-card); border-radius: var(--radius-lg);
            width: 90%; max-width: 680px; max-height: 85vh;
            overflow-y: auto; padding: 28px 32px;
            box-shadow: var(--shadow-lg);
        }
        .modal h3 { font-family: var(--serif); font-size: 19px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
        .modal p, .modal span, .modal a { font-family: var(--sans); font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
        .modal strong { font-weight: 600; color: var(--text-primary); }
        .modal .func-sub-item {
            display: block; padding-left: 20px; margin: 0 0 2px; line-height: 1;
            position: relative;
        }
        .modal .func-sub-item::before {
            content: '•'; position: absolute; left: 6px; top: 0;
            color: var(--accent); font-weight: bold;
        }
        .modal-close {
            float: right; cursor: pointer; font-size: 24px; color: var(--text-muted);
            width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
        }
        .modal-close:hover { background: var(--secondary); color: var(--text-primary); }
        @media (max-width: 768px) { .sidebar, .navbar-nav, .nav-search { display: none; } .main { padding: 0 16px 28px; } }
    </style>
</head>

<script>
// ======================= 中文文献检索完整数据 =======================
// 基于用户提供的表格，完整收录中文文献检索类别所有工具（从中国知网到Open Access Library）
const toolsData = [
    { category: "中文文献检索", name: "中国知网（CNKI）", brief: "全球最大的中文学术电子资源平台，收录期刊、学位论文、会议论文、报纸、年鉴、专利、标准等，覆盖所有学科，数据更新较快。", functions: "1.文献检索\n①一框式快速检索、高级检索（可组合多个条件）\n②检索结果可按主题、学科、作者、机构分组，按被引、下载、时间等排序\n③“知网节”功能链接相关文献、作者、机构，形成知识网络\n2.查重查AI率\n①2022年起对个人开放，1.5元/千字\n②查重报告通常10-30分钟内完成，高峰期可能稍有延迟\n3.数据分析\n①引文数据库：看某篇论文被哪些论文引用\n②经济社会大数据平台：统计年鉴、行业数据\n③学术精要：提供高被引论文评价报告\n4.AI工具（CNKI AI）\n①知识问答\n②文献智能研读\n③辅助写作", url: "https://www.cnki.net/", tags: "中文文献" },
    { category: "中文文献检索", name: "万方数据知识服务平台", brief: "国内最大的中文学术资源平台之一，医学、工程技术、计算机科学领域资源丰富，学位论文收录量大。", functions: "1.文献检索\n①一框式快速检索、高级检索（可组合多个条件）\n②检索结果可按学科、年份、作者、机构、基金分组，按相关度、被引、出版时间排序\n③“知识脉络”可分析关键词在不同年份的研究热度趋势\n2.查重查AI率（万方检测）\n①面向个人开放，支持学术论文、学位论文、科研成果等文本查重， 3元/千字\n②可自建个人比对库，查重报告通常几分钟内完成\n3.数据分析\n①引用统计：可查看单篇论文的总被引频次和参考文献\n②期刊评价：提供期刊影响因子、核心收录情况（基于中国科技期刊引证报告）\n③学者成果库：学者可认领成果，查看个人发文量和被引情况\n4.AI工具\n①万方选题：基于大数据和AI算法，分析学科热点，推荐选题方向\n②万方分析：支持机构、学科、作者的多维度科研绩效分析\n③智能投稿：根据论文关键词和摘要，推荐匹配的学术期刊", url: "https://www.wanfangdata.com.cn/", tags: "中文文献" },
    { category: "中文文献检索", name: "维普网", brief: "以《中文科技期刊数据库》为核心，涵盖期刊、学位论文、会议论文、报纸、专利及外文期刊等十类文献资源。", functions: "1.文献检索\n①一框式快速检索、高级检索（可组合题名、关键词、作者、机构等）\n②检索结果可按年份、学科、期刊、作者分组，按时间、被引量排序\n③“文献细览”可查看参考文献与引证文献，支持自动聚类\n2.查重（维普论文检测系统）\n①面向个人及机构开放，采用MTE技术，比对库涵盖期刊、学位、会议等\n②提供详细检测报告，支持批量检测，价格约3元/千字\n3.数据分析\n①期刊评价：提供《中国科技期刊引证报告》核心期刊指标\n②学科分析：基于大数据的学科热点趋势和机构科研产出对比\n4.AI工具（维普智能服务）\n①智能选题：基于海量文献推荐研究热点和前沿方向\n②调研综述：一键生成论文综述，辅助快速了解研究现状\n③科研对话：基于相关文献，回答有依据\n④文库管理：创建私有文献库，支持手动上传、外部导入\n⑤投稿选刊：利用大数据智能匹配并推荐合适的投稿期刊", url: "https://www.cqvip.com/", tags: "中文文献" },
    { category: "中文文献检索", name: "超星数字图书馆", brief: "拥有数百万册电子图书、13亿余页全文及16万集学术视频，通过读秀、超星发现提供知识服务。", functions: "1.文献检索\n①统一检索与知识挖掘：通过“读秀”及“超星发现”实现中文图书全文检索、知识点检索和一站式跨库检索；发现系统基于近10亿条元数据分析学术趋势、可视化知识关联\n②分面搜索与结果排序：采用分面搜索技术，用户可根据需要对检索结果进行任意维度的组配、精炼检索和自由扩检，结果可按相关性、学术性、时效性和可获得性等需求多角度展示\n③多渠道深度阅读与下载：需使用超星阅览器（SSReader）进行下载和全文阅读，同时支持移动端、在线及文本格式的阅读方式\n2.查重查AI率（大雅相似度分析）\n①基于独特的中文图书全文优势进行相似度比较\n②支持AIGC（AI生成内容）检测\n③超星账号通常可获5次免费检测机会，检测对象为学位论文、拟发表论文等\n3.数据分析（超星发现系统）\n①引文分析与知识关联分析：完整揭示图书、期刊、学位等不同文献类型之间的引证关系，并可构建可视化的知识关联图谱，帮助发现跨学科研究和核心作者\n②学术趋势分析：支持单一或同类主题的学术产出对比与生长趋势分析，帮助把握研究起点、热点与兴衰\n4. AI工具\n①智能文献服务与个性化推荐：支持24小时智能问答、个性化推荐和辅助阅读\n②AI深度研究与写作支持：AI检索可梳理文献脉络并撰写综述\n③跨语言学术阅读与机器阅读：提供超星翻译（双语阅读）及机器阅读（快速归纳知识点）功能\n④智能文献传递：AI赋能百链，提供更精准智能的稀缺文献传递", url: "https://www.chaoxing.com/", tags: "中文文献" },
    { category: "中文文献检索", name: "PubScholar公益学术平台", brief: "中国科学院联合多家单位打造的免费学术资源服务系统，提供海量OA资源。", functions: "1.资源规模：目前平台可检索的元数据资源量约1.9亿条，包括科技论文元数据约1亿条，科技专利元数据约9,120万条，科学数据元数据约58万条。可免费获取的全文资源量约8,623万篇，包括科技论文全文数据约2,595万篇，专利全文数据约6,028万篇。\n2.AI文献服务（平台核心特色功能）\n①AI增强检索：融合AI大模型的智能检索系统，帮助精准定位所需文献\n②智能综述：以自然语言对话形式，基于海量文献自动生成研究领域的综述报告\n③文献精读：利用AI大模型快速捕捉文献核心要点，提升阅读效率\n④集成翻译引擎：集成科大讯飞翻译引擎，支持中英互译\n3.学术服务\n①科技头条：根据WOS学科分类，遴选学科领域内的高质量期刊，由AI大模型辅助生成领域每日重要科技动态，通过个人订阅实现个性化推送，方便用户及时获取前沿进展\n②个人学术成果管理（学术名片） ：自动汇聚学者的学术成果，支持高效认领与个性化管理，提供智能统计功能，方便用户在线维护个人学术成果库并开放共享\n③科研社区交流：支持科研团体构建本领域的学术交流社区，提供学术热点讨论、垂直问答、期刊约稿等特色功能\n④预印本同行评审：支持科研团体基于预印本论文开展同行评审，营造开放、透明、公正的学术交流生态\n4.文献检索发现\n①提供集成检索发现功能，可按学科、文献类型等多维度筛选检索结果，并可对可获取全文的资源进行多途径导航\n②引证关系分析：直观展示论文的学术影响力\n③支持一键导出BibTeX、EndNote等引用格式，提升文献管理效率", url: "https://pubscholar.cn/", tags: "中文文献" },
    { category: "中文文献检索", name: "NSTL国家科技图书文献中心", brief: "国家科技图书文献中心，面向全国提供公益科技文献信息服务。", functions: "1.资源规模：外文印本文献年度发订品种约2.4万种，其中外文期刊约1.5万种，外文会议录等文献约9000种；面向全国开通网络版外文现刊400余种，回溯期刊3589种，OA学术期刊14000余种等\n2.文献检索\n①提供中外文期刊、会议录、学位论文、科技报告、专利、标准、计量规程等类型的文献检索\n②非注册用户可免费浏览题录、文摘等信息，检索为开放服务\n③注册用户可获取更详细的题录信息，并对关注文献请求全文\n3.文献传递（核心免费服务）\n①2025年11月1日起，NSTL网络服务系统开展的全文传递服务对所有用户全面停止收费\n②可在线检索并免费下载中外文期刊论文、会议录、学位论文、科技报告等文献资源\n③提供覆盖全国的“1+9+N”文献信息服务体系，面向全国提供普惠的科技文献信息服务\n4.AI助手\n①多篇文献对比分析智能体\n②深度研究智能体\n③学术图片解读智能体", url: "https://www.nstl.gov.cn/", tags: "中文文献" },
    { category: "中文文献检索", name: "中国科技论文在线", brief: "教育部主办，国内首家官方在线发表科技论文的公益性平台，独创“先发布，后评审”机制。", functions: "1.文献检索\n①平台收录近千家科技期刊、逾130万篇各领域科技论文全文，均支持免费下载\n②支持按标题、作者等字段进行检索，用户可根据需要在“首发论文库”等多个资源库中进行检索\n2.论文首发与评议（核心机制）\n① “先发布，后评审”：作者自愿投稿，论文经初审后最快可在7个工作日内在线首发\n② 发布后，作者可自愿选择请同行专家对论文进行评价，其评价意见会及时公布在网站中\n③其网上发表的论文已被全国多所高校认可，可用于毕业或职称评定\n3.特色期刊：《中国科技论文在线精品论文》：该电子期刊从平台发布的优秀科技论文中精选而出，秉持开放获取理念，主要报道自然科学领域的最新研究成果\n4.学者服务与个性功能\n①注册用户分为两类：简易注册用户可使用除投稿首发论文以外的所有功能，包括投稿、评论、定制、添加私人标签、收藏资讯、加入学术群组等个性化功能；完善个人信息后可获得首发论文投稿权限\n②非注册用户只能以访客身份，进行部分检索、浏览和下载", url: "https://paper.edu.cn/", tags: "中文文献" },
    { category: "中文文献检索", name: "中国科学院文献情报中心", brief: "ScienceChina集成CSCD引文库，提供查收查引与AI星火助手。", functions: "1.文献检索\n①中国科学引文数据库（CSCD）：收录我国数学、物理、化学、天文学、地学、生物学等千余种科技核心期刊，提供引文索引功能，可迅速查询某篇科技文献被引用的详细情况\n②中国科学院学位论文库：收录自1983年以来中国科学院授予的博士、硕士学位论文及博士后出站报告，涵盖数学、物理、化学、地球科学、生物科学等学科领域\n③文献传递服务：通过dds.las.ac.cn系统为中科院内及企业研究人员提供期刊、图书章节、会议文献、科技报告等全文查询和传递服务\n2.查收查引与情报查证\n①权威查新资质：文献中心1994年被原国家科委批准为一级科技查新咨询单位，出具的查新报告在各级别的成果鉴定和开题立项中均具有权威性\n②收录引证检索：通过SCI、SSCI、EI、ESI、CSCD等国内外评价类数据库，查询个人或团队的代表性论著收录和引用情况，为职称评定、项目申报、人才评价等提供第三方检索报告\n③专题与委托服务：可受理国家级、省部级等各级科研项目的开题立项、成果鉴定、成果报奖等的查新委托，也可提供开题文献跟踪、主题态势分析、专利检索分析等定制化情报服务\n3.AI工具及移动知识服务\n① 星火科研助手（sciai.las.ac.cn） ：文献中心与科大讯飞联合研发的智能知识服务平台，提供成果调研、论文研读和学术写作三大功能，中科院用户不受使用次数限制\n② 中国科讯移动平台 ：文献中心基于移动互联网的知识服务品牌，整合中科院引进数字科技文献资源，支持移动端文献检索、全文阅读、期刊浏览和科技情报获取", url: "https://www.las.ac.cn/", tags: "中文文献" },
    { category: "中文文献检索", name: "北大法宝", brief: "中国第一个法律数据库，涵盖法律法规、司法案例、法学期刊等。", functions: "1.核心数据库\n包括法律法规库、司法案例库、法学期刊库、检察文书库、行政处罚库、英文译本库、法宝律师库等。支持标题、全文、发文文号等多种检索方式，可按效力级别、案由、法院层级、年份等筛选\n2.法宝联想（独创特色）\n平台最核心的特色功能，在各子库之间建立法规、案例、期刊等信息的双向链接。浏览法规某一条款时，系统自动关联引用该条款的案例、期刊、释义；浏览案例时，自动关联涉及的法律法规和同类判例。实现一次检索，获得与检索结果相关的各类法律信息\n3.法宝之窗与法宝引证码\n阅读法规或案例时，鼠标悬停于引用的法条上即时显示该法条具体内容和关联信息，无需跳转。数据库内每份文献均有独一无二的法宝引证码，便于学术引用和成果管理\n4.AI工具\n①法宝律爱多：融合法宝数据库与大模型，支持自建知识库，提供智能问答、模拟法庭、智能写作、智能合同审核等功能\n②法宝GPT：基于海量法律数据的智能法律问答和类案匹配\n5.其他特色服务\n法宝透镜（企业诉讼风险图谱分析工具）、法宝视频（学术视频资源）、法考系统（法律职业资格考试在线练习）、刑事法宝（刑事领域深度加工数据）等", url: "https://www.pkulaw.com/", tags: "中文文献,法律数据" },
    { category: "中文文献检索", name: "全国标准信息公共服务平台", brief: "国家市场监督管理总局、国家标准化管理委员会主管的公益类标准信息服务平台。", functions: "1.标准检索与分类导航：支持标准号、标准名称、国际标准分类号（ICS）、中国标准文献分类号（CCS）、关键词等多种检索方式\n2.标准全文免费下载：向社会提供在线阅读和免费下载国家标准，无需注册\n3.标准制修订过程公开：实时发布标准立项、征求意见、批准发布等各环节公告。用户可在标准页面右侧通过“意见建议”功能直接参与标准草案的反馈\n4.标准云课：针对重点热点国家标准，委托技术委员会或起草单位录制视频解读课程，免费观看", url: "https://std.samr.gov.cn/", tags: "中文文献,标准数据" },
    { category: "中文文献检索", name: "中国科学文献服务系统(CSCD)", brief: "中国科学引文数据库，我国第一个引文数据库。", functions: "1.文献检索\n①提供来源文献检索（按作者、标题、期刊、年份等）和引文检索（查某篇论文被哪些论文引用）\n②检索结果可按被引频次、发表年份排序，显示期刊来源及文献类型\n③支持对检索结果进行引文分析，查看逐年被引趋势、主要引用期刊和高被引作者\n2.引文分析（核心特色）\n①提供单篇论文的总被引频次、他引频次、自引频次\n②可查询某机构、某作者的发文量和总被引情况，生成引证报告\n③广泛应用于国家杰出青年基金评选、国家重点实验室评估、中科院院士推选等，是多项国家级科研评价的指定查询库\n3.期刊评价（CSCD-JCR）\n①提供中国科技期刊影响因子、总被引频次、即年指标、引用半衰期、自引率等指标\n②每两年发布CSCD来源期刊列表，分为核心库和扩展库\n③可查询某期刊在学科内的排名分区，辅助投稿选刊\n4.统计分析服务\n①面向机构提供论文产出与引用的统计检索，生成学科发文量、地区分布等分析报告\n②可委托开展课题查新、项目评估、成果申报等定制化引文统计", url: "http://sciencechina.cn/", tags: "中文文献" },
    { category: "中文文献检索", name: "中文社会科学引文索引(CSSCI)", brief: "南京大学研制的社科引文索引，人文社科领域权威评价工具。", functions: "1.文献检索\n①提供来源文献检索和被引文献检索两大功能。来源文献可检索普通论文、综述、评论、传记资料、报告等；被引文献可检索论文（含学位论文）、专著、报纸等被他人引用的情况\n②提供精确检索、模糊检索、逻辑检索、二次检索等优化方式，检索结果支持文本信息下载\n2.引文分析\n①从来源文献和被引文献两方面向研究人员提供学科前沿信息和学术发展动态，帮助挖掘新的研究生长点\n②提供地区、机构、学科、学者等多种类型的统计分析数据，为制定科学研究发展规划和科研政策提供决策参考\n③依托被引数据，可直观评估和追踪学者、机构研究成果的学术影响力\n3.期刊评价\n①提供多种期刊定量评价数据：被引频次、影响因子、即年指标、期刊影响广度、地域分布、半衰期等\n②由多种定量指标可得相应统计排序，从而评价期刊的学术影响和地位，为期刊评价、栏目设置、组稿选题等提供定量依据\n③每两年更新一次CSSCI来源期刊目录，分为来源期刊和扩展版来源期刊\n④CSSCI也可为出版社与各学科著作的学术评价提供定量依据", url: "http://cssci.nju.edu.cn/", tags: "中文文献" },
    { category: "中文文献检索", name: "全国报刊索引", brief: "上海图书馆主管的综合性中文报刊文献检索工具，涵盖近代特色文献资源。", functions: "1.近代特色文献资源\n①中国近代图书库\n②中国近代报纸库\n③中国近代期刊库\n④中国近代图片库\n⑤近代期刊精品库\n2.检索方式多元：提供普通检索（标题、作者、刊名等基础字段）、高级检索、地图检索和专业检索", url: "https://www.cnbksy.com/select", tags: "中文文献" },
    { category: "中文文献检索", name: "汉斯期刊", brief: "国际综合性开源学术期刊出版机构，聚焦开源中文期刊。", functions: "1.文献检索与全文免费下载\n①读者可在官网按学科或刊名检索期刊，在单本期刊页面点击“免费下载”按钮获取全文\n②所有期刊文章均免费开放获取，无需注册，无并发用户数限制，支持从创刊起的所有文章回溯下载\n2.核心数据库收录\n①国内主流数据库：被知网（CNKI）、万方、维普等全文收录，文章可被有效检索与引用\n②国际索引收录：部分期刊被开源期刊目录DOAJ、美国《化学文摘》、EBSCO等数据库收录\n③部分期刊为RCCSE中文OA核心学术期刊，如《地理科学研究》《社会科学前沿》\n3.开放获取与版权协议\n①采用金色开放获取模式，文章一经出版即可永久免费在线访问，任何人不受经济或法律限制\n②默认遵循CC BY协议，作者拥有作品著作权，允许非商业性复制、传播和衍生作品制作\n③可灵活选择CC BY-NC协议，以满足作者对保护自身内容的需求", url: "https://www.hanspub.org/", tags: "中文文献" },
    { category: "中文文献检索", name: "科学文库", brief: "科学出版社全学科在线阅读平台，以高端科技学术专著和教材为核心。", functions: "1.阅读便捷：采用原版高清PDF格式，可精确复现复杂专业的文字、图形、符号和公式，确保阅读的准确性。平台支持PC、手机、iPad等多终端访问，并采用WebPDF技术优化在线阅读体验，界面清晰、导航便捷。用户也可通过注册个人账号下载图书的CAJ格式文件，实现离线阅读\n2.检索强大：提供书名摘要检索、全文检索和高级检索等多种查询方式，并辅以二次筛选功能，帮助用户在海量资源中快速定位所需内容\n3.权限灵活：机构用户在线浏览通常无需登录，但如需整本下载，则需注册个人账号。下载的电子书一般有15天的有效期，到期后文件会失效，重新下载即可激活新的阅读权限", url: "https://book.sciencereading.cn/", tags: "中文文献" },
    { category: "中文文献检索", name: "中国国家图书馆", brief: "国家级数字图书馆，构建了“中华古籍资源库”、“民国图书”等多个特色资源库。", functions: "1.文献检索：\n①提供馆藏目录(OPAC)检索、特色数据库检索及文津搜索系统，后者整合了国图自建商购数据及地方图书馆资源，实现一站式的元数据发现与获取\n②检索结果支持多种途径的聚类和排序，辅助用户快速定位所需文献信息\n2.文献获取：\n①读者可通过读者云门户检索并在线浏览海量数字化资源全文，无需注册即可阅览古籍影像\n②文献提供中心为读者提供原文查询、文献传递服务，支持通过馆际互借系统获取本地无法满足的文献信息需求\n3.在线学习与视听服务：\n①国图公开课整合精品视频课程，涵盖百部经典、读书推荐、典籍鉴赏等栏目，提供免费的在线视频学习服务\n②线上“讲座服务”定期推出“文津讲坛”等公益性学术讲座资源\n③“视听服务空间”定期举办如黑胶文化节等主题活动，精选馆藏唱片提供开架阅览\n4.AI工具：\n①“文津漾楫”古籍阅读小程序，支持拍照识别诗词对联、将古籍原文转为白话文等功能，让古籍阅读更便捷\n②“中华古籍智慧化服务平台” (guji.nlc.cn) 深度融合AI技术，提供自动句读、文白对照翻译、AI智能问答、划词查询和版本比对等功能\n③数字馆员“小图” 可为访馆读者提供语音交互、问询导航等智能咨询服务", url: "https://www.nlc.cn/web/index.shtml", tags: "中文文献" },
    { category: "中文文献检索", name: "大学数字图书馆国际合作计划(CADAL)", brief: "教育部“211工程”重点建设项目，构建多学科、多类型、多语种的海量数字图书馆。", functions: "1.特色资源收藏\n①古籍约24.4万册，收录大量善本，是研究古代历史、文学的重要基础\n②民国文献约33.1万件（图书17.6万册，期刊15.5万种），是研究近现代中国社会的权威来源\n③设13个特藏库：民国文献大全、墓志拓片、甲骨文数字化、蒋介石资料、满铁资料、侨批、哥伦比亚大学图书馆民国文献缩微胶片等，深入支持考古、文史研究\n④外文图书约71.6万册，涵盖美国大学图书馆核心馆藏等进入公共领域的经典学术资料\n2.数字借阅模式（版权保护机制）\n①实行借阅模式，不提供全文下载，每本书借期7天，支持在线浏览\n②普通用户可试读前10页，登录账号后点击“借阅图书”可阅读全文\n③在“个人主页—借阅记录”中可手动提前归还或续借，逾期系统自动收回权限\n3.校外访问（180天漫游，无需VPN）\n①成员馆用户通过绑定edu后缀的学校邮箱，即可在校外直接访问与校内同等权限的资源\n②注册后在“个人设置”中完成“IP绑定机构”，可获得180天有效期；在校内IP登录自动刷新有效期\n③超过180天未在校内登录则进入30天缓冲期，重新认证即可恢复\n4.个人知识管理\n①登录后可对文献添加标签、发表评论、分享资源、收藏，构建个人知识体系\n②“书单推荐”栏目支持读者分享和点赞书单，点击书单名可直接在线浏览平台收录的电子图书", url: "https://cadal.edu.cn/index/home", tags: "中文文献" },
    { category: "中文文献检索", name: "国家哲学社会科学文献中心", brief: "中宣部部署，中国社会科学院牵头承建的公益性学术信息平台。", functions: "1.权威专题库：设有“习近平新时代中国特色社会主义思想”“古典学研究”“建设中国特色新型智库”等专题子库，按国家战略方向聚合权威文献，一键直达\n2.全球开放获取：所有资源免费阅读下载，支持中英文界面，海外用户无需注册即可访问\n3.期刊论文优先发布：与《经济研究》《中国工业经济》等100多家核心期刊签约，论文录用定稿后优先在平台发布，早于纸质期刊出版，时效性领先", url: "www.ncpssd.cn", tags: "中文文献" },
    { category: "中文文献检索", name: "中国光学期刊网", brief: "专注于光电领域的学术资源门户，独家整合国内80多种光学期刊。", functions: "1.独家核心期刊资源：独家且全面地全文收录了国内较权威的33种光电类中文核心期刊，另有13种期刊的文摘，完整涵盖了中国五大顶尖光学研究所的所有期刊资源\n2.行业资讯与E-First服务\n①平台不仅是文献库，也是行业信息门户，集中发布业内新闻、展会、培训及招聘等众多行业资讯\n②提供“E-First”（网络优先出版）服务，确保核心期刊的最新录用稿能比纸质期刊提前数月上线，让研究人员第一时间获得前沿研究成果\n3.访问与使用：该数据库为免费资源，不受IP限制，所有用户均可自由访问和检索，可在线浏览和全文下载", url: "https://www.opticsjournal.net/", tags: "中文文献" },
    { category: "中文文献检索", name: "中国心理科学信息中心", brief: "中科院心理所图书馆为主体，心理学专业资源与预印本平台。", functions: "1.馆藏资源\n①馆藏中外文图书4万余册、中外文期刊1400余种约9万册，许多英文心理学期刊馆藏始自19世纪创刊号，是国内馆藏最全的心理学专业图书馆\n②收录珍贵历史资料：心理学创始人Wundt、Freud、Piaget等西方经典著作，以及中国早期心理学著作、我国早期心理学期刊如《心理》（1922年）等\n2.PsyChinaXiv预印本平台（核心特色）\n①国内心理学领域唯一的官方预印本平台，2018年上线，由中国心理科学信息中心运营\n②截至2024年，总发文量3168篇，总下载量约301万次，总访问量近千万，篇均下载近千次\n③快速发表预印本、开放存档已发表论文、探索开放同行评议、提供官方时间戳存档保护首发权\n3.科研情报分析与论文支撑服务\n① 提供前沿学科态势追踪、战略规划部署支持等科技情报分析\n② 定期发布ESI心理学热点快报，推送学科动态和国际前沿\n③ 提供论文查重检测、论文修改润色、查收查引等论文发表支撑服务", url: "https://lib.psych.ac.cn/library/home/index", tags: "中文文献" },
    { category: "中文文献检索", name: "中国生物医学文献服务系统", brief: "SinoMed，国内生物医学领域权威的中外文整合文献服务系统。", functions: "1.主题词检索（核心特色）\n①依据美国国立医学图书馆《医学主题词表（MeSH）》（中译本）对每篇文献进行深度标引，输入“高血压”自动关联“高血压”规范主题词及所有下位词\n②支持主题词与副主题词组配（如“高血压/药物治疗”），精准限定检索范围\n③提供主题词共现分析，自动生成高频关键词关系网，直接用于文献综述和系统评价\n2.智能选刊与个性化服务\n①录入论文标题和摘要，系统自动匹配推荐适合投稿的期刊（基于大数据计算）\n②支持检索历史保存、邮件定题推送、个人文献订阅\n③通过DOI和OA接口直接跳转全文，或通过NSTL文献传递获取", url: "https://www.sinomed.ac.cn/index.jsp", tags: "中文文献" },
    { category: "中文文献检索", name: "中华医学期刊全文数据库", brief: "中华医学会系列期刊官方平台，独家资源。", functions: "1.独家中华医学会系列期刊资源：平台收录中华医学会主办期刊202种及其他合作期刊77种，全部为独家资源\n2.中华医学知识库（六大特色子库）：\n①精品指南库：收录中华医学会各专科分会制定的临床指南、共识和建议类文献2300余篇，依托全国顶尖学术组织和顶尖专家制定，是临床诊疗的重要参考依据\n②视频库：涵盖内科、外科、妇产科等20多个临床学科的学术会议视频，计825部，由各学科知名专家讲授\n③科研与写作库：下设科研培训、写作培训、编辑部面对面三版块，提供选题、项目申请、论文撰写和投稿指导等服务\n④名师讲堂库：从中华系列学术视频中遴选名家大咖的示范和讲解，按学科和专题精细化分类\n⑤全科教育库：围绕《基层医疗卫生机构常见疾病诊疗指南》，为全科医生及广大基层医务者提供多样性的知识服务产品\n⑥医学人文库：为长期从事医学工作人员自主思考医学人文性的平台，整合了中华系列杂志的人文医学类方面的资源，内容全面丰富，不局限于单刊", url: "https://www.yiigle.com/index", tags: "中文文献" },
    { category: "中文文献检索", name: "中医智库", brief: "综合性中医知识服务平台，依托中国中医科学院资源。", functions: "1.四库联动检索：无需在古籍、医案、方剂、百科等不同模块间来回跳转，只需一次搜索，即可获得跨越所有库的聚合结果。检索结果支持在古籍、医案、方剂之间“一键切换”，高效打通中医经典与临床医案间的知识壁垒\n2.全面收录海量权威资源：收录1800余种经典中医古籍的点校版、4万例古今名医病案、30万首方剂，以及9000种证候、2万种症状与40万条中医药相关百科数据", url: "https://zhongyigen.com/#", tags: "中文文献" },
    { category: "中文文献检索", name: "中国农业科技文献与信息服务平台", brief: "国家农业图书馆，亚洲第一、世界第三大农业图书馆，农业大数据平台。", functions: "1.AI工具：平台基于华知大模型，整合海量农业数据打造了中国农业知识大模型。聚焦科技创新、科学决策、学术研究、服务三农四大场景，提供“农知搜问”（智能问答）、科研助手、农知伴读、农知推送等AI工具\n2.文献检索：平台通过农业学术服务平台统一整合农业科技文献、国内外农业项目、科学数据、行业报告、农业专利等资源，并提供数据下载服务", url: "https://nais.net.cn/", tags: "中文文献" },

    { category: "中文文献检索", name: "MedSci", brief: "梅斯医学，临床医学领域期刊查询与学术支持平台。", functions: "1.期刊智能查询：可一键查询期刊影响因子、JCR/中科院分区、审稿周期等信息，支持期刊之间多维度对比\n2.临床研究与校企服务：面向药械企业客户提供数字化医学传播解决方案。官网额外开辟科研招聘板块，对接临床研究岗位和医学事务人才，结合产品优化医学推广等。拥有疾病风险数据库，可系统化数据挖掘支持临床科研\n3.AI工具：提供基于大数据的AI选刊功能，输入标题和摘要可智能推荐适合期刊并提供学科匹配度、投稿难度等推荐理由", url: "https://www.medsci.cn/sci/index.do", tags: "中文文献" },
    { category: "中文文献检索", name: "百度学术", brief: "百度推出的免费中英文文献检索平台，集成AI助手。", functions: "1.文献检索\n①按相关性、被引量、发表时间排序，按发表时间、研究领域、核心数据库、关键词、文献类型、作者、发表期刊、机构8种方式筛选。支持关键词/主题检索、标题检索、DOI检索、参考文献串检索及高级检索\n②每条文献结果直观标注“免费下载”入口；未收录全文的文献提供“文献互助”通道，用户可发布请求，通过积分机制由其他用户协助获取全文\n2.学术服务\n①支持订阅感兴趣的关键词、收藏有价值的文献，通过个人中心统一管理\n②对研究方向做“开题分析”：系统从海量文献中提取相关研究点，以可视化图表展示历年研究热度与趋势\n③提供毕业论文查重服务，对接查重系统\n3.AI工具\n①AI学术搜索与AI助手：支持自然语言搜索，可对学术内容直接进行AI问答、总结提炼\n②论文图谱：以可视化图谱展示研究领域的经典文献、研究热点、发展脉络及分支方向\n③文献总结与AI阅读：支持批量上传最多100篇文献，AI在30秒内生成结构化总结，3分钟即可掌握文献核心内容；AI阅读可精准还原文献版式、自动翻译外文文献\n④AI编辑器与选题推荐：集成文献AI编辑器（一键插入表格、图表、复杂公式等），提供AI校对润色；基于用户需求自动挖掘推荐有价值的创新研究方向，激发科研灵感\n⑤集成SPSSPRO数据分析平台，无需切换即可一站式进行学术研究和数据分析", url: "https://xueshu.baidu.com/", tags: "中文文献" },
    { category: "中文文献检索", name: "中国古典文献导航系统", brief: "奎章阁，古典文献资源导航平台，数字人文基础设施。", functions: "1.全球汉籍影像集成\n①支持一站检索全球公开的古籍影像资源，输入繁体书名或作者，系统自动汇聚各大馆藏机构提供的可用影像版本列表\n②数据来源涵盖中国大陆、港澳台及日、韩、欧、美等地的汉籍馆藏公开影像\n2.全球汉籍分布GIS系统\n①基于GPS定位技术，对全球汉籍馆藏单位的地理位置进行地图标注与空间数据展示\n②数据来源于OCLC（联机计算机图书馆中心）等权威联合目录\n③可直观查看各馆藏地的古籍分布情况，辅助实地调研规划\n3.古籍AI分析平台\n①支持大数据词汇统计、共现分析、全书句子检索、重文分析等功能\n②对古籍文本进行自动化结构化处理，为文献的量化研究和文本挖掘提供数据支持\n③协助研究者发现文本内部的潜在规律和关联", url: "https://www.wenxianxue.cn/", tags: "中文文献" },
    { category: "中文文献检索", name: "中国地方历史文献数据库", brief: "上海交通大学地方历史文献数据库，收录契约账册、诉讼文书等民间史料。", functions: "1.独家的民间一手史料（核心特色）\n①所有文献均来自田野调查、市场收购和授权复制，以契约账册、诉讼文书、赋役册籍为主，经济史、法制史材料占比较大，是研究明清至20世纪50年代中国土地制度、产权关系、乡村商业、乡村社会的地域性原始资料\n②文献以地域为单位完整、有序组织，如石仓、徽州等，尽可能将一个区域中的所有地方历史文献纳入同一数据库中，便于区域社会史的整体研究\n2.录文与原图对照阅读及数据导出\n①文献阅读采用录文与原图对照方式，图片可随意拖放，录文可切换原版式仿真、顺序直排两种模式\n②页面会显示检索热词，便于发现相关高频词汇\n③ 据经结构化处理后支持统计分析和元数据批量导出；提供从检索到引用的全流程辅助，可一键输出符合学术规范的引用信息，支持引用格式定制\n3.GIS辅助分析与数字人文工具\n①系统可识别和提取文献中蕴含的地理信息并标准化处理，实现GIS空间化展示，在地图上标注文献的原始出土地点分布\n②文献提供归户信息（同一家族或村庄的文书归集），便于追踪社会关系网络", url: "https://ndfwx.datahistory.cn/", tags: "中文文献" },
    { category: "中文文献检索", name: "高校学位论文服务系统", brief: "CALIS学位论文检索传递系统，提供中外文学位论文集成检索。", functions: "1.中外文学位论文集成检索\n①采用e读搜索引擎，通过简单检索、多字段高级检索组合方式查询题名、作者、专业、导师等字段，获取全国高校馆藏的中外文学位论文信息\n②系统根据登录用户所属机构身份，自动优化检索结果的显示与排序\n③收录范围涵盖理、工、农、医及人文社科等全学科领域，可满足不同学科方向的研究需求\n2.跨机构全文获取（核心特色）\n①\"一个账号、全国获取\"：注册后检索到学位论文，可直接通过系统提交文献传递申请。\n②合作机构众多：可申请获取的合作图书馆，包括国家图书馆、上海图书馆、国家科技图书文献中心（NSTL）、香港JULAC成员馆、KERIS等。\n③专家寻源通道：提供代查代检服务，由专业馆员在全国乃至全球范围内协助查找稀缺或非馆藏的学位论文原件", url: "https://etd2.calis.edu.cn/index", tags: "中文文献" },
    { category: "中文文献检索", name: "中国社会科学文库", brief: "中国社会科学出版社学术资源平台，电子书2.6万种。", functions: "1.十大专业子库与独家资源\n①设有中社智库、马克思主义研究、哲学宗教、历史考古、文学艺术、经济管理、民族边疆研究、国际关系、党政学习、教育学术十大子库\n②所有电子书实现纸电同步出版，出版社正版资源中社科出版社持有的部分为独家运营\n2.科研辅助与AI工具\n①社科问道：AI问答平台，接入大语言模型，基于社会科学文献大模型反馈解答问题\n②社科基金分析：国家社科基金项目分析平台，可供检索和分析历年立项情况\n③社媒大数据：分搜索和热榜巡查板块，获取社会科学领域舆情热搜和媒体动态\n④在线词典：支持页面划线查词和知识点查询", url: "https://www.sklib.cn/", tags: "中文文献" },
    { category: "中文文献检索", name: "中国近代经济思想文献数据库", brief: "高等教育出版社，专注于中国近代经济思想史的专题数据库。", functions: "1.资源特色\n①宏观把握中国经济发展脉络，全面反映中国近代经济与经济学的成长史\n②以结构化后的全文数据资源为主，图文并茂，为科研工作者提供知识服务型经济类特色文献全文数据库\n2.全文献全文检索\n①提供全文检索、限定条件检索、字间距检索等智能化数字功能，实现字字可检、句句可查\n②支持多维检索方式及纠错功能，方便读者和馆藏机构使用\n\n双版本呈现与导读\n① 每一种文献经专家甄选后，以原始版本和简体字版两种方式原汁原味呈现\n② 针对每一种文献，均由专家撰写简介评价，提供学理支撑", url: "https://economics.hep.com.cn/", tags: "中文文献" },
    { category: "中文文献检索", name: "科学智库", brief: "科学出版社智库类报告和研究专著数据库。", functions: "1.资源特色\n①收录中国科学院、中国工程院等国家级智库的出版成果，多为国家重大项目产出\n②包含中国科学院系列报告、国家自然科学基金应急项目、战略性新兴产业等十大专题库\n③资源以独立研究文章为基本单位，支持按作者、机构、基金等筛选\n2.专家与基金检索\n①可在“专家库”中按姓名检索特定专家的代表性成果\n②支持从基金资助角度筛选，了解历年资助与产出情况，辅助项目申报\n3.校外访问与引文\n①机构用户支持CARSI联邦认证，可校外远程访问\n②阅读时一键复制内容，自动生成规范化引文格式", url: "https://thinktank.sciencereading.cn/", tags: "中文文献" },
    { category: "中文文献检索", name: "OpenSign公益性学术资源服务平台", brief: "清华大学图书馆“开放科学支持计划”，整合OA论文。", functions: "1.公益免费与无IP限制\n①面向全社会免费开放，无需订阅费用，无IP限制\n②个人注册后即可随时随地访问全部资源，无需依赖机构网络\n2.资源检索与一站式获取\n①整合超过1100万篇全球优质OA论文元数据，覆盖全学科领域\n②提供多维度筛选导航和智能推荐功能，按热点学科组织专题展示\n③通过链接标准引导用户跳转全文，实现从检索到获取的一站式服务\n3.学者主页与成果管理\n①注册后免费开通个人主页，可认领并管理个人发表的论文\n②可视化展示学者OA发文量年度统计、学术历程，便于成果展示与科研合作\n4.开放科学资讯推送\n①依托“OpenSign开放科学”微信公众号持续发布资讯，涵盖开放科学新闻动态、政策研究、出版支持等\n②助力用户及时把握开放获取和开放科学的最新发展动态", url: "https://opensign.lib.tsinghua.edu.cn/home", tags: "中文文献" },
    { category: "中文文献检索", name: "读秀", brief: "超星学术图书搜索服务平台，片段级搜索和文献传递。", functions: "1.知识深度检索（核心特色）\n①支持全文检索，输入任意词句可精准定位到图书中的具体段落和出处，实现“化天下书为一本书”的片段级检索\n②检索结果以知识点条目形式呈现，聚合来自多本不同图书的相关内容\n③支持“以图搜图”，上传图片即可检索书中相关的插图、表格和图表\n2.文献传递\n①针对本馆未藏的图书资源，可申请文献传递服务：单次不超过50页，同一图书每周传递不超过全书20%\n②原文以电子邮件发送，有效期20天，支持传递的中文图书超349万种\n3.AI问答模式\n①在知识频道检索后，可切换至“问答模式”，大模型自动学习知识片段生成综述式回答\n②每句回答均标注来源并可跳转至原文，确保内容可追溯", url: "https://www.duxiu.com/", tags: "中文文献" },
    { category: "中文文献检索", name: "掌桥科研", brief: "一站式科研服务平台，整合文献检索、AI写作、查重等。", functions: "1.AI科研助手\n①AI生成论文正文、范文、选题、文献综述、开题报告、答辩PPT等\n②提供AI查重与降重，支持AIGC检测，降低重复率和AI生成痕迹\n③AI翻译支持文档自动翻译和人工精译，另提供论文格式自动转换\n2.文档转换与学术社区\n①支持PDF转Word，会员每月免费转换页数\n②用户可发表笔记、评价，与他人交流，构建学术社交网络\n3.文献检索与获取\n①整合3.9亿条中外文献题录，支持一站式检索，无需多平台跳转\n②个人可购买会员，每月享50-100篇免费文献权益\n③提供2GB个人云空间，支持文献云端保存和管理", url: "https://www.zhangqiaokeyan.com/", tags: "中文文献" },
    { category: "中文文献检索", name: "Open Access Library", brief: "OALib，公益性开放存取学术资源平台，收录570万+英文OA论文。", functions: "1.免费学术资源检索与下载\n①累计收录超570万篇免注册英文期刊论文，涵盖自然科学、工程技术、医学及人文社科领域，主要源自Hindawi、Plos One、MDPI等国际知名出版商\n②支持中英文关键词检索和通配符检索，文献以PDF格式为主，可直接在线阅读或免费下载全文\n③每篇文献均提供完整元数据（摘要、关键词、DOI、作者机构等），方便学术引用与溯源\n2.OALib自有期刊（OALib Journal）\n①OALib旗下自有的同行评审学术期刊，覆盖科学、技术、医学及社会科学所有领域\n②为稿件提供同行评审、排版和出版服务，每篇文章收取99美元版面费\n③所有发表在OALib Journal上的文章均存放在OALib平台，可免费访问\n3.预印本存储与检索\n①作者可提交稿件到OALib Preprints免费发表，存储在311个学科领域资料库内\n②支持作者提交其他期刊的预印本和后印本的元数据存储\n③预印本是同行评审前版本，后印本是同行评审后但未经排校版本", url: "https://www.oalib.com/", tags: "中文文献,英文文献" },
    // ===================== 英文文献检索 =====================
    { category: "英文文献检索", name: "Google Scholar谷歌学术", brief: "Google学术搜索是一个可以免费搜索学术文章的网络搜索引擎，索引了出版文章中文字的格式和科目，能够帮助用户查找包括期刊论文、学位论文、书籍、预印本、文摘和技术报告在内的学术文献，内容涵盖自然科学、人文科学、社会科学等多种学科。", functions: "1.文献检索\n①全球最大的免费学术搜索引擎，覆盖期刊、会议论文、学位论文、专利、预印本、图书等全学科资源\n②支持普通检索与高级检索（限定作者、出版物、年份），结果按相关性或时间排序\n③每条文献自动显示被引频次，点击“被引用次数”可追溯引文网络，快速定位后续研究\n④点击“所有版本”可罗列同一文献的预印本、机构库、作者主页等不同版本，便于免费获取全文\n⑤通过“设置—Library Links”绑定所在机构，检索结果直接显示机构订阅全文链接\n2.我的个人学术档案\n①创建个人档案后，系统自动聚合本人发表的全部论文，实时计算总被引频次、h指数、i10指数\n②档案页面可公开访问，方便展示学术成果和影响力，支持按年度查看引用趋势\n③可追踪特定作者的论文更新，点击作者名查看其全部发文及合著者网络\n3.我的图书馆\n①零门槛云端文献管理工具，点击检索结果下方的“保存”星标即可一键收藏\n②支持自定义标签分类，在图书馆内可对全文进行关键词搜索，快速定位\n③可批量导出文献题录（RIS/BibTeX格式），支持MLA、APA、Chicago等主流引文格式一键复制\n4.实验室\n①谷歌2025年底推出的生成式AI研究助手，将传统检索升级为AI驱动的深度探索\n②用自然语言提出复杂学术问题，系统自动拆解并同时运行十余种相关搜索，筛选最核心的论文\n③AI会为每篇推荐文献生成解释，阐述其与问题的相关性，帮助发现被传统搜索遗漏的关键信息", url: "https://scholar.google.com/", tags: "英文文献" },
    { category: "英文文献检索", name: "Web of Science", brief: "Web of Science是科睿唯安（Clarivate Analytics）开发的引文索引类数据库，整合科学引文索引（SCI）、社会科学引文索引（SSCI）、艺术与人文引文索引（A&HCI）、Emerging Sources Citation Index（ESCI数据库）、会议录引文索引、Book Citation Index等核心子库。平台提供独特的被引参考文献检索机制，支持跨学科文献追踪与分析功能，整合期刊引证报告（JCR）和基本科学指标（ESI）等评估工具。", functions: "1.引文索引\n①越查越旧：通过“Cited References”（参考文献）追溯一项研究的起源和理论基础\n②越查越新：通过“Times Cited”（施引文献）追踪一项研究的最新进展和应用动态\n2.分析工具\n①提供丰富的分析功能，可从作者、机构、出版年、学科类别、国家/地区、来源出版物等维度对检索结果进行深度分析\n②快速把握领域内的研究趋势、核心研究者、高产机构及热点期刊分布\n③可对多达10,000条检索结果一键生成引文报告，可视化呈现逐年发文量和被引趋势，自动计算总被引次数、篇均被引、H指数等核心指标\n3.期刊影响因子\n①科睿唯安每年发布Journal Citation Reports（JCR），公布期刊影响因子\n②JIF是衡量期刊学术影响力的重要指标，也是科研评价中常用的参考依据\n③可查询期刊的影响因子、分区及历年走势，辅助投稿选刊\n4.研究助手\n①引入AI工具Web of Science Research Assistant，支持自然语言提问\n②提供研究趋势可视化等功能，提升文献调研效率", url: "https://webofscience.clarivate.cn/wos/woscc/smart-search", tags: "英文文献" },
    { category: "英文文献检索", name: "SCI-HUB", brief: "Sci-Hub是由哈萨克斯坦程序员Alexandra Elbakyan于2011年创建的开放获取学术数据库，通过绕过版权保护机制提供免费文献下载服务。", functions: "1.文献检索\n①全球最大的免费学术论文获取平台，拥有超过8800万篇学术论文数据库，旨在打破高价期刊订阅壁垒，让知识免费惠及全球研究者\n②支持文献链接检索、DOI号检索、PMID号检索三种方式，暂不支持直接通过关键词检索文献\n③献链接检索：在期刊官网获取论文页面完整URL，粘贴至Sci-Hub输入框即可自动跳转PDF\n2.AI工具（Sci-Bot）\n①2026年最新推出的AI聊天机器人，基于Sci-Hub数据库实现自然语言的学术问答\n②回答结果直接引用Sci-Hub数据库中的论文原文且附带链接，生成内容可追溯，用户可一键跳转免费下载\n3.辅助工具\n① SciHub Desktop桌面客户端：轻量化Windows/Mac软件，输入DOI/PMID即可一键下载PDF，无需打开浏览器\n② Zotero-SciHub插件：集成于Zotero文献管理软件，添加文献后自动从Sci-Hub获取并挂载PDF附件，实现文献条目管理与全文获取一体化\n③ Sci-Hub X Now浏览器扩展：基于Manifest V3标准的智能扩展，在PubMed、Web of Science等平台遇到付费文献时，自动检测DOI并生成Sci-Hub直达链接", url: "https://sci-hub.st/", tags: "英文文献" },
    { category: "英文文献检索", name: "PubMed", brief: "PubMed是一个免费的MEDLINE数据库，提供生物医学和健康科学领域的文献搜索服务。PubMed的数据主要来源有：MEDLINE、OLDMEDLINE、Record in process、Record supplied bypublisher等。数据类型：期刊、综述、以及与其它数据库链接。", functions: "1.资源规模\n①收录超过4000万条生物医学文献摘要，涵盖MEDLINE、PubMed Central及出版商在线优先出版文献\n2.文献检索\n①输入关键词、作者、DOI或期刊名进行检索\n②使用MeSH医学主题词检索，系统自动匹配规范词和下位词，快速找全同一主题文献\n③使用高级检索按标题、作者、期刊、出版日期等字段组合检索，精确定位文献\n④检索结果中点击“Free PMC article”或“Free full text”直接获取开放获取全文，通过“LinkOut”跳转至期刊官网或机构订阅资源获取全文\n3.个人文献管理\n①免费注册My NCBI账号，保存检索式和检索历史，随时重复使用\n②创建多个文献收藏夹，分类保存感兴趣的文章\n③按文献类型（综述、随机对照试验）、语种、年龄等条件过滤检索结果", url: "https://pubmed.ncbi.nlm.nih.gov/", tags: "英文文献" },
    { category: "英文文献检索", name: "PubMed Central", brief: "PubMedCentral（PMC）是由美国国立卫生研究院（NIH）旗下的国立医学图书馆（NLM）与美国国立卫生研究院（NIH）联合建立，并由NLM下属的国家生物技术信息中心（NCBI）于2000年2月负责开发与维护的生物医学与生命科学期刊全文数据库，免费向公众开放。该数据库通过电子副本形式存储期刊文献及作者提交手稿，与PubMed文摘数据库形成互补，支持全文检索与下载。", functions: "1.资源特色\n①免费收录生物医学和生命科学领域全文文献，总量超过1200万篇，全部可在线阅读和下载\n②收录数千种期刊，内容最早可追溯至18世纪末，涵盖正式发表论文、作者手稿及预印本\n2.开放获取子集\n①提供数十万篇CC协议（如CC BY、CC0）发布的全文，允许自由重用、文本挖掘和二次分析\n②可通过FTP服务器批量下载XML和PDF格式的原始文件，支持大规模数据挖掘\n3.文献检索\n①输入关键词、作者、DOI或期刊名，直接检索可获取全文的文献\n②使用高级检索按标题、作者、期刊、出版日期等字段组合检索", url: "https://pmc.ncbi.nlm.nih.gov/", tags: "英文文献" },
    { category: "英文文献检索", name: "Science Direct", brief: "ScienceDirect OnSite是Elsevier旗下的核心学术数据库。该数据库涉及众多学科：计算机科学、工程技术、能源科学、环境科学、材料科学、数学、物理、化学、天文学、医学、生命科学、商业、及经济管理、社会科学等。", functions: "1.资源特色\n①收录爱思唯尔出版的大量高影响力期刊和图书，其中约82%的期刊被SCI收录\n②拥有《柳叶刀》《细胞》等众多顶级期刊，约19%的全球全文文献量和28%的学术引用量源自该平台\n2.文献检索\n①提供简单检索和高级检索，可按标题、摘要、作者、期刊名、关键词、ISSN等多种字段精确查找\n②支持使用布尔逻辑算符（AND、OR、NOT）和截词符（*）组合检索策略\n3.科研辅助工具\n①集成参考文献导出功能，支持多种引文格式\n②提供引用跟踪功能（如关联Scopus），方便追踪文献被引用情况，辅助文献管理和科研工作", url: "https://www.sciencedirect.com/", tags: "英文文献" },
    { category: "英文文献检索", name: "Engineering Village", brief: "Engineering Village是Elsevier旗下的工程与应用科学领域文献检索平台，主要服务于工程师及科研人员。Engineering Village平台上的10多个数据库，涵盖了工程、应用科学相关领域，平台托管了包括Compendex、Inspec、GeoBase等多个工程数据库，内容涵盖期刊、会议记录、专利、技术报告等多种文献类型。", functions: "1.资源特色\n①全球工程领域最权威的文摘数据库，核心库Compendex收录190个工程学科，数据量超过3500万条，最早回溯至1884年\n②涵盖期刊、会议论文、学位论文、专利、标准等多种文献类型\n2.文献检索\n①提供快速检索、专家检索和叙词检索三种方式\n②叙词检索使用受控词汇，自动推荐相关概念词，显著提升查准率\n③支持数值数据搜索，可按物理特性（如温度、硬度）精准查找文献\n3.AI工具与科研辅助\n①AI研究助手支持自然语言提问，生成带参考文献来源的研究摘要\n②个人账户可保存检索式、设置邮件提醒，追踪前沿动态", url: "https://www.engineeringvillage.com/home.url", tags: "英文文献" },
    { category: "英文文献检索", name: "Scopus", brief: "Scopus是由全球21家研究机构联合300余名科研人员共同开发的信息导航工具，覆盖科学、技术、医学、社会科学等领域的超过2.8万种期刊，包含超过1亿条文献记录及海量参考文献，功能体系包含文献检索、引文追踪、专利分析及学术评价模块，配备作者标识系统与H指数评估工具。", functions: "1.资源特色\n①全球最大的同行评议文献摘要与引文数据库，收录超1亿条记录，涵盖自然科学、医学、社会科学、生命科学全领域\n②收录2.8万种活跃期刊（含8000多种OA期刊）、25万种电子书、1300万篇会议论文及4600万个专利链接\n2.文献检索\n①支持基本检索、高级检索和作者检索，可按标题、作者、关键词、机构、ISSN等字段精确查找\n②检索结果页提供多维度筛选精炼（年份、学科、作者、机构、国家、文献类型等）\n③检索结果可一键导出RIS、BibTeX等引文格式，支持批量导出至文献管理工具\n3.AI工具\n①自然语言提问（支持中文），系统自动生成带参考文献来源的研究摘要，答案可溯源\n②Deep Research自动制定研究计划、多轮迭代检索，生成带置信度评分的综合研究报告\n③概念图谱与新兴主题识别：可视化呈现领域结构，自动识别近2年快速上升的研究空白区", url: "https://www.scopus.com/pages/home", tags: "英文文献" },
    { category: "英文文献检索", name: "Wiley", brief: "Wiley Online Library是全球历史最悠久﹑最知名的学术出版商之一，享有世界第一大独立的学协会出版商和第三大学术期刊出版商的地位。", functions: "1.资源特色\n①全球第三大学术期刊出版商，平台涵盖科学、技术、医学、社会科学及人文科学全学科领域\n②收录超2000种同行评审学术期刊、超2万种电子图书、数百种参考工具书、实验室操作手册及循证医学数据库\n2.文献检索\n①支持快速检索（按关键词、作者、标题、DOI）和高级检索（多字段组合检索）\n②支持布尔逻辑运算符（AND、OR、NOT）、括号优先运算、引号精确词组检索及通配符检索\n③检索结果可按出版时间、文献类型、学科分类筛选，并按相关度或出版日期排序；文献标识“Full access”为已订阅全文、“Free access”为免费资源、“Open access”为开放获取\n3.AI工具：Wiley AI Gateway：业内首个原生AI研究情报平台，集成Claude、Le Chat、Perplexity等主流AI，将同行评审内容无缝对接至AI工作流，生成内容可溯源", url: "https://onlinelibrary.wiley.com/", tags: "英文文献" },
    { category: "英文文献检索", name: "Oxford University Press", brief: "牛津大学出版社（Oxford University Press, OUP）作为全球规模最大的大学出版社，也是牛津大学的重要组成部分，致力于在全球范围内推动知识和学习的发展。其出版物范围广泛，涵盖学术、教育、英语教学等多个领域 。", functions: "1.资源特色\n①Oxford Academic平台整合超44,000本学术专著和500余种学术期刊，约73%的期刊被SCI、SSCI或AHCI收录\n②提供Oxford Scholarship Online（30,000+学术专著）、Oxford Handbooks Online（权威学术手册）、Oxford Reference（200万+词条）、Oxford Bibliographies（40+学科研究指南）、Oxford Medicine Online、Oxford Clinical Psychology等专业数据库\n③约20%的期刊为OA模式，每年出版约40本OA学术专著\n2.检索与工具\n①支持高级检索、学科深度标引及AI Discovery Assistant智能选读\n②参考文献一键导出至EndNote、RefWorks等工具", url: "https://global.oup.com/academic/", tags: "英文文献" },
    { category: "英文文献检索", name: "Nature", brief: "Nature是全球最具权威性和影响力的综合性科学周刊，被公认为科学出版界的“圣杯”，与《Cell》和《Science》齐名，被誉为“世界三大顶级期刊”（CNS）。它致力于发表所有科学领域中最重要、最前沿的原创性研究，并报道全球科学界的重要新闻、评论和观点。", functions: "1.资源特色\n①创刊于1869年，是全球最知名的多学科科学周刊，通过nature.com平台提供《自然》周刊及60余种“自然”系列期刊，覆盖生命科学、物理科学、临床医学、社会科学等领域\n②平台每月有超过1000万独立访客访问Nature Portfolio内容，包括原创研究论文、新闻与评论等\n2.核心影响力\n①2024年全球引用量超96万次，2025年影响因子约64.8，连续多年位列多学科领域第一\n②Nature不仅仅是一本研究期刊，它通过其News、Comment等栏目，深度参与和记录科学界的重大事件、政策辩论和伦理讨论，是科学家和公众理解科学如何与社会互动的重要窗口\n③在Nature上发表一篇论文被全球科学界视为职业生涯的巅峰成就之一。\n3. AI工具\n①Nature Research Assistant：面向所有学科领域的AI研究助手，旨在帮助用户更快地发现、阅读和理解研究论文，并提供学术写作建议；由大语言模型和多种内部开发的机器学习技术生成\n②Methods Muse：专为生命科学领域设计的AI助手（“实验室AI‘缪斯’”），使用OpenAI的GPT-4o mini与RAG技术，结合Springer Nature专有知识模型和知识图谱，简化实验方案设计、优化和故障排除", url: "https://www.nature.com/", tags: "英文文献" },
    { category: "英文文献检索", name: "Science", brief: "Science是美国科学促进会出版的国际顶级综合性学术期刊，创刊于1880年，与《Nature》和《Cell》齐名，被誉为“世界三大顶级期刊”（CNS）涵盖自然科学所有学科并以发表原创科研成果和科学评论闻名，它致力于发表最重要、最前沿的原创性科学研究，并报道全球科学政策、新闻和观点。", functions: "1.资源特色\n①创刊于1880年，由美国科学促进会（AAAS）出版，是全球历史最悠久、最权威的综合性科学周刊之一。每周出版一期（含纸质版与在线版），出版量约1万册。年均投稿量约1.5万篇，投稿竞争异常激烈，2025年为15088篇\n②期刊覆盖全部科学领域，年发文量约800篇，下设Research Articles（较长研究）、Reports（短篇快报）等栏目。2025年影响因子56.9，属JCR Q1，中科院一区Top期刊\n2.核心影响力：所有来稿经过严格同行评审，稿件接收率不到8%，影响因子连续多年在生物学与生物化学、分子生物学与遗传学、材料科学、化学、物理学等多个学科高居榜首\n3.AI工具\n①使用iThenticate检测文本抄袭，Proofig检测图像篡改\n②与DataSeer合作部署AI驱动的SnapShot平台，自动生成MDAR（材料、设计、分析和报告）清单，以检测和评估研究数据与代码的共享遵从情况", url: "https://www.science.org/", tags: "英文文献" },
    { category: "英文文献检索", name: "Cell", brief: "Cell 是生命科学领域最具影响力和权威性的顶级学术期刊之一，与《Nature》和《Science》齐名，被誉为“世界三大顶级期刊”（CNS）。它以其极高的学术标准、严格的审稿流程和发表具有广泛生物学意义的重大原创性研究而闻名。", functions: "1.资源特色\n①创刊于1974年，由Cell Press细胞出版社出版，是国际顶尖的生命科学周刊之一，期刊涵盖细胞生物学、分子生物学、神经科学、免疫学、病毒学、癌症、人类遗传学等多个实验生物学领域\n③期刊出版模式多样，提供25种订阅型全文期刊以及20余种开放获取期刊，学科范围包括临床医学、基础医学、生物化学、遗传学、化学、物理、环境科学与工程、材料科学与工程等\n2.核心影响力\n①2025年JCR影响因子为42.5，在“生化与分子生物学”及“细胞生物学”两个小类中均为Q1区，连续多年位列生命科学领域前列\n②采用严格的同行评审，官方初审时长约8天，审稿周期平均2个月，通过率仅约5%，竞争极其激烈", url: "https://www.cell.com/", tags: "英文文献" },
    { category: "英文文献检索", name: "Springer", brief: "施普林格（Springer）期刊包括 2900 余种期刊，涵盖了科学、技术、医学、人文和社会科学等广泛的学科领域，一直是各领域专家阅读、参考并为之撰写论文的重要研究来源。施普林格的学术期刊致力于推动知识在全球研究人员和专业人士间的传播，可通过SpringerLink平台获取。", functions: "1.学术期刊\nSpringer出版大量高影响力的学术期刊，覆盖所有STM领域。许多期刊拥有高的影响因子，是研究人员发表研究成果和追踪前沿的首选平台之一\n2.学术图书\n这是Springer的传统强项和标志性产品。其出版的图书包括：\n①教科书（Textbooks）：经典的教学用书\n②专著（Monographs）：深入探讨特定主题的学术著作\n③会议论文集（Proceedings）：收录学术会议发表的最新研究\n④参考书（Reference Works）：如百科全书、手册等\n3.数字平台与数据库：\n①SpringerLink：这是Springer的核心在线门户，用户可以通过该平台检索、浏览和下载其绝大多数的期刊文章、电子书和参考工具书\n②专业数据库：Springer还提供一系列高度专业化的数据库，如SpringerProtocols：分子生物学实验室方法的权威数据库；SpringerMaterials：关于材料性质和数据的综合数据库", url: "https://link.springer.com/", tags: "英文文献" },
    { category: "英文文献检索", name: "APS", brief: "APS（American Physical Society，美国物理学会）是全球最具声望的物理学专业学会之一，也是物理学领域最权威的学术出版机构和领导者。", functions: "1.文献检索与获取\n①检索物理评论系列期刊（PRL、PRX、PRA–PRE等）及PROLA过刊库（1893年至今）的论文\n②按编辑推荐、亮点论文、里程碑论文等分类筛选高价值文献\n2.学术会议服务\n①使用会议APP查看议程、管理日程、联系参会者\n②线上虚拟会议支持聊天、评论和论文分享\n3.职业发展支持\n①查阅年度职业指南，获取学术、国家实验室、企业等就业信息\n②参加产业导师计划（IMPact），链接业界专家\n③浏览物理领域招聘公告板（APS Physics Jobs）", url: "https://www.aps.org/", tags: "英文文献" },
    { category: "英文文献检索", name: "IOP", brief: "IOP（全称 IOP Publishing，曾用名Institute of Physics Publishing）是物理科学与相关领域全球领先的专业学术出版机构。它隶属于英国物理学会（IOP），但其出版物覆盖的范围远不止物理学，已扩展到材料科学、天文学、生物物理学、工程学等多个领域。", functions: "1.核心特色与影响力\n①物理与交叉学科的权威平台：Journal of Physics系列覆盖物理各子领域，同时在材料科学、工程物理、生物物理等交叉学科享有权威地位。\n②严格同行评审：坚持高标准的科学严谨性和可靠性，在其期刊上发表论文被公认为重要成就。\n2.文献检索\n①IOPscience平台检索100余种期刊和850余种电子图书，支持“相关文章”智能推荐，帮助拓展文献视野。\n②免费浏览器扩展GetFTR：在任意网页点击DOI即可一键跳转IOPscience正式版本，并显示撤稿与勘误提醒。\n3.开放获取与作者服务\n①旗舰OA期刊《New Journal of Physics》享有高声誉，对中低收入国家提供APC豁免或折扣。\n②CRediT贡献角色分类：作者可从14个标准化角色中勾选个人贡献，确保分工被准确记录。\n③免费开放数据课程与数据政策：指导研究者规范共享数据，提升研究透明度和可复现性。", url: "https://iopscience.iop.org/", tags: "英文文献" },
    { category: "英文文献检索", name: "ASCE", brief: "美国土木工程师学会（American Society of Civil Engineers，简称 ASCE）是全球土木工程领域最具影响力的专业机构之一。它远不止是一个简单的学术组织，而是一个集行业倡导、继续教育、技术标准制定、学术出版和全球社区建设于一体的综合性学会。", functions: "1.馆藏特色\n①所有资源整合于ASCE Library平台，馆藏量超过20万篇文献、250万页内容，且以每年6,000篇的速度增加\n②出版物涵盖工程力学、结构工程、岩土工程、环境、交通、水利、城市规划、项目管理、建筑材料等超过18个核心学科", url: "https://www.asce.org/", tags: "英文文献" },
    { category: "英文文献检索", name: "MathSciNet", brief: "MathSciNet 是由美国数学学会（American Mathematical Society, AMS） 运营的权威、专业的数学评论数据库。它是全球数学领域最重要的文献检索和评论资源，被誉为数学界的“黄金标准”。", functions: "1.资源特色\n①美国数学学会（AMS）出版的数学领域权威书目及引文数据库，收录全球数学、统计学及相关交叉学科的核心文献\n②涵盖期刊论文、图书、会议录等，最早回溯至1864年，数据量持续更新\n2.文献检索\n①数学主题分类（MSC）系统：采用AMS创建的层次化数字编码对每篇文献进行标引，支持极为精准的主题检索，避免关键词歧义\n②高质量数据与作者识别：自动归集同一作者全部作品（无论姓名拼写变化），支持作者检索及引文分析\n③检索结果可查看参考文献与被引用信息，追踪学术影响力\n3.MR Review（专家评论）\n①MathSciNet的灵魂功能：每篇收录的重要文献均由AMS邀请领域专家撰写评论\n②评论不仅总结摘要，还评价论文的贡献、方法、局限及学科定位，说明与已有研究的关系", url: "https://mathscinet.ams.org/mathscinet/publications-search", tags: "英文文献" },
    { category: "英文文献检索", name: "PNAS", brief: "PNAS（Proceedings of the National Academy of Sciences of the United States of America，《美国国家科学院院刊》）是全球最负盛名的多学科综合性科学周刊之一，以其高影响力、广泛的学科覆盖和独特的出版流程而闻名。", functions: "1.双轨投稿制度\n①直接投稿：面向全球学者，匿名同行评审，接受率约13%\n②院士供稿：NAS院士每年可贡献2篇，自行组织评审，发表率超98%，首页标注“Contributed by”\n2.科学传播\n①PNAS Science Sessions播客：免费收听，顶尖学者探讨论文背后故事\n②免费科普视频及新闻特写，连接科研与公共政策\n3.文献检索\n①Early Edition每日更新：定稿后先于印刷版在线发表\n②提供特征因子、Altmetric等实时文章级别度量\n③支持高级检索（字段限定、布尔逻辑），导出多种引文格式", url: "https://www.pnas.org/", tags: "英文文献" },
    { category: "英文文献检索", name: "IEEE Xplore", brief: "IEEE Xplore（全称 IEEE Xplore Digital Library）是全球电气电子工程、计算机科学、电子技术及相关领域最权威、最核心的在线数字资源库之一。它由全球最大的专业技术组织之一——IEEE（电气与电子工程师学会） 提供。", functions: "1.资源特色\n①由国际电气与电子工程师学会（IEEE）运营，是电气电子、计算机、人工智能等领域最权威的学术资源平台\n②提供期刊、会议论文、技术标准及电子图书的全文访问，期刊文献可回溯至1884年\n③最重要的特色是收录了全球几乎所有顶尖国际会议（如CVPR、INFOCOM）的论文，是追踪最新技术突破和前沿动态的核心渠道\n2.文献检索\n①支持基本检索和高级检索，可按作者、出版物标题、资助机构等多字段精确查询\n②支持邻近运算符（NEAR）、通配符（*、?）等高级检索技巧\n3.AI工具\n①Research Navigator：支持自然语言提问和长文本检索，能智能捕捉查询意图并推送相关论文及摘要\n②AI Overview：基于大型语言模型生成对用户问题的AI回答和AI文章摘要，帮助快速了解主题\n③Reading Lens：自动识别并高亮50余类关键技术术语，并提供基于IEEE文献大模型生成的术语定义，助你快速克服阅读障碍\n④IEEE Image Search：允许从文献的图片、图表中进行搜索，使用户能直观地查找相关技术方案或数据图示", url: "https://ieeexplore.ieee.org/Xplore/home.jsp", tags: "英文文献" },
    { category: "英文文献检索", name: "PubChem", brief: "PubChem 是由美国国家生物技术信息中心（NCBI）维护的免费化学数据库，它是全球最大、最全面的公开化学信息库之一，主要服务于生命科学和化学领域的研究人员、学生和教育工作者。", functions: "1.重要数据库：\n①Compound 数据库（化合物）\n这是经过计算机处理的标准化数据库。它将来自不同来源的同一分子进行归一化处理，生成一个唯一的、权威的条目（CID, Compound ID）\n②Substance 数据库（物质）\n这是一个信息库，存储了来自数百个数据提供者（如药企、学术机构、政府机构）的具体样品信息。同一个化合物分子，可能因为来自不同的供应商、以不同的盐形式存在、或具有不同的纯度，而在Substance数据库中拥有多个条目（SID, Substance ID）\n③BioAssay 数据库（生物活性）\n这是PubChem最具特色的数据库之一，专门存储生物活性筛选实验的结果。它包含了成千上万个高通量筛选实验（HTS）的数据，记录了哪些化合物（CID）在哪些实验（AID, Assay ID）中表现出了活性，以及活性的具体数值（如IC50, EC50, Ki值）", url: "https://pubchem.ncbi.nlm.nih.gov/", tags: "英文文献" },
    { category: "英文文献检索", name: "APA", brief: "美国心理学会（American Psychological Association，APA）成立于1892年7月，总部位于美国马萨诸塞州克拉克大学，创始人为斯坦利·霍尔，是国际规模最大的心理学学术组织。它主要有两大职能：1. 专业的学术组织 和 2. 权威的出版机构。其中，其制定的 APA格式（出版手册） 在全球社会科学领域具有巨大影响力。", functions: "1.学术与职业服务\n①举办年会：汇集全球心理学家分享最新研究成果\n②制定伦理标准：颁布《心理学家的伦理原则和行为规范》，提供道德指南，APA格式（出版手册） 在全球社会科学领域具有巨大影响力\n③倡导公共政策：基于心理学证据向政府提供心理健康、教育、医疗等政策建议\n④资格认证：认证临床心理学、心理咨询等博士培养项目和实习机构\n2.出版与文献资源\n①学术期刊：出版约90种同行评审期刊，覆盖心理学全学科\n②学术书籍：出版大量学术专著、教科书和参考书\n③APA PsycINFO数据库：文摘索引数据库，收录全球心理学及相关学科文献摘要，是心理学文献检索的必备工具", url: "https://www.apa.org/", tags: "英文文献" },
    { category: "英文文献检索", name: "ACS", brief: "ACS（American Chemical Society，美国化学会）是全球最大的科学学会之一，也是化学领域最权威、最具影响力的出版机构和专业组织。它远不止是一个出版社，而是一个集学术出版、学术会议、化学教育、职业发展、公共政策倡导于一体的综合性共同体。", functions: "1.文献检索\n①可访问68种同行评审期刊、1600多本图书及130万篇文献\n②按学科分类浏览，导出RIS/BibTeX等多种引文格式\n2.开放获取出版\n①所有期刊均提供OA选项，含19种完全OA期刊和80余种混合期刊\n②通过机构协议或资助机构减免文章处理费（APC）\n3.学术会议\n①参加每年两次的全球年会，参与数千场专题报告和海报展示\n②使用会议APP管理日程，部分会议支持线上直播或远程参与\n4.会员与职业发展\n①会员可免费下载期刊文章、订阅C&EN新闻杂志、访问LinkedIn Learning\n②获取职业咨询、简历润色服务及求职平台C&EN Jobs\n5.化学文摘SciFinderⁿ\n①CAS开发的权威科研工具，集成文献、物质和反应三大检索模块\n②支持化学结构式精确检索及逆合成分析，辅助实验设计", url: "https://www.acs.org/", tags: "英文文献" },
    { category: "英文文献检索", name: "EBSCO", brief: "EBSCO是研究数据库、电子期刊和电子包订阅管理、图书收藏开发和采购管理的领先提供商，也是图书馆技术、电子书和临床决策解决方案的主要提供商，为大学、学院、医院、公司、 政府、K12 学校和全球公共图书馆。", functions: "1.资源特色\n①EBSCOhost研究平台：直观的在线检索平台，可访问300多个数据库、数十万种电子期刊和数百万篇学术文献\n②ASC综合学科全文库：收录20,000余种期刊索摘，提供8,800余种全文期刊（其中7,700多种为同行评审），最早回溯至1887年\n③BSC商管财经全文库：收录8,000余种期刊索摘，3,700余种期刊全文，以及8万余种非期刊全文（如案例分析、国家及产业报告）\n④ EBSCO电子书：平台可同步检索电子书和有声书，显示在数据库检索结果中，方便发现馆藏更多内容\n2.EBSCO发现服务（EDS）\n①一站式发现全球海量学术资源，覆盖全球9万多家期刊和图书出版社的海量中外文资源，资源类型包含学术期刊、论文、传记、音视频、评论、新闻等\n②提供高质量元数据与相关性排序，整合馆藏订购资源、开放获取资源及特色自建库，通过独特算法，将海量文献汇编成序，优先显示高质量结果\n③支持高级检索、全文检索、二次检索；融合3,500多种OA开放获取平台，含27,000多种OA期刊，可通过EDS直接获取全文\n3.个人文献管理\n①My EBSCOhost个人账户：免费注册，支持保存文献、检索式与检索历史，依个人习惯进行分类整理\n②文献提醒：可为特定检索式或特定期刊设置邮件或RSS提醒，系统自动推送新增匹配文献\n③引文导出：可直接从数据库导出RIS、BibTeX等格式引文，无缝对接EndNote、Zotero等管理工具\n4.商用技术分析\n①Business Source系列：商管财经类学术前沿文献追踪平台，提供公司/行业/市场研究报告、国家经济分析资料\n②收录多家重要学协会期刊（如INFORMS运筹学与管理科学学会、美国管理学会、美国会计学会等）所有官方期刊，且无延迟收录，含众多FT50与UTD24顶级期刊", url: "https://www.ebsco.com/", tags: "英文文献" },
    { category: "英文文献检索", name: "Annual Reviews", brief: "Annual Reviews（年度综述）是一个非营利性出版机构，在全球学术界享有极高声誉。它专注于出版一系列高度权威、极具影响力的综述期刊。 核心价值与特色 Annual Reviews 的核心价值在于其无与伦比的权威性和为学术界节省时间的巨大能力。", functions: "1.资源特色\n①由领域顶尖科学家撰写综述，每篇平均30页并含约130篇参考文献，内容经过编委会与累计式同行评审双重审阅\n②覆盖生物学、医学、物理学、社会科学等40多个学科，是获取学科前沿综述的核心资源\n2.文献检索\n①提供高级检索，可按标题、作者、摘要、全文、图表说明等字段限定，支持布尔逻辑运算\n②检索结果可导出RIS、BibTeX等引文格式\n③每篇论文的参考文献均可直接链接查看，支持按作者、文献跨库追踪\n3.个人文献管理\n①注册个人账号后可保存检索式和收藏文献，设置邮件提醒跟踪新文章或新被引\n②平台支持移动端自适应访问，机构用户可通过校外认证远程访问", url: "https://www.annualreviews.org/", tags: "英文文献" },
    { category: "英文文献检索", name: "JSTOR", brief: "JSTOR（Journal Storage）是一个成立于1995年8月的非营利性学术期刊数字化机构，由美国安德鲁·梅隆基金会发起。其主要目的是通过对核心学术过期期刊进行数字化存档，以解决图书馆的存储空间与维护成本问题。该数据库收录了超过2700种学术期刊，涵盖政治学、经济学、历史、哲学等人文社科及自然科学领域，文献最早可回溯至1665年。", functions: "1.资源特色：收录超过2,800种期刊、15万册电子书及数百万份一手史料（手稿、信件、政府文件等），覆盖人文社科、自然科学等75个学科领域\n2.文献检索\n①支持基本检索和高级检索，可按全文、作者、文摘、标题等字段限定，支持布尔逻辑（AND/OR/NOT）、引号精确匹配、通配符（*/?）等检索技巧\n②高级检索可限定文献类型（期刊文章、图书章节、研究报告等）、出版年代、学科范围等条件；支持按学科主题、刊名、出版社、图像等多种浏览方式\n③检索结果页左上角可选择“Keyword”关键词检索或“Semantic”语义检索模式，系统基于AI理解查询意图推荐概念相关的内容\n3.Workspace个人工作区\n①注册免费个人账号后使用Workspace，可将文章、图书章节、图片保存至自定义文件夹，添加标注和说明；支持上传个人文件与JSTOR资源整合于同一工作区\n②支持将文件夹分享给同机构的合作者；可将选中内容导出为PDF参考列表、PPT演示文稿或ZIP压缩包\n4.AI工具\n①在文章、图书章节或研究报告页面，AI研究工具在右侧边栏提供“What is this about？”等预设提示，可基于当前文献内容生成摘要和要点；选中文字后AI可帮助查找文中相关内容和JSTOR平台上的其他相关文献\n②支持自然语言提问，AI仅基于当前文献的全文和元数据回答，回答附带内嵌引用链接；使用前需用个人账号登录\n③语义检索：在检索结果页将模式切换为“Semantic Results”，AI基于大语言模型理解查询意图，推荐概念相关的内容", url: "https://www.jstor.org/", tags: "英文文献" },
    { category: "英文文献检索", name: "ProQuest", brief: "ProQuest是一个全球性的、内容极其丰富的综合信息与学术资源平台，主要为全球的图书馆、学校、企业和政府机构提供信息资源解决方案。它不是一个单一的数据库，而是一个庞大的数字资源聚合平台和发行商。", functions: "1.资源特色\n①学术期刊：提供数以万计的学术期刊，覆盖科学、技术、医学、人文社科等所有主要学科，许多内容提供全文访问\n②博硕论文：PQDT全球学位论文库收录全球5000多所大学的数百万篇博硕士论文摘要和索引，其中超300万篇可提供全文PDF，是追踪前沿、避免重复研究、学习研究方法论的核心工具\n③新闻与报纸：历史报纸数据库提供世界知名报纸的数字化档案，可检索和查阅上百年前的新闻原文\n④电子书：提供来自数千家出版社的海量电子书，涵盖学术专著、专业书籍和大众读物\n⑤原始历史档案与特藏：拥有大量独一无二的数字化历史档案集，如美国政府文件、英国殖民地档案、早期印刷书籍、美国民权运动原始资料等，为深入研究提供第一手材料", url: "https://www.proquest.com/", tags: "英文文献" },
    { category: "英文文献检索", name: "arXiv", brief: "arXiv是一个完全免费的、开放获取的学术预印本服务器。它是最重要、最知名的未经过同行评审的论文预印本发布平台，在全球学术界，特别是在物理学、数学和计算机科学等领域，具有巨大的影响力。", functions: "1.学术交流加速器\n①在传统期刊出版前即可公开发布论文手稿，将发表周期从数月压缩至即时\n②对作者：快速宣布研究成果、确立首发优先权，及时获得全球同行的初步反馈\n③对读者：免费、即时获取最前沿研究进展，许多颠覆性重大发现首先出现在arXiv\n2.资源特色\n①全球最大的预印本平台，收录论文超260万篇，每月新增约2万篇，月活用户超500万\n②覆盖物理学、数学、计算机科学、统计学、定量生物学、金融学等学科", url: "https://arxiv.org/", tags: "英文文献" },
    { category: "英文文献检索", name: "Cambridge Core", brief: "Cambridge Core 是剑桥大学出版社最新发布的学术资源平台。包括的电子书涵盖了剑桥大学出版社的全学科，均为知名的有影响力的图书收藏。其中人文社科类图书占70%左右, 大约8000余本，理工类4000多本。这里面既有经典图书 (图书回溯到1950年)，也有最新的图书。每月都会有新内容上线，一年多次定期平台功能升级和更新。", functions: "1.资源特色\n①整合剑桥大学出版社所有电子资源，一站式访问超过420种同行评审期刊、49,000+本电子书，文献总量超过180万篇期刊文章\n②平台收录了大量经典与前沿文献，最早可回溯至18世纪，作者队伍中包含多位诺贝尔奖和菲尔兹奖得主\n2.文献检索\n①支持一键式快速检索，可在所有期刊和图书中查找文献；高级检索支持限定作者、题名、出版年份等多条件组合查询\n②按学科体系分类导航（科学与技术合集、人文与社科合集、医学合集），从期刊或图书主页可按卷期浏览文章，快速定位目标文献", url: "https://www.cambridge.org/core", tags: "英文文献" },
    { category: "英文文献检索", name: "Sci-Down", brief: "Sci-Down是一个面向科研人员的文献检索与下载平台，支持通过 DOI、标题、关键词或作者搜索文献，并提供离线下载和智能翻译功能。", functions: "1.文献检索与获取\n①支持DOI、文献全名、关键词、标题、作者、参考文献等多种检索方式\n②在线预览PDF/EPUB格式，支持批量下载（命令行工具及API接口）\n③作为Sci-Hub的重要互补工具，自动智能切换可用节点", url: "https://www.scidown.cn/", tags: "英文文献" },
    { category: "英文文献检索", name: "RePEc", brief: "RePEc创建于1997年，是由分散在全球51个国家的100多名志愿者无偿建立的合作型数据库系统，致力于收集和传播经济学工作论文、期刊文章及软件工具等研究成果。其核心是一个经济学的工作论文、期刊文章以及应用软件的数据库。", functions: "1.资源特色\n①全球最大的经济学开放获取书目数据库，由全球志愿者协作维护，收录530万条研究条目（工作论文、期刊文章、图书章节等），其中470万条提供全文下载\n②数据来自2,000多个参与机构（包括Elsevier、Springer等主要出版商），内容最早可追溯至1990年代\n2.文献检索\n①通过IDEAS（美联储圣路易斯分行）或EconPapers两大平台检索，支持标题、作者、JEL分类代码等字段限定及布尔逻辑\n②可查看每篇文献的参考文献和被引信息，支持向前向后追溯学术脉络\n3.特色服务\n①NEP新经济论文报告：每日邮件推送90余个经济学细分领域的最新工作论文，是平台最具特色的主动推送服务\n②RePEc Biblio精选文献集：领域专家精选的核心文献，按树状结构组织，可逐级下钻探索分支方向", url: "http://repec.org/", tags: "英文文献" },
    { category: "英文文献检索", name: "JAMA", brief: "JAMA（The Journal of the American Medical Association，《美国医学会杂志》）是全球最著名、最权威的综合性医学期刊之一，与NEJM、The Lancet和BMJ并称为“四大顶级医学期刊”。JAMA 的核心价值在于其权威性、广泛的影响力和对临床实践的指导作用。", functions: "1.资源特色\n①访问JAMA主刊及JAMA Network Open、JAMA Health Forum等13本临床医学期刊的全文\n②获取原创研究、系统综述、临床指南等经过严格同行评审的内容\n2.文献检索\n①通过作者、日期、文章类型等多维度组合检索，快速锁定目标文献\n②订阅特定主题或检索式的邮件提醒，第一时间获取新文献\n③一站式检索所有子刊，系统自动推荐相关文章\n3.多媒体学习\n①观看手术视频、专家访谈及临床技术更新\n②通过官网或JN Listen App收听播客，包括主编总结和临床评论\n③利用JAMA+专题网站（如JAMA+ AI、JAMA+ Women's Health）深入学习特定领域\n4.个人学术档案\n①系统自动生成作者档案，统计发文量\n②档案可连接ORCID和SciENcv平台同步", url: "https://jamanetwork.com/", tags: "英文文献" },
    { category: "英文文献检索", name: "NEJM", brief: "《新英格兰医学杂志》（The New England Journal of Medicine，简称NEJM）是全球享有盛誉的顶级综合性医学期刊，也是“四大顶级医学期刊”之首 。NEJM以其科学严谨性、学术权威性和临床相关性著称。它发表的许多研究常能改变全球的临床实践指南。其影响因子长期位居全球医学期刊前列，这反映了其学术影响力。", functions: "1.资源特色\n①创刊于1812年，世界四大顶级医学期刊之一，2024年影响因子78.5，全科医学领域排名第一\n②涵盖原创研究、综述、病例报告、社论等，每期至少有一项研究成果直接改变临床实践\n③子刊群：NEJM Evidence（循证方法）、NEJM Catalyst（医疗服务创新）、NEJM AI（医学人工智能）\n2.文献检索\n①支持基本检索和高级检索（作者、卷期、文章类型、布尔逻辑），结果可按学科、被引次数筛选\n②免费注册个人账户，每月可免费阅读一篇订阅文章；绑定机构后可远程访问\n③保存文章和检索式，设置20个医学专科的主题邮件提醒", url: "https://www.nejm.org/", tags: "英文文献" },
    { category: "英文文献检索", name: "BMJ", brief: "BMJ的全称是British Medical Journal（英国医学杂志）。它创刊于1840年，是全球顶级综合医学期刊，由英国医学会（BMA）出版。", functions: "1.资源特色\n①创刊于1840年，世界四大顶级医学期刊之一，以“直接改善患者健康”为宗旨，研究成果常受全球媒体与政界关注\n②旗下69余种医学期刊，包括完全开放获取期刊及混合型期刊\n2.独特服务\n①BMJ Best Practice：循证临床决策支持工具，涵盖90%以上常见病症，提供诊断、治疗和管理的快速指导，支持移动端离线使用\n②为患者和公众评审员支付酬劳（50英镑或一年在线订阅），确保研究回应患者关切（2025年起）\n③率先要求投稿作者共享原始数据与分析代码，提升研究复现性\n3.临床工具与教育资源\n①提供500多份患者传单、250多个医学计算器及共病管理器，集成临床参数\n②移动APP自动追踪继续医学教育/职业发展（CME/CPD）活动，可与电子病历系统集成", url: "https://www.bmj.com/", tags: "英文文献" },
    { category: "英文文献检索", name: "The Lancet", brief: "The Lancet（中文常译为《柳叶刀》）是全球最具影响力和历史最悠久的综合性医学周刊之一，与NEJM、JAMA和BMJ并称为“四大顶级医学期刊”。它以其极高的科学权威性、对社会公平的倡导和全球健康的关注而闻名于世。", functions: "1.核心影响力\n①论文发表的至高荣誉，代表工作具有全球性影响\n②在线投稿系统与同行评审，稿件未被接受可免费转移至旗下其他期刊并附带审稿意见\n2.资源特色\n①获取最新、最能改变临床实践的科学证据和深刻全球卫生见解的核心来源\n②免费注册账号后可访问额外内容，自定义文章更新和阅读列表", url: "https://www.thelancet.com/", tags: "英文文献" },
    { category: "英文文献检索", name: "Anna's Archive", brief: "安娜的档案是一个非营利性的开源搜索引擎，它本身并不托管非法资源，而是通过聚合全球各大知名数字图书馆（如 Library Genesis, Z-Library, Sci-Hub 等）的元数据，为用户提供一个统一的搜索入口。其宗旨是保存人类知识的火种，确保即便在某些平台失效的情况下，人类文明的数字记录依然可以被检索。", functions: "1.资源特色\n①自称为“人类历史上最大的完全开放图书馆”，整合Z-Library、Library Genesis（创世纪图书馆）和Sci-Hub三大影子图书馆资源，聚合超过3500万册图书和1亿篇学术论文的元数据\n②自身不直接存储文件，而是提供指向第三方来源（Z-Library、LibGen、Sci-Hub）及IPFS、BitTorrent等多渠道下载链接\n③已发布总量超过521TB的种子文件，并通过IPFS分布式存储进行去中心化备份，数据涵盖书籍、论文、杂志及元数据记录\n2.文献检索\n①支持按标题、作者、ISBN、DOI、MD5等多种方式检索，覆盖多语言（含中文简繁体）\n②结果可按语言、文件格式（PDF/EPUB）、内容类型（书籍/小说/漫画/杂志）、新旧程度等筛选，亦可按随机排序\n③搜索结果页面标注文件来源库（Z-Library/LibGen/Sci-Hub），并提供低俗（免费需过验证码）和高速（付费会员）两种下载通道\n3.数字保存\n①通过IPFS星际文件系统和BitTorrent技术实现数据分布式存储，防止单点失效或被屏蔽导致的数据完全丢失\n②公布521TB种子文件及全部源代码和元数据，鼓励全球志愿者参与数据镜像备份\n③2025年完成对Spotify平台256亿条元数据和8600万个音乐文件的抓取存档，构建全球最大公开音乐元数据库\n4.隐私保护与开源生态\n①支持Tor匿名访问，承诺不记录任何搜索与下载历史\n②平台代码和元数据完全开源，鼓励全球开发者参与共建“图书馆备份计划”\n③ 非官方生态系统丰富：存在多种第三方API封装库（Dart/Python/JS）及CLI命令行工具（annas-mcp），支持编程式批量检索和下载", url: "https://annas-archive.io/", tags: "英文文献" },
// ===================== 专利检索 =====================
{ category: "专利检索", name: "专利检索及分析", brief: "国家知识产权局专利检索及分析系统是由中国国家知识产权局（CNIPA）官方推出的免费、权威、功能强大的专利信息服务平台，面向公众、企业、科研机构和知识产权从业者提供全面的专利数据检索、分析与下载服务。", functions: "1.专利检索\n①提供常规检索、高级检索、命令行检索、药物检索、导航检索、专题库检索等多种检索方式\n②支持法律状态查询、同族查询、引证/被引证查询等\n2.数据分析\n①支持申请人分析、发明人分析、区域分析、技术领域分析等\n②自动生成图表，支持图表保存与导出\n3.其他服务\n①专利全文PDF批量下载\n②提供英文、日文文献摘要及全文的机器中文翻译", url: "https://pss-system.cponline.cnipa.gov.cn/conventionalSearch", tags: "专利检索" },
{ category: "专利检索", name: "专利信息服务平台", brief: "CNIPR是由知识产权出版社有限责任公司开发和运营的商业级专利检索与分析系统，是目前中国最主流的商业化专利数据库之一。", functions: "1.专利检索\n①提供中国专利（含港澳台）、国外专利的检索服务\n②支持法律状态检索、失效专利检索、运营信息检索\n2.专利评估系统\n①提供 P2I（Patent to Intelligence）专利价值评估系统，基于大数据处理和语义智能技术，利用专利生命周期、行业类比运营数据等实时预估专利价格\n②集成中国专利信息中心的 PATENT RANK 5.0 系统，从法律、技术、经济维度对中国发明、实用新型专利进行在线自动评价\n3.专利分析系统\n①支持总体、区域、申请人、发明人、技术分类（IPC）五个核心维度的统计分析\n②提供“自建库”和“标引分析”功能，可在自有专利库中进行深度定向分析\n③生成专利地图、技术趋势图、竞争态势图等可视化图表\n4.专利机器翻译\n①新一代“中知慧译”AI专利文献翻译系统，支持中、英、日、德、韩五国语言间的双向互译\n②提供计算机辅助翻译功能（模板、术语词典、相似句复用）\n5.高价值专利挖掘系统\n①基于专利评估与分析系统的综合能力，自动识别和挖掘技术质量高、法律稳定性强、市场应用前景好的专利组合\n②结合专利导航和产业专题数据库，辅助用户发现潜在的高价值专利和空白技术点", url: "http://search.cnipr.com/", tags: "专利检索" },
{ category: "专利检索", name: "专利之星", brief: "专利之星是由中国国家知识产权局主管、中国专利信息中心开发并运营的官方专利检索与分析平台。", functions: "1.专利检索\n①提供中国专利（不含港澳台）、国外专利的检索服务\n②支持表格检索、专家检索、单号检索", url: "https://www.patentstar.com.cn/", tags: "专利检索" },
{ category: "专利检索", name: "专利汇", brief: "PatentHub专利汇整合了全球104个国家和地区超过1.68亿专利数据，提供检索、分析、下载及监控等服务。", functions: "1.专利情报系统：专利检索、统计分析、可视化管理\n2.专利挖掘系统：专利地图、专利组合分析、企业画像\n3.专利预警系统：竞争监控、领域监控\n4.专利交易平台：专利买卖市场\n5.专利数据服务：API接口数据服务、数据本地化、专利导航专题库服务\n6.专利工具集：专利进度查询、专利年费计算、排行榜等", url: "https://www.patenthub.cn/", tags: "专利检索" },
{ category: "专利检索", name: "上海市知识产权专利检索分析平台", brief: "上海市知识产权局主办的公益性专利信息服务系统，重点支持新能源、生物医药、集成电路等产业。", functions: "1.专利检索\n①支持申请号/公开号、申请人/发明人、关键词、法律状态、IPC分类检索、外观分类检索\n②提供概念检索、企业名称关联检索、中英文双语检索等辅助功能\n③检索结果可一键收藏至个人自建库\n2.专利分析系统\n①配置国家知识产权局在线专利信息分析系统\n②支持申请人、发明人、IPC分类、技术领域等多维度统计分析及图表展示\n3.专利导航\n①已发布56项市级专利导航项目成果，覆盖新能源、生物医药、集成电路、汽车制造等重点产业\n②描绘产业技术路线图、市场竞争格局和创新突破方向\n4.专利交易与价值评估\n①提供专利价值评估功能，支持专利交易对接服务\n5.专利预警与定制服务\n①支持特定技术领域或竞争对手的专利监控与预警\n②提供专利信息定制推送服务\n6.专题数据库与自建库\n①建设12个专利专题数据库，覆盖上海重点产业\n②提供自建库功能，已形成50个公共专利库与132个用户自建库\n7.其他特色服务\n①高校和科研机构存量专利盘活行动：公开存量专利，推动供需对接与转化运用\n②知识产权综合管理系统：支持在线知识产权信息管理和专利申请流程管理", url: "https://xxfw.sipa.sh.gov.cn/search/#/home", tags: "专利检索" },
{ category: "专利检索", name: "北京市知识产权公共信息服务平台", brief: "北京市知识产权局主办的公益性城市创新公共信息服务基础设施，涵盖专利、商标、地理标志等多元数据。", functions: "1.专利检索\n①支持法律状态检索、逻辑检索、检索提示、同义词检索、关键字检索、二次检索、IPC提示检索、企业名称关联检索、表格检索、批量下载等功能\n②面向全球提供专利文献数据超1.74亿件\n③配备专利文献在线翻译功能，并对同词不同意词汇进行汇总甄别，建立专项数据词库\n④支持化学结构式检索\n2.数据统计分析\n①支持对专利申请量、授权量、有效专利及PCT数据的实时视频率统计分析\n②利用可视化工具实现对行业词表、园区企业等词表的定时管理，支持数据更新后实时刷新分析结果\n③提供集成电路布图设计数据的检索、查询及统计分析服务，助力芯片产业链前端设计\n3.专利专题数据库\n①已发布六大类重点产业专利专题数据库，涵盖北京市九大战略性新兴产业、十大高精尖产业、数字经济产业、未来产业、网络安全产业等，下设40个二级产业、190个细分技术领域\n②在未来产业方向建成包含355个中英文专利检索式的专题数据库，供社会公众查询使用\n③提供高级分析（多维筛选、检索提示、批量下载等）功能，帮助创新主体调研特定技术领域的热点和空白点\n4.知识产权综合信息服务\n①提供政策法规、知识产权保护、专利预警、经典案例、行政处罚及司法判例等专业专题专栏\n②整合中国商标、中国版权、林业新品种、农业新品种、中外专利数据库服务平台等海量数据，提供在线查找服务\n5.专利预警与动态警示\n①提供专利预警支持与动态警示功能，支持对特定技术领域或竞争对手进行持续的专利监控和预警\n②拥有六大突出功能，包括突出政府决策分析、突出预警数据服务、突出专利专题应用、突出专利交易信息等", url: "https://www.beijingip.cn/jopm_ww/loginedPage/web2/onlineSearch/zljsindex.jsp", tags: "专利检索" },
{ category: "专利检索", name: "专利顾如", brief: "PatentGuru国际化知识产权科技公司，提供全球专利检索、分析与监控服务。", functions: "1.专利检索\n①全球专利数据库包含全球120多个国家及地区的超1.6亿条专利数据，每周更新三次\n②提供8种以上检索方式：简单检索、高级检索、语义检索、IPC分类检索、分类号检索、图像检索、法律检索、批量检索等\n③支持检索结果的二次检索、结果过滤、专利对比、图片对比及多种视图模式（列表模式、首图模式、多图模式）\n2.深度分析\n①提供20+分析维度，从技术价值到市场应用潜力全方位剖析专利信息\n②3D分析工具：用三维地形图展示技术竞争态势，波峰代表技术密集区，波谷代表技术空白点，不同颜色标记不同专利权人，直观呈现竞争格局\n③支持创新词云分析、竞争合作分析、技术趋势分析、专利权人排名分析等\n④高校研发版支持从300多个数据维度、500多万个技术主题对各类技术和公司进行深度分析\n⑤所有分析结果支持Excel、图像和PDF格式导出\n3.监控预警\n①支持对任何关键词、申请（专利权）人或发明（设计）人进行监控，每周发布超10万项新增专利\n②支持自定义自动预警格式和频率，可查看存档的历史记录\n③可定时生成技术跟踪报告", url: "https://www.patentguru.com/cn", tags: "专利检索" },
{ category: "专利检索", name: "佰腾专利网", brief: "佰腾网是国内领先的知识产权大数据与智能化服务平台，提供专利检索、分析、管理、交易及代理服务。", functions: "1.专利检索\n①支持简单检索、高级检索、语义检索、IPC分类检索、外观检索、法律检索、二次检索、排除检索、批量检索等9种检索方式\n②收录全球108个国家及地区超1.8亿件专利数据，中国专利数据每周更新两次\n③支持批量导入TXT/EXCEL文件进行多专利号检索\n④提供图像检索功能，支持上传图片比对中国及美国外观设计专利\n⑤支持法律状态细分查询（专利许可、质押等5类）、同族专利、引证信息等深度信息\n⑥配备技术关键词标签推荐检索功能，专利详情页自动列出10个技术关键词并支持一键检索\n2.AI智能应用\n①搭载最新大模型技术，提供检索式生成、知识图谱、侵权对比等智能化辅助工具\n②支持AI语义检索，自动识别技术方案中的现有技术不足和创新技术效果，以标准化格式输出总结\n3.数据分析与报告\n①支持申请人、发明人、IPC分类、技术领域等多维度统计分析和图表展示\n②提供专利价值评估、专利报告统计分析等多种分析功能\n③支持自定义分析及可视化图表呈现\n④面向政府提供知识产权大数据服务系统，实现区域专利总量实时监控、核心产业分析及非正常专利申请预警", url: "https://www.baiten.cn/", tags: "专利检索" },
{ category: "专利检索", name: "SooPAT专利搜索", brief: "SooPAT是一个免费、简洁、高效的中英文专利检索平台。", functions: "1.专利检索\n①中国和世界专利搜索，支持使用中文查询全球各国专利\n②表格检索（多字段组合检索）、IPC分类检索、语句检索\n③高级检索支持字段间逻辑运算（AND、OR、NOT）及模糊搜索\n④检索结果支持二次检索、过滤及多种视图模式（列表模式、多图模式）\n⑤支持关键词检索、申请人检索、发明人检索、申请号检索等多种方式\n⑥智能AI语义检索（高级会员功能），可根据自然语言理解查询意图\n2.专利分析与统计\n①专利分析功能完全免费，可对专利申请人、申请量、专利号分布等进行分析，用专利图表表示\n②支持从申请日、申请人、分类号等多维度进行统计分析\n③支持钻取分析、分析结果的二次分析（高级会员功能）\n3.平台特色与智能辅助\n①智能附图：专利详情页自动显示附图标记含义（高级会员功能）\n②支持图片检索外观专利、发明和实用新型（高级会员功能）\n③检索结果页面的实时分析：高级会员版支持专业级分析\n④支持相似专利检索（高级会员功能）", url: "https://www.soopat.com/", tags: "专利检索" },
{ category: "专利检索", name: "Drugfuture药物在线", brief: "药物在线网站聚焦于全球药物研发信息，提供药物信息资讯、药物科学数据库、专利信息检索下载等。", functions: "1.专利检索\n①中国专利：收录自1985年以来的全部中国专利数据（发明、实用新型、外观设计），支持专利申请号或公开公告号检索，可免费下载PDF/TIF格式全文并支持在线查看，专利原文基于中国国家知识产权局\n②美国专利：可直接下载自1790年至今美国专利商标局公布的所有专利申请公开文本和专利授权文本，提供PDF全文打包下载，支持专利申请公开号（11位）或授权公告号（1-8位数字）检索\n③欧洲及其他国家专利：支持欧洲专利局公布的专利全文下载（PDF格式），可检索的专利覆盖PCT、欧洲、美国、英国、日本、德国、法国等，支持通配符加零补足数字编号\n2.药物及化学数据库\n①美国FDA药品专利库：收录美国FDA认可并公布的所有有效药品专利，支持以专利号或药品通用名等维度检索\n②合成路线数据库：包含近7000种已上市/在研药物的合成路径信息，支持CAS号、通用名、化学名、结构式、分子式等多维度检索\n③药品标准查询：收载国内外药品标准及药典目录和全文（如日本药典JP19版），支持模糊检索和标准索引查询\n④美国FDA药品数据库：可查询药品批准信息、橙皮书专利与独占期数据", url: "https://www.drugfuture.com/patent/", tags: "专利检索" },
{ category: "专利检索", name: "企知道专利检索平台", brief: "企知道是全球科创大数据AI平台，提供高级检索、语义检索、图像检索、批量检索、法律检索及专利分析报告。", functions: "1.专利检索\n①涵盖来自全球多个国家和地区的丰富数据库\n②提供高级检索、语义检索、图像检索、批量检索、法律检索\n2.专利分析：可创建技术全景分析报告、企业专利分析报告、企业专利对比报告、产业专利分析报告、区域专利分析报告", url: "https://patents.qizhidao.com/", tags: "专利检索" },
{ category: "专利检索", name: "度衍专利检索", brief: "度衍专利检索是全球专利大数据平台，拥有1.8亿+全球专利数据，提供多种检索方式和AI工具。", functions: "1.专利检索：提供高级检索、图像检索、智能检索、法律检索等多种检索方式\n2.AI工具：提供智能技术问答、智能专利检索、专利侵权对比、智能申请前评估等功能\n3.工作平台\n①可搭建我的个人专题库、行业专题库\n②提供分析报告管理、标引字段管理、我的商标预警等服务", url: "https://www.uyanip.com/", tags: "专利检索" },
{ category: "专利检索", name: "世界知识产权组织PATENTSCOPE", brief: "WIPO官方运营的全球专利数据库与检索系统，免费开放国际专利信息。", functions: "1.专利检索\n①提供5种检索方式：简单检索、高级检索、字段组合检索、跨语种扩展检索、化合物检索，支持包括中文在内的10种检索语言\n②简单检索下设7个预设字段：首页、任意字段、全文、识别码/编号、国际分类、名称、公布日\n③跨语种信息检索（CLIR）：将检索词自动翻译为13种语言并同时检索，显著扩展检索广度\n④支持IPC（国际专利分类）和CPC（合作专利分类）检索\n⑤化合物化学结构检索：支持结构式和子结构检索，需免费创建WIPO账户后使用\n3.专利数据覆盖范围\n①收录全球1.27亿份专利文献，其中包含540万份已公布的PCT国际专利申请\n②涵盖全球70多个国家及地区专利局的专利文献，包括美国、日本、中国、韩国及欧洲专利局\n③PCT申请每周四公布，当天即可在PATENTSCOPE中检索，快于其他任何数据库\n④2023年起新增非专利文献检索功能，与IEEE合作收录近500万份非专利文献，并配有专用检索字段\n3.专利分析与统计\n①点击检索结果列表中的“分析”图标，可对检索结果进行统计分析和图形化展示\n②可分析多达25条检索结果，默认显示前10个申请人、IPC代码等信息\n③支持同族专利查看，以树状阅览模式呈现专利家族及各局申请进程", url: "https://patentscope.wipo.int/search/zh/search.jsf", tags: "专利检索" },
{ category: "专利检索", name: "美国USPTO", brief: "美国专利商标局官方平台，提供美国授权专利和公开申请的检索服务。", functions: "1.专利检索\n①支持对1976年以来全文的美国授权专利和2001年3月15日之后公布的专利申请进行全文检索，并可浏览和打印1790年以来的专利说明书扫描图像\n②提供基本检索和高级检索两种模式，检索字段涵盖专利权人、发明人、分类号、申请日等\n2.专利电子申请与状态查询\n①专利中心（Patent Center）整合在线专利申请、文件提交、申请状态查询及文件管理功能\n②全球档案（Global Dossier）可供公众查阅美国及其他参与局专利申请的审查历史文件\n3.AI辅助检索工具\n①DesignVision（2025年7月推出）：基于AI的外观设计专利图像检索工具，支持检索全球80多个注册机构的外观设计、商标及工业设计数据\n②Similarity Search：内置于PE2E Search平台，可依据申请文本内容自动生成检索结果\n③Automated Search Pilot Program：在实质审查前为申请人提供AI自动生成的现有技术检索结果", url: "https://www.uspto.gov/patents", tags: "专利检索" },
{ category: "专利检索", name: "欧盟EPO", brief: "欧洲专利局提供全球领先的专利信息和服务体系，核心搜索工具为Espacenet。", functions: "1.专利检索\n①Espacenet：免费检索全球100多个国家/地区的超1.5亿份专利文献，支持智能搜索、高级搜索及CPC/IPC分类检索，内置专利翻译工具Patent Translate\n②Global Patent Index（GPI）及EP全文检索：付费专业工具，满足深层次检索、批量和统计分析需求\n2.专业数据与商业情报服务\n①Open Patent Services（OPS）API：供开发者集成检索、法律状态、专利族等信息\n②PATSTAT数据库：商业用户可进行复杂统计分析、可视化和数据下载；PATSTAT Online提供更便捷的Web访问和数据导出\n3.AI与数字化工具\n①法律互动平台（LIP）：基于生成式AI的专利法对话式问答\n②CPC文本分类器（AI-powered CPC Text Categoriser）：利用AI为技术文本推荐精确的CPC分类号\n③Deep Tech Finder：连接欧洲深度科技初创企业、投资者和高校", url: "https://www.epo.org/en/searching-for-patents", tags: "专利检索" },
{ category: "专利检索", name: "欧洲专利数据库", brief: "Espacenet是由欧洲专利局开发的免费在线专利信息检索系统。", functions: "1.专利检索\n①收录全球100多个国家超1.6亿件专利文献，每日更新，最早可追溯至1782年\n②多模式检索：支持智能搜索、高级检索（字段组合）、IPC/CPC分类检索\n②机器翻译：内嵌Patent Translate工具，支持中、英、日、韩、俄等10余种语言互译", url: "https://worldwide.espacenet.com/", tags: "专利检索" },
{ category: "专利检索", name: "谷歌专利检索", brief: "Google Patents是谷歌推出的免费专利搜索引擎，整合了全球100多个专利局的专利数据。", functions: "1.专利检索\n①收录全球100多个专利局超1.2亿份专利文献，涵盖USPTO、EPO、WIPO、JPO等主要专利机构，支持简单检索（关键词、专利号、发明人、申请人）和高级检索（申请日、专利局、法律状态、CPC分类等字段限定）\n②非英语专利文献自动翻译为英语，支持仅用英文关键词检索外文专利\n2.现有技术与非专利文献集成\n①集成“Prior Art Finder”工具，同时检索专利和Google Scholar中的学术文献，帮助判断发明创新性\n②Google Scholar文献经机器学习进行CPC分类，便于在专利检索中发现非专利文献\n3.专利可视化分析与引文\n①支持专利地图可视化（展示专利与发明人关系图谱）、引文分析（向前/向后引用）、按CPC分类分组查看检索结果\n②提供智能聚类与筛选（按专利状态、诉讼信息等筛选，按专利家族去重）", url: "https://patents.google.com/", tags: "专利检索" },
{ category: "专利检索", name: "澳大利亚专利检索", brief: "AusPat是由澳大利亚知识产权局运营的官方免费专利数据库。", functions: "1.专利检索\n①支持快速检索和结构化检索，检索条件包括分类号、专利号、申请人、发明人或关键词\n②收录1904年以来的澳大利亚专利说明书全文，以及2006年以来的专利申请审查案卷信息\n2.专利类型与法律状态\n①可检索澳大利亚标准专利和创新专利\n②提供专利法律状态查询（有效、审查中、已失效）及缴费信息", url: "https://ipsearch.ipaustralia.gov.au/patents/", tags: "专利检索" },
{ category: "专利检索", name: "韩国工业产权信息服务中心(KIPRIS)", brief: "KIPRIS由韩国知识产权局运营，免费提供韩国及全球主要国家的专利、商标等信息检索。", functions: "1.专利检索\n①提供简单检索和高级检索两种模式，高级检索包含发明名称、IPC、申请号、日期、申请人等多个检索项目，支持布尔逻辑算符（AND/OR/NOT/XOR）、位置算符（NEAR）、短语检索（\"\"）、通配符等检索技巧\n②KPA数据库支持英文关键词检索韩国发明专利，方便非韩语用户使用\n2.分析统计\n①支持对申请人、发明人、分类号、日期等维度进行统计分析，并可定制分析结果\n②检索结果可导出著录项目数据、分类信息、描述和权利要求书、法律状态以及完整的专利扫描件，并支持批量下载\n3.AI数据与开放平台\n①通过KIPRIS Plus平台提供Open API和Bulk Data下载服务，支持用户获取126种知识产权开放数据产品并自建数据库\n②免费开放7类AI学习知识产权数据，包括韩国/美国专利出版物、审查意见书、专利家族机器翻译数据、CPC信息、客户咨询案例集等", url: "https://www.kipris.or.kr/khome/main.do", tags: "专利检索" },
{ category: "专利检索", name: "英国专利检索", brief: "英国专利检索系统（One IPO Search）是英国知识产权局推出的官方专利信息检索工具。", functions: "1.专利检索\n①支持用日常语言描述产品或技术的简单关键词检索，无需掌握复杂技术术语\n②可按专利权利人名称、发明人名称、代理人、关键词、分类号、申请号、公布号、授权日期等多字段检索\n③检索结果可按关键日期、专利状态（有效、审查中、已失效等）、是否开放许可、是否通过绿色通道加速申请等条件筛选\n④支持补充保护证书（SPC）的检索，数据可追溯至1998年\n2.可视化数据分析\n①支持直接从系统生成图表，可视化展示专利申请趋势、申请人排名等信息，便于竞争对手分析和市场趋势洞察\n②检索结果可下载为CSV格式文件，供进一步分析和团队共享\n3.法律状态查询与专利管理\n①通过UKIPO账户可随时检索和查看英国专利的法律状态（有效、审查中、已失效等）\n②支持在线快速修改专利信息，通过数字化自助服务完成专利续展\n③支持在线提交专利申请，可任意顺序填写内容、保存草稿并与同事协作", url: "https://www.gov.uk/search-for-patent", tags: "专利检索" },
// ===================== 文献阅读与管理 =====================
{ category: "文献阅读与管理", name: "Zotero", brief: "Zotero 是一款免费、开源、跨平台的学术文献管理工具，由美国乔治·梅森大学开发，被誉为“科研人的第二大脑”。", functions: "1.抓取文献信息\n①安装浏览器插件（Chrome / Firefox / Edge）后，在 知网、Web of Science、PubMed、IEEE Xplore、Springer、ScienceDirect、Google Scholar 等网站点击 Zotero 按钮，即可自动保存：文献标题、作者、期刊、年份、DOI、PDF 全文\n2.文献库管理\n①支持创建 文件夹、标签、收藏集 分类文献\n②可添加 笔记、高亮、附件（如补充材料、PPT）\n③全文搜索：支持在 PDF 和笔记中关键词检索\n④支持中文界面与中文文献识别（需配置）", url: "https://www.zotero.org/", tags: "文献管理,文献阅读" },
{ category: "文献阅读与管理", name: "EndNote", brief: "EndNote是由科睿唯安开发的旗舰型文献管理软件，与 Web of Science 无缝集成。", functions: "1.文献管理与组织\n①在个人电脑建立本地文献数据库，可按课题、主题等创建多级文献组进行分级管理\n②支持通过过滤器批量导入知网、WoS、PubMed等在线数据库的检索结果\n③支持手工录入题录信息、从已有PDF全文自动抓取元数据生成题录\n④每条文献记录可上传最多45个PDF、PPT、图片等附件完成全文与元数据关联\n⑤可为文献记录添加自定义标签（名称和颜色），方便快速分类检索\n2.边写作边引用 （Cite While You Write）\n①在Word和PPT中安装插件，撰写论文时可一键插入引文，系统自动生成符合投稿期刊要求的参考文献列表，更改引用文献后自动更新全篇编号与文献列表\n②支持Apple Pages、Google Docs、LibreOffice等多款办公软件\n3.AI辅助工具\n①关键提要（Key Takeaway）：基于AI对PDF全文自动提炼结构化要点，帮助快速判断文献相关性\n②Research Assistant（生成式AI工具）：与PDF全文对话问答、自动翻译全文或选中段落、总结选中文字等\n③期刊匹配（Find a Journal）：输入标题与100字内摘要，AI实时推荐适合投稿的期刊\n④Cite from PDF：写作时直接引用PDF内容并自动生成参考文献\n4.协作与共享\n①支持与最多1000名合作者共享个人文献数据库，并可灵活分配“只读”或“读写”权限\n②所有成员对共享库的标注、批注和使用记录可实时同步", url: "https://endnote.com/zh/", tags: "文献管理,文献阅读" },
{ category: "文献阅读与管理", name: "NoteExpress", brief: "NoteExpress是国内主流专业参考文献管理软件，推出跨平台云端版“青提学术”。", functions: "1.一站式文献检索与采集\n①支持CNKI、万方、维普、WoS、PubMed、ScienceDirect等主流中英文数据库联机检索\n②提供浏览器插件一键抓取网页文献题录；支持全文导入、格式化文件导入、手工录入等多种采集方式\n③青提学术内置青提引擎实现智能检索，AI自动生成文献综述\n2.文献分类与管理\n①支持多级虚拟文件夹系统，有效管理百万级文献题录与全文\n②内置查重功能高效筛除重复题录，支持自定义标签、优先级等标识符辅助精细化管理\n③支持PDF附件与题录关联，在软件内嵌的PDF阅读器中实现批注、高亮、笔记与要点解析\n3.智能写作与参考文献格式化\n①深度集成Word与WPS，支持“边写边引”，随时在文中插入引文，文末自动生成参考文献列表\n②内置5000多种中外学术期刊和学位论文的参考文献输出样式\n③首创多语言模板，可根据引用文献语言自动差异化输出，有效避免格式错误\n4.AI智能助手\n①提供从题录快速概览到全文深度理解的贯穿式AI辅助，使用户的文献调研和阅读过程更高效省力\n②支持对题录及PDF文献进行AI问答、自动总结、内容翻译及智能综述生成\n③青提学术集成AI润色、降重改写、内容续写与深度研究辅助功能，提升写作效率与原创性\n5.协作与跨平台同步\n①本地单机版所有数据存储在用户设备，适合对数据隐私有较高要求的用户\n②云端版“青提学术”支持小组协作，可邀请成员共同添加文献与笔记，实现知识的共享与共创\n③支持多终端（Windows/Mac/iOS/Android）实时同步", url: "https://jc.inoteexpress.com/dynamo/index.html", tags: "文献管理,文献阅读" },
{ category: "文献阅读与管理", name: "Mendeley", brief: "Mendeley是由爱思唯尔开发的免费参考文献管理与学术社交平台。", functions: "1.智能文献管理\n①自动提取元数据：拖入 PDF，Mendeley 可自动识别标题、作者、期刊、年份等\n②手动修正与补全：支持编辑字段、添加 DOI、ISSN、关键词等\n③文件夹与标签分类：按项目、主题或课程组织文献库\n④全文搜索：在所有 PDF 和笔记中快速查找关键词\n2.内置 PDF 阅读器 + 批注\n①直接在 Mendeley 桌面客户端中阅读 PDF；支持：高亮、下划线、删除线、添加文本注释、手写笔记（仅部分平台）、书签标记重点页\n②所有批注自动保存并与文献条目关联，可导出", url: "https://www.mendeley.com/", tags: "文献管理,文献阅读" },
{ category: "文献阅读与管理", name: "小绿鲸英文文献阅读器", brief: "小绿鲸是一款AI驱动的英文文献阅读与科研效率工具，集翻译、笔记、文献管理、AI解读等功能于一体。", functions: "1.专业级学科翻译\n①基于自研 “鲸灵AI科研大模型”，覆盖 113个一级学科\n②内置 25万+专业术语库，医学、材料、化学、生物等术语翻译准确率高\n③支持 用户自定义术语\n2.全文 & 截图翻译\n①一键翻译 PDF/DOC 英文文献，1:1 还原文档格式\n②支持 扫描件、图表、公式区域截图翻译，OCR 识别精准\n③可导出为 Word 或保留双语对照排版\n3.AI 智能文献解读\n①一键提炼 6大核心要素：研究背景、问题、方法、结果、结论、创新点\n②自动生成思维导图式文献概要\n③图表智能提取 + AI 解读：可对图/表提问\n4.高效笔记系统\n①支持高亮、批注、手写笔记（平板端）\n②笔记可切换为 大纲模式 or 思维导图模式\n③提供 10+ 科研场景模板\n5.文献管理 & 检索\n①无限级文件夹 + 多标签分类\n②智能搜索（按标题、作者、笔记内容、标签等）\n③一键抓取 参考文献 & 引证文献", url: "https://www.xljsci.com/?channelCode=ZUqKcM", tags: "文献管理,文献阅读" },
{ category: "文献阅读与管理", name: "Scholaread", brief: "Scholaread（靠岸学术）是一款集论文PDF阅读、学术翻译、文献管理、笔记于一体的AI学术助手。", functions: "1.文献管理与阅读\n①全球领先的重排技术：将复杂双栏PDF转换为适合手机、平板等移动设备的单栏流式排版，无需放大或缩小屏幕即可清晰查看图文内容\n②多端同步：支持电脑、网页、平板、手机四端文献库及阅读进度、笔记数据实时云端同步，支持Apple Pencil手写标注\n③Zotero集成：一键从Zotero导入文献库，标签列表可原样同步，无需额外配置\n④自动化文献管理：导入时自动识别PDF中的DOI，抓取标题、作者、期刊等完整元数据；支持多格式导出（BibTeX、RIS等）\n2.AI辅助精读\n①AI自动高亮核心：自动提取研究目标、方法、结论和创新点并集中展示于侧边栏，快速定位全文骨架\n②AI智能问答：选中任意段落或概念，可基于全文内容进行对话式提问（如“这篇文章的核心论点是什么？”），AI附原文出处提供精准回答\n③AI选题与文献综述：输入大致研究方向，AI自动扫描整个文献库并推荐潜在研究课题，进一步梳理研究框架和支撑论据\n④AI文献速览：鼠标悬停于文章封面即可立即查看摘要与核心观点总结，快速判断文献相关性\n⑤图表AI解释：所有图表自动分类陈列，选中即可用自然语言拆解数据趋势、对比分析结果及提炼核心结论\n3.学术翻译\n①逐段对照全文翻译：支持中、英、法、德、日、韩等17种语言的逐段对照翻译（一段原文+一段译文），保留原图表、公式与参考文献格式\n②多模式翻译：除全文翻译外，还提供划词翻译、截图翻译等多种即时翻译方式\n4.智能写作与引用\n①参考文献引用助手：在Word/WPS中选中文字，AI自动从文献库中智能推荐最相关的参考文献条目，一键以目标格式插入文内引用和文末列表\n②内置7种主流引用格式（GB/T 7714-2015、APA 7th、MLA 9th、IEEE、Chicago、Bluebook、OSCOLA），可覆盖95%+全球学术期刊要求\n③支持简体中文、繁体中文、英文三种语言格式切换，自动识别中英文混合排版并智能适配标点符号与姓名格式\n④引用插件完全免费，无隐藏收费", url: "https://www.scholaread.cn/?ref=yanweb", tags: "文献管理,文献阅读" },
{ category: "文献阅读与管理", name: "知网研学", brief: "知网研学（原E-Study）是CNKI推出的集文献检索、阅读、管理、笔记、写作与投稿于一体的科研学习平台。", functions: "1.文献资源获取与管理\n①支持从知网五大资源库（学术期刊、博硕士论文、会议论文、报纸、年鉴）直接检索或订阅，通过文献采集助手汇集Springer、ScienceDirect、Wiley等80个国内外数据库题录，也支持本地上传图书、期刊、专利、标准等12种资源类型\n②通过创建专题及子专题实现多层级文献体系化管理，专题内可按被引、下载、学习时间等排序查阅\n③云端存储，多终端自动同步，支持团队学习、组内资源实时共享与在线讨论交流\n2.AI研读（单篇文献阅读）\n①提供渐进式阅读模式（速读→精读→进阶追问），AI一键总结中英文文献核心内容并支持全文翻译\n②单篇文献AI矩阵自动提取研究问题、方法、内容等要素，便于快速提炼核心要点\n③智能阅读支持生成内容速览、章节概要，并可与文献进行对话式问答\n3.文献矩阵与笔记导图\n①文献矩阵支持同一研究主题下多篇文献横向对比，自动提取并对比研究要素，发现研究空白点\n②笔记导图自动将阅读笔记归集到以文献名为根节点的导图中，支持编辑、导出及直接转化为在线创作\n③边阅读边笔记，支持划线、批注、摘录，笔记可关联原文并体系化管理\n4.AI辅写与智能创作\n①支持生成文献综述、文献阅读报告、写作大纲、开题报告、实验设计方案、行业调研报告等文档\n②边写边引，写作界面可便捷插入笔记与文献素材，自动生成并格式化参考文献\n③支持中英互译、段落改写/扩写/缩写、AI润色等功能", url: "http://x.cnki.net/", tags: "文献管理,文献阅读" },

{ category: "论文写作", name: "Aibiye", brief: "Aibiye是由长春芝麻开门教育科技有限公司开发的AI学术辅写工具，可在5分钟内生成3万字以上高质量内容。", functions: "1. 高效生成学术内容\n①论文快速成稿：输入选题后，Aibiye可在30秒内生成包含摘要、引言、方法论、结论等完整结构的论文初稿，并提供真实数据、图表、公式等支持\n②开题报告与文献管理：自动生成符合高校要求的开题报告框架，并附带多篇真实参考文献，支持一键导入和格式校对，避免手动整理的繁琐\n③多格式扩展：除论文外，还可生成答辩PPT、任务书、代码段等辅助材料，覆盖学术写作全场景\n2. 智能优化与降\n①一键改写与扩写：提供多种语气改写功能（如学术严谨型、通俗易懂型），帮助降低重复率，节省查重费用\n②语法纠错与格式检查：自动识别语法错误和排版问题，确保论文符合期刊或学术规范\n3. 个性化定制服务\n①200+专业模板库：覆盖理工、人文、社科等学科，支持读书笔记、实验报告、广告文案等多场景\n②选题与大纲规划：根据研究热点智能推荐选题，并生成逻辑严密的论文框架，用户可自定义调整节点和风格", url: "https://www.aibiye.com/?code=OF5nUf", tags: "论文写作" },
{ category: "论文写作", name: "笔灵AI", brief: "笔灵AI是综合性AI写作平台，提供学术论文、公文写作、营销文案、小说创作等200多个场景的智能写作支持。", functions: "1.学术论文全流程辅助\n①支持一键生成论文，提供开题报告、论文摘要、论文大纲、文献综述、全文初稿的快速生成，覆盖700多个专业领域\n②4分钟内可生成万字初稿，并提供千字大纲免费生成功能\n③提供论文降重和降低AIGC痕迹功能，采用语义级优化方式保持学术表达严谨性\n④上传论文即可生成答辩PPT，服务于从专科生到研究生的各学术层次\n2.AI写作工具\n①提供200多场景写作模板，涵盖公文写作、商业计划书、营销文案、社交媒体内容、教案等\n②支持AI改写、续写、润色功能，可对旧有内容进行创新重写\n③内置AI对话功能，注册即送500AI字数免费试用\n④支持多场景应用，包括商务、教育、娱乐、新媒体、内容创作等领域\n3.AI小说创作\n①提供AI写全篇小说功能，填写小说类型、人物设定等基本信息即可生成整章内容\n②配备小说大纲助手、小说扩写、小说续写、剧情创作等工具\n③提供黄金开头生成、仿写、润色等功能，辅助网文创作\n4.PPT生成与办公辅助\n①提供答辩PPT生成功能，支持2.0升级版\n②支持一键生成工作总结、格式化报告等办公文档\n③提供机关单位、职场等办公场景的写作支持", url: "https://ibiling.cn/tool?from=kyfwxz", tags: "论文写作" },
{ category: "论文写作", name: "海棠AI", brief: "海棠AI支持中、英、日、韩、俄、泰等多语种论文创作，支持10万至50万字超长论文一键生成。", functions: "1.AI论文生成\n①基于AI5.0与DeepSeek-R1双模型架构，支持三级大纲（章节、小节、子节）的自由无限次生成与修改\n②支持10万字至50万字的超长文写作，涵盖毕业论文、硕博论文、学术专著、教材等长篇学术内容\n③轻量化学术模型支持三分钟内自动生成千字短文初稿，包含题目、摘要、正文草稿及参考文献\n2.参考文献与学术规范性\n①自动整合40余篇近3-5年的真实参考文献，涵盖知网、中科院核心期刊等来源，正文中自动标注出处\n②支持参考文献的跨语种管理，满足不同语言论文的引用需求\n3.数据与图表可视化\n①支持LaTeX原生公式的精准解析与排版，满足数学、物理、计算机等学科的公式写作需求\n②自动整合实验数据生成符合规范的图表，支持数据表、数据图、实例代码的嵌入与自动排版\n③适配含代码段（Matlab/Python等）的论文写作，支持SPSS回归结果等数据处理的学术表达\n4.“投喂AI”个性化训练\n①用户可上传参考资料（TXT、Word、PDF等格式），AI深度学习后再生成大纲与正文，使产出更贴合个人研究方向和写作风格\n②支持上传多个文档，不上传文件则不收取任何费用", url: "https://www.haitanglunwen.com/?pmt=46AF50", tags: "论文写作" },
{ category: "论文写作", name: "笔启AI论文写作", brief: "笔启AI论文提供从选题、生成、修改到查重的全流程AI论文辅助服务，主推知网查重率稳定控制在10%左右。", functions: "1.AI论文生成\n①支持毕业论文、课程论文、期刊论文、职称论文、专升本论文、学术专著、文献综述、开题报告、任务书、答辩PPT等多种论文类型的AI辅助生成\n②基于AI5.0及Gemini3Pro学术加强版双模型，可实现10万至50万字的超长文写作，支持中文、英语、日语、韩语、俄语、泰语等多语种\n2.全流程论文辅助工具\n①从选题、开题报告、论文任务书、文献综述到写作、答辩PPT等论文全流程提供一站式服务，方便用户按需组合使用\n②可在生成的正文中自由插入图、表、代码、公式，自动匹配40篇近3-5年的知网或中科院真实参考文献，并在正文中给出标注\n③支持多级大纲（二级大纲、三级大纲），可免费生成大纲，支持手动录入或上传资料后由AI生成，支持在正文页面内对大纲进行增删改\n3.无限改稿与售后保障\n①生成的论文正文支持无限次改稿，用户可不断对内容进行完善，改到满意为止\n②若知网查重率超15%或AIGC率超25%，可申请退款\n③采用阿里云加密技术，保障论文隐私安全", url: "https://www.biqiai.cn/?pmt=41DF5B", tags: "论文写作" },
{ category: "论文写作", name: "笔目鱼英文论文写作", brief: "笔目鱼是小绿鲸团队打造的云端英文论文写作平台，集学科翻译、学术润色、改写降重、SCI高分例句库等于一体。", functions: "1.学科翻译与智能润色\n①学科翻译融入28万+专业术语，覆盖117个一级学科，含医学、理工科等专业化训练，支持全文翻译、段落翻译及多翻译引擎自由切换\n②学科润色精选高影响因子期刊和高被引文献，超1亿+文献数据持续训练，支持英式/美式风格润色、语法校对、时态校正、长难句简化及句式多样化优化\n2.AI辅助写作与改写\n①边写边润：输入中文即可实时查看地道英文译文，实现边写边译、边润的无缝写作体验\n②改写降重：通过同义替换、改变句子结构或调整语气，支持改写、扩写、缩写多种场景，有效降低原文重复率\n③支持同义替换、改变句子结构或调整语气，降低原文重复率，提供改写、扩写和缩写等多种场景\n3.文献阅读与SCI语料库\n①基于1.8亿+文献数据，根据论文主题与段落重点精准推荐高被引、高相关的最新文献\n②30亿+SCI高分例句库，覆盖医学、生物学、化学、物理学、工程与材料学、人文社科等各学科，精选高影响因子期刊数据\n③支持导入pdf、txt、png、链接等多种格式，支持一键同步小绿鲸英文文献阅读器的语料库，边读边写边收藏写作素材\n4.参考文献管理与格式排版\n①支持多种中英文期刊引文格式，联动小绿鲸高效引用和管理参考文献，一键插入引注及参考文献列表，内容修改后引文标号自动更新\n②基于上千种期刊模板，最快1分钟完成投稿文章格式排版，确保符合期刊投稿指南规范", url: "https://www.bmysci.com/?channelCode=keyanmate", tags: "论文写作" },
{ category: "论文写作", name: "MedPeer天生会写", brief: "MedPeer专注于生物医学领域的一站式科研服务平台，“天生会写”是其核心智能文稿生成模块。", functions: "1.智能文稿生成\n① 支持本科毕业论文、硕士开题报告、期刊论文、文献综述等多种学术文稿的AI辅助生成\n② 支持国自然申请书、地方基金申请书等课题申报材料的智能撰写\n③ 依托3亿篇真实文献大数据，生成的文稿符合各院校和期刊的格式要求，支持多维专家组深度优化\n2.文献调研与AI辅助\n① Deep Search文献调研：基于3亿真实文献精准检索繁难、总结繁难，一键输出带引用源的高质量调研报告\n② 科技文献库：收录4000万篇生物医学文献及4万种期刊，支持全文读写与实时翻译\n③ 文档解读与科学对话：支持上传PDF文档，AI自动总结文献核心要点，可基于文献内容进行问答对话\n3.学术规范与翻译支持\n① 机器翻译与GPT翻译：支持多语言互译，包含生物医学专业翻译引擎\n② 智能选刊：根据论文内容推荐合适的投稿期刊\n③ 知识库管理：支持文献、笔记、素材的云端存储与管理\n4.AI科研绘图\n① 提供海量原创矢量图标和模板，支持拖拽式操作，可自由调整大小、颜色、方向\n② 覆盖科研论文插图、技术路线图、海报、PPT等多种科研可视化需求", url: "https://product.medpeer.cn/product/index/productDetails?page=progendoc&P_S_C=keyanmate", tags: "论文写作" },
{ category: "论文写作", name: "易笔AI写作", brief: "易笔AI写作是依托AI5.0+DeepSeek-R1学术加强版模型打造的智能化论文写作全流程服务平台。", functions: "1.百万字长文记忆与协作支持\n① 作为全网首批支持100万字级别超长文创作的AI工具，运用独家长文记忆机制，确保AI写博士论文、专著或教材等长篇内容时，章节间逻辑连贯、观点统一，有效防止逻辑断层 。\n② 新增团队协作功能，支持多人同时在线对长文稿件进行降重优化与润色，导师与学生可在云端实时合作，针对特定段落进行即时修改，提升团队协作效率。\n2.教材与专著AI辅助生成\n① 平台不仅在AI写毕业论文、期刊论文章节效果极佳，更针对教师和教育工作者编写教材、学术专著的实际需求，提供了专门的辅助通道。\n② 在写书籍过程中，平台支持多级大纲免费生成，协助作者快速建立起逻辑严密的知识体系框架，并能根据学科特性智能匹配教学案例、习题及参考文献列表，极大拓宽了AI在严肃学术出版领域的应用边界。\n3.定制化高质量初稿\n① 用户通过“投喂AI”功能上传4-50篇专属参考资料，AI深入学习后可生成完全贴合个人研究方向与语感的正文，避免了内容的同质化。\n② 支持在正文中一键嵌入来自知网/中科院等真实数据源的40+篇文献并自动完成规范标注；同时还支持在论文中智能插入技术路线图、坐标图、Python代码及复杂学术公式，一键满足理工科与经管类论文的实证数据展示需求。\n4.学术诚信双保障与退款承诺\n① 针对用户担心的查重率与AI率问题，平台提供强力的一键降重与降AIGC功能，可将查重率稳定控制在10%以内，AI生成内容痕迹降至20%以下。\n② 平台做出明确承诺：在知网或维普等主流检测平台中，若生成论文的AIGC率超过15%或查重率超过15%，用户可申请全额退款。", url: "https://www.yibiai.com/?pmt=41DF5B", tags: "论文写作" },
{ category: "论文写作", name: "Wordvice AI", brief: "Wordvice AI是一款集“读-写-改”于一体的综合性AI智能写作助手，全球超过360万创作者使用。", functions: "1.AI校对与语法检查\n① 支持英语（12种方言变体）、中文、日语、韩语、德语、法语、西班牙语等12种语言的语法拼写检查，自动检测并纠正语法、拼写、标点、大小写及用词错误，并提供详细的修改建议反馈\n② 可定制编辑模式，实时在线修改，改善句子结构、措辞语气的准确性和流畅度，支持调整多种写作风格针对性完善文章，用户可在Word和Chrome插件中边写边用\n2.AI改写润色\n① 提供流畅（Fluent）、学术（Academic）、创造性（Creative）等5种不同改写模式，用户可根据发表场景灵活控制改写文本的语气语调与内容张力，在不改变原文核心意思的前提下优化词汇、句式、风格和语言流畅度\n② 支持12种语言的改写，适用于论文、报告、留学文书、商业文件等，有效帮助规避抄袭嫌疑\n3.AI在线翻译\n① 支持47种语言之间的自然流畅互译，覆盖英、中、日、韩、法、德、西班牙语等主要语种，提供精准快速的翻译服务\n② 集成于AI文本编辑器，可在同一平台完成翻译、替换原始文本等操作，无需在多个工具间切换\n\n4.AI文本编辑器与学术研究工具\n① AI文本编辑器：将Wordvice AI所有功能整合在一个写作平台中，用户可在同一界面完成改写、总结、引用生成、撰写文章等操作，无需在多个产品间切换\n② 研究工具与文献引用：提供ChatPDF、PDF翻译、PDF摘要等免费科研工具；内置APA、MLA、Chicago、Vancouver等主流格式的引文生成器，自动生成参考文献", url: "https://wordvice.ai/cn", tags: "论文写作" },
{ category: "论文写作", name: "AIPaperGPT", brief: "AIPaperGPT是集选题构思、大纲定制、正文生成、文献引入、查重降AI于一体的AI论文写作平台。", functions: "1.智能大纲生成\n①60秒内生成立二级/三级智能大纲，支持添加/删除/自定义章节，可在章节级勾选是否需要插入图表、公式、代码\n②生成文稿后可一键切换不同模型对内容进行精调或重写\n③覆盖毕业论文、开题报告、任务书、文献综述、期刊论文、答辩PPT等全学术周期\n2.真实参考文献与多模态生成\n①生成正文时自动引入10-200篇知网、维普查重可溯源、期刊官网可查的真实参考文献，正文标引与文末列表一一对应\n②一键生成科研绘图、数据表格、专业公式（含LaTeX原生解析）、编程代码（Matlab/Python等），符合SCI期刊出版规范\n3.查重与AIGC检测保障\n①提供配套降重工具和降AI率工具：AI降重10分钟完成，人工降重支持保护固定词；降AI率一键将AIGC占比降至20%以下，适配知网严苛版、Turnitin等\n②承诺：知网、万方、维普、格子达等平台查重>15%或AIGC>10%全额退款\n4.无限改稿与安全保障\n①支持一次生成、永久免费无限改稿，改稿过程自动优化重复内容并降低AIGC占比，支持多人在线团队协作\n②采用腾讯云存储及数据加密传输，保障隐私安全", url: "https://www.zhixueshu.net/?i=JsJR", tags: "论文写作" },
