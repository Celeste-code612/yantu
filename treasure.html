{ category: "数据查找", name: "国家数据", brief: "国家统计局官方数据平台，中国最权威的宏观经济与社会统计数据发布门户。", functions: "1.数据查询\n①全领域数据查询：可查找国民经济核算、人口与就业、价格指数、居民收入、工业、农业、建筑业、交通运输、批发零售、对外贸易、财政金融、能源、环境、教育、科技、卫生、社会服务、文化、资源环境等 20 余个主题的统计指标\n②多维度数据获取：支持按地区（全国/省/地级市/县）、时间（月度/季度/年度）、行业（国民经济行业分类）进行数据筛选和对比\n③数据导出：数据表格可导出为 Excel、CSV、PDF 等格式，支持生成折线图、柱状图、地图等可视化图表\n2.统计成果库\n①统计年鉴：提供《中国统计年鉴》《中国统计摘要》及各省市统计年鉴，支持整本或摘录在线浏览、下载\n②普查数据：可查阅人口普查、经济普查、农业普查等大型普查的汇总数据和微观数据（部分需申请）\n③统计公报：发布年度国民经济和社会发展统计公报、统计月报等\n3.数据解读与帮助\n①指标解释：提供统计指标的定义、计算方法、统计口径说明\n②数据解读：发布统计专家对热点数据的分析解读文章\n③国际接轨：数据分类遵循联合国、IMF等国际标准，便于国际比较", url: "https://data.stats.gov.cn/dg/website/page.html#/pc/national/home", tags: "数据库,宏观数据" },
{ category: "数据查找", name: "国家法律法规数据库", brief: "中国最权威、最全面、唯一由立法机关直接维护的法律法规公开检索系统。", functions: "1.数据查询\n①可查找中华人民共和国现行有效的宪法（含修正案）、法律、行政法规、监察法规、地方性法规、自治条例和单行条例、经济特区法规、浦东新区法规、海南自由贸易港法规、司法解释电子文本\n②数据持续更新，新法速递栏目可查看最新上线法规\n2.法规检索\n①支持在搜索区输入关键词进行快速检索\n②通过高级检索可按标题/正文、颁布日期/施行日期、制定机关、法律效力阶位、时效性等条件精确筛选\n③首页按宪法、法律、行政法规、地方法规、司法解释等版块分类展示，可点击更多跳转查看完整数据列表", url: "https://flk.npc.gov.cn/index", tags: "数据库,法律数据" },
{ category: "数据查找", name: "中国互联网络发展数据", brief: "CNNIC官方数据发布平台，定期发布《中国互联网络发展状况统计报告》。", functions: "1.数据查询\n①可查找网民规模、互联网普及率、非网民规模及不上网原因等核心网民数据\n②可查找IPv4/IPv6地址数量、域名总数（含.CN域名数量）、网站数量、国际出口带宽、移动电话基站数量、光缆线路长度等互联网基础资源数据\n③可查找网络购物、网络支付、网络视频、网络直播、即时通信、网络新闻等各类互联网应用使用规模和使用率数据\n④可查找农村网民、银发族网民、青少年网民等细分人群的网民结构特征数据\n⑤可查找生成式人工智能用户规模、使用场景等新兴领域应用数据\n2.报告浏览与下载\n①提供历次《中国互联网络发展状况统计报告》全文下载\n②提供《数字消费发展报告》《生成式人工智能应用发展报告》《互联网助力数字消费发展蓝皮书》《从互联网大数据看中小企业发展》等专题研究报告下载\n③提供青少年上网行为报告、互联网大事记等其他相关资料", url: "https://cnnic.cn/6/86/88/index.html", tags: "数据库,互联网数据" },
{ category: "数据查找", name: "习近平系列重要讲话数据库", brief: "人民网·中国共产党新闻网打造，收录十八大以来习近平总书记系列重要讲话原文及相关论述。", functions: "1.数据查询\n①可查找十八大以来习近平总书记的系列重要讲话原文、相关重要论述、活动、会议、批示、书信、致辞、音视频等六大类文献\n②可查找涵盖经济、政治、文化、社会、生态、党建、国防、外交等各个领域的重要讲话内容\n③可查找最新讲话、国内讲话与国际讲话分类内容\n④可聆听习近平总书记在不同场合讲话、致辞、演讲的音频\n2.检索功能\n①支持按标题关键词或内容关键词精准查找讲话原文\n②支持按讲话发表的时间段进行搜索（可单独按时间搜索，也可按关键词+时间段组合搜索）\n③支持按经济、政治、文化、社会、生态、党建、国防、外交等八大类别进行筛选搜索\n④最新讲话栏目自动展示最新发表的讲话原文列表，支持国内/国际切换\n⑤学习关键词栏目汇集近期热门搜索关键词供一键检索", url: "https://jhsjk.people.cn/", tags: "数据库" },
{ category: "数据查找", name: "CnOpenData", brief: "覆盖经济、金融、会计、法律、地理、新闻、医疗、体育等多学科的综合型数据平台。", functions: "1.数据查询\n①可查找全球专利及引用被引用数据（1.5亿+量级）、工商注册企业数据（3.5亿+量级）、线上招聘广告数据（3.6亿+量级）、招投标数据（5800万+量级）\n②可查找各种上市公司另类数据、房地产与土地数据、裁判文书数据、税收调查数据、全量省份报纸数据、财经文本数据、生态环境数据、分地区数据、地理交通数据、气象数据\n③可查找雪球数据、股吧数据、Glassdoor美国公司员工评价数据、Twitter数据、Linkedin员工简历数据、美国公司招聘数据等社交媒体数据\n④可查找政府数据、新冠疫情数据、文本语料数据、教育教学数据等\n⑤涵盖数值型数据和文本型数据，满足经济、金融、法律、医疗、人文等多学科、多层次研究需求\n2.辅助信息\n①提供中国社会科学研究数据库平台（SSRData），现拥有10余个专题数据模块、140+个数据库，服务于高校机构客户\n②与普林斯顿图书馆、Neudata、福建大数据交易所等国内外机构达成战略合作关系\n③持续吸收大语言模型、深度学习、图像识别等前沿数字技术，将数据产品升级为智能解决方案", url: "https://www.cnopendata.com/", tags: "数据库" },
{ category: "数据查找", name: "搜数", brief: "大型统计年鉴资料数据总库，完整收录建国以来各类权威统计资料。", functions: "1.数据查询\n①可查找国民经济核算、固定资产投资、人口与人力资源、人民生活与物价、各类企事业单位、财政金融、自然资源、能源与环境、政法与公共管理、农民农业和农村、工业、贸易外经等各行业统计表格数据\n②可查找国家、省、市及县级统计年鉴和月报\n③可查找海关统计月报、中国人民银行统计季报、经济普查资料、抽样调查资料、白皮书、发展报告等多种类型统计资料\n④提供统计词典功能，辅助理解统计指标含义\n2.检索与获取\n①支持全文检索和路径索引两种检索方式，可通过关键词查找目标统计信息\n②提供专业检索功能，可对检索结果进行逻辑组合筛选\n③支持按年鉴名称、出版时间、所在地、分类属性等条件查询年鉴出版信息及全部表格内容\n④检索到的统计表格均可下载为Excel格式，便于二次分析处理\n3.数字化标引与统计分析\n①核心价值：将分散在统计年鉴、调查报告、公报、白皮书中的表格数据进行数字化、标引和检索优化，实现跨表、跨年份、跨来源的统一查询\n②提供统计数据图形展示功能，辅助数据挖掘分析\n③大陆统计数据库与港台统计数据库分区展示，便于针对性查询\n④平台每日更新数据，每日新增数据量可达50万个，保证数据时效性", url: "http://www.soshoo.com/index.do", tags: "数据库" },
{ category: "数据查找", name: "知网统计数据", brief: "中国知网旗下统计数据平台，整合宏观、行业、区域统计数据，与学术文献交叉关联。", functions: "1.数据查询\n①宏观经济：可查找国内生产总值(GDP)、居民消费价格指数(CPI)、固定资产投资、财政收支、货币供应量等涵盖国民经济核算、财政金融等领域的经济指标\n②区域发展：按全国、省、市、县查询各地区经济总量、人口结构、产业发展等区域经济数据\n③行业动态：提供工业、农业、建筑业、交通运输、批发零售、能源、教育、科技、卫生等32个行业的增加值、产量、效益等数据\n④国际数据：收录世界银行、联合国教科文组织、OECD及各行业国际组织发布的数据近2亿笔\n⑤进度数据：收录国家统计局实时发布的宏观/区域进度指标5万余个、行业进度指标65982个，含月度、季度数据，弥补统计年鉴滞后性\n⑥进出口贸易：收录海关进出口贸易统计数据1.9亿笔，包括贸易信息、产品信息和航运信息等\n⑦指标抽取：通过指标抽取工具将统计年鉴、统计公报等文本中的年度指标进行抽取，截至当前已积累年度数据3.6亿笔\n2.统计年鉴库\n①收录我国历年出版的统计年鉴（资料）共约33922册，其中包括统计年鉴30786册、普查资料1167册、分析报告781册等\n②中央级统计年鉴收录卷册完整率达99.3%，收录刊数完整率高于99%\n③包含中国统计年鉴、中国统计摘要、中国人口/经济/农业普查资料，以及中国工业/农村/能源/科技/教育/卫生等千余种统计年鉴\n④我国仍在连续出版的193种统计年鉴全部收录\n⑤所有统计图表均加工为Excel格式，支持整本浏览、摘录及指标数值检索\n3.数据分析与可视化\n①支持按时间-地区-指标的多维度组配分析，可生成自定义衍生指标\n②提供决策支持分析算法，包括相关性分析、统计预测、科学评价及决策模型分析\n③统计地理信息系统(GIS)将数据与地图结合，实现省/市/县数据的图形地图展示、多指标叠加分析、时态数据分析、专题地域图制作等\n④在线生成统计报表及多样化的可视化图表（柱状图、折线图、饼图等）\n⑤支持个人数据管理，用户可创建自有统计数据库，并将自有数据与平台统计指标数据合并分析\n⑥平台基于数据挖掘分析技术IDMETM，提供一站式数据分析服务\n4.AI智能服务\n①智能问答：通过自然语言提问，迅速从9亿+权威统计数据中获取可追溯来源的统计结果\n②智能分析：以问答方式融合数据运算与统计分析模型，自动生成包括可视化图表、趋势预测等在内的数据分析结果\n③智能解读：对统计指标数据及其分析结果进行全面、清晰和准确的解读，揭示数据内在含义\n④智能报告：利用自然语言处理技术和AI大模型，自动生成结构清晰、内容详实的数据分析报告\n⑤核心价值：基于知网自主调试开发的“统计数据大模型”，实现“查数据”与“用数据”的智能化与自动化", url: "https://data.cnki.net/", tags: "数据库" },
{ category: "数据查找", name: "东方财富数据中心", brief: "东方财富网旗下金融数据平台，提供股票、基金、债券、宏观经济等数据。", functions: "1.数据查询\n①可查找股票数据：A股/港股/美股实时行情、历史日线/周线/月线K线数据、市盈率、市净率、总市值、换手率等\n②可查找基金数据：基金净值走势、基金排名、持仓明细、基金经理变动、基金定投收益测算\n③可查找债券数据：国债/企业债/可转债的收益率、到期收益率、久期等指标\n④可查找指数数据：上证指数、深证成指、创业板指、科创50等主要股指实时行情\n⑤可查找上市公司财务数据：营业收入、归母净利润、净资产收益率、毛利率等财务指标\n⑥支持数据导出为Excel格式，进行二次分析\n2.特色数据\n①资金流向：查询个股/板块的主力净流入、超大单/大单净流入、中单/小单净流向，分类展示资金情绪\n②板块资金：按行业板块、概念板块、地域板块三大类展示资金流向排行，支持近期趋势对比\n③沪深港通资金：监控北向资金与南向资金的实时流向、持续增持/减持个股列表\n④财报与公告：提供上市公司年报/季报的业绩报表、业绩快报、业绩预告及预约披露时间\n⑤龙虎榜数据：展示每日涨跌幅/换手率异常个股的买卖详情，标注上榜营业部性质、买卖金额及游资机构动向\n⑥财经日历：按照时间序列排列中美欧等国的重要宏观经济数据发布时间表和政策事件安排，支持提前订阅及事件解读\n⑦专题数据：新股申购日历、中签号公布、公募/私募基金排名、宏观数据（CPI、PPI、PMI、GDP、M2等）、沪深港通席位及机构调研详情\n⑧股票筛选器：支持按市盈率、市净率、股息率、营收增速、地区、行业等多种条件交叉筛选A股，定位符合条件的持仓标的", url: "https://data.eastmoney.com/center/", tags: "数据库,金融数据" },
{ category: "数据查找", name: "前瞻数据库", brief: "前瞻产业研究院旗下大型产业经济数据平台，拥有100万数据指标。", functions: "1.数据查询\n①宏观经济：可查询国内生产总值（GDP）、居民消费价格指数（CPI）、固定资产投资、财政收支、货币供应量等涵盖国民经济核算、财政金融等领域的经济指标，以及进出口数据（含贸易信息、产品信息、航运信息等）\n②区域经济：按全国、省、市、县查询各地区的经济总量、产业结构、固定资产投资、消费、财政收支等经济指标\n③行业经济：提供6600余个细分行业的经济数据，涵盖工业、农业、建筑业、交通运输、批发零售、能源、教育、科技、卫生、电力、钢铁、煤炭、化工、医药、汽车、互联网、电子信息、金融、房地产等多个领域，数据类型包含产值、产量、销量、价格、成本费用、利润、库存等\n④产品数据：提供各类产品的市场价格、出厂价格、销量、进出口情况等产品级微观数据\n⑤企业数据及上市数据：涵盖全球上市企业财务数据、中国工商企业注册信息、企业招投标信息、企业信用信息等\n⑥国际宏观数据：覆盖全球主要国家的宏观经济指标、国际贸易数据、产业发展数据，支持多国横向对比\n⑦海外数据库与专题数据：提供一带一路沿线国家经贸数据，以及全国经济普查数据、抽样调查数据、行业白皮书、发展报告等专题资料\n⑧每日每账户最高可访问500个指标的详细数据\n2.数据获取与处理\n①数据检索：支持关键词检索，可对宏观经济、区域经济、行业数据、企业数据等进行一站式跨库检索\n②数据导出：所有数据表格支持下载为Excel格式，便于二次分析处理\n③可视化分析：使用前端矢量绘图实现灵活高清跨平台，在线生成图表、柱状图、折线图、饼图等可视化图表\n④智能分析：基于大数据技术和算法模型，搭载产业运行分析、短板诊断、对标对比、精准招商、产业监测等功能", url: "https://d.qianzhan.com/", tags: "数据库" },
{ category: "数据查找", name: "中科院科学数据中心", brief: "中国科学院科学数据资源一体化服务统一入口，推动科学数据开放共享。", functions: "1.数据查询\n①可查找覆盖地球科学、生物学、物理学、化学、材料科学、计算机科学技术、环境科学、农业、医学等数十个学科领域的科学数据集\n②可统一检索国家高能物理、微生物、基因组、冰川冻土沙漠、生态、青藏高原、天文、空间科学、地球系统等18个学科中心和13个所级中心的汇交数据\n③可通过findata搜索引擎集成ScienceDB、gscloud、Zenodo、GBIF等3700多万个国内外开放数据集\n④可查找中国科学院自主研制的“磐石”系列科学大模型（粒子物理、数学、材料、天文、地理等）以及项目汇交数据、论文关联数据等\n2.数据分析与工具\n①提供科学数据中心软件栈（数据汇聚、管理、发现、分析）\n②集成科技文献智慧数据中心，关联1.58亿篇论文、9500万篇专利等学术资源，实现科学数据与文献交叉检索\n③提供ScienceDB科学数据银行，支持科研人员发布、存储和共享数据，实现数据可引用\n3.AI智能服务\n①ScienceDB AI：基于大语言模型的科学数据推荐智能体，支持自然语言数据问答\n②“磐石”科学基础大模型体系：面向多学科提供AI驱动的数据分析与科研创新支持", url: "https://www.casdc.cn/home", tags: "数据库" },
{ category: "数据查找", name: "国家农业科学数据中心", brief: "国家级农业科学数据中心，围绕12大学科领域推动农业科学数据开放共享。", functions: "1.数据查询\n①可查找作物科学（种质、育种、栽培、分子）、动物科学（种质、育种、饲养、兽医）、渔业科学、热作科学、草业科学、农业资源与环境（土、肥、水、气、生态、遥感）、植物保护、食品营养与加工、农业装备与信息、农业农村经济等12大学科领域的科学数据\n②可查找气候变化对作物影响、土壤质量监测、农业生物多样性、动物疫情预测、作物表型与环境型等环境、生物、经济领域数据\n③支持按学科分类导航浏览，按数据集名称、作者单位、关键词、CSTR等字段检索\n2.专题与精品数据库\n①精品库：农业科技机构、人才、成果等精品数据库\n②专题数据库：已建成17个专题库，包括家畜（猪/羊/牛）专题、家禽（鸡）专题、作物育种专题、黄河流域专题、果树专题、小麦专题等\n③特色库：热带农业国际合作、木薯产业、一带一路热带国家农业资源等6个特色数据库", url: "https://www.agridata.cn/#/home", tags: "数据库,农业数据" },
{ category: "数据查找", name: "国家高能物理科学数据中心", brief: "高能物理领域国家级科学数据中心，提供大科学装置实验与模拟数据。", functions: "1.数据查询与获取\n①高能物理实验数据：可查找北京正负电子对撞机与北京谱仪（BESIII）、江门中微子实验（JUNO）、高海拔宇宙线观测站（LHAASO）、大型强子对撞机（LHC）等多个大科学装置的实验与模拟数据\n②中子科学数据：可查找中国散裂中子源等装置产生的中子科学相关数据\n③光子科学数据：可查找高能同步辐射光源（HEPS）等装置的同步辐射实验数据\n④天体物理数据：可查找引力波暴高能电磁对应体全天监测器（GECAM）等卫星的项目数据\n⑤多学科交叉数据：面向材料科学、生物科学、环境科学等多个学科提供数据服务", url: "https://www.nhepsdc.cn/", tags: "数据库" },
{ category: "数据查找", name: "国家微生物科学数据中心", brief: "全球微生物领域最重要的数据中心，接收全球46个国家数据汇交。", functions: "1.数据查询\n①可查找微生物菌种资源（全球50多万菌株信息）、基因组学数据（核酸、原始组学、基因组数据）、宏基因组数据（6万+样本、50万+MAGs）、病原微生物与病毒数据、菌物分类数据以及蛋白质数据等\n②支持按数据库分类导航浏览，通过关键词、菌株编号、物种名等检索\n2.数据汇交与管理\n①面向科研论文提供数据存储与共享服务，支持菌株、核酸序列、基因组、宏基因组、蛋白质结构等类型数据提交，审核后发放编号及DOI\n②承担国家重点研发计划等科技计划项目的数据汇交，已汇交数据总量55TB、数据集1万个\n3.数据标准化与AI分析\n①牵头制定微生物领域国家标准及国际ISO数据标准，开发自主知识产权数据管理平台\n②支持宏基因组数据物种/功能注释、智能化数据分析及实验流程智能设计", url: "https://nmdc.cn/", tags: "数据库" },
{ category: "数据查找", name: "国家天文科学数据中心", brief: "国家天文科学数据中心，提供LAMOST、FAST等核心设备观测数据。", functions: "1.数据查询\n①可查找LAMOST光谱数据（总光谱数超3000万条）、FAST射电数据、兴隆2.16米望远镜、丽江2.4米望远镜、抚仙湖太阳望远镜等国内核心设备观测数据，以及历史观测底片数字化数据、数值模拟数据、论文关联数据\n②支持按观测波段、观测装置、数据类型等分类浏览，按坐标和天体标识符检索，输出格式支持HTML、VOTable、CSV、FITS\n2.望远镜服务\n①为LAMOST、FAST等重大科技设施提供原始数据传输、归档、备份及产品数据发布、在线分析等全方位服务\n②为国内核心天文设备提供统一的时间申请、数据管理、共享服务\n3.AI与大模型\n①AstroOne天一大模型：700亿参数，天文知识能力最强的大语言模型\n②金乌大模型（太阳物理）、SpecCLIP光谱大模型、FALCO时域光变大模型\n③提供LAMOST专属Python工具包pylamost", url: "https://nadc.china-vo.org/", tags: "数据库,天文数据" },
{ category: "数据查找", name: "国家气象科学数据中心", brief: "中国气象数据网，国家气象信息中心面向全球开放气象数据。", functions: "1.数据查询\n①可查找地面气象观测资料（气温、降水、风、能见度等）、高空探测资料、海洋气象资料（海浪、海温等）、雷达探测数据、卫星遥感产品（风云卫星云图等）、数值模式预报产品、农情监测实况、全球气候统计产品等12类106种气象数据\n②支持注册用户按台站、时间范围、经纬度、空间范围等条件检索，提供FTP和SDK编程接口批量下载\n2.特色服务\n①提供人工智能气象大模型训练专题数据、发动机适航审定、风电能源、森林防火、防灾减灾等18个专题数据产品\n②推出32套高精度气象实况数据产品及关键气候要素长序列基础数据产品", url: "https://data.cma.cn/", tags: "数据库,气象数据" },
{ category: "数据查找", name: "国家海洋科学数据中心", brief: "国家级海洋科学数据中心，整合海洋水文、气象、生物、化学等9大学科实测数据。", functions: "1.数据查询\n①可查找海洋水文数据（温度、盐度、海流、潮汐）、海洋气象数据（海面风场、气压、能见度）、海洋化学与生态数据（营养盐、叶绿素、赤潮）、海洋生物与渔业数据、海底地形与地球物理数据，以及极地考察、大洋科考、卫星遥感等多源数据\n②海洋站准实时数据（1999年5月以来14个海洋站的气象、波浪、温盐等）、波浪和风场延时数据（1996年1月以来）、全球海平面观测数据（2016年至今）、船舶观测数据（1999年5月至2003年9月）、水位综合数据集（1846—2022年全球海域逐时水位）等\n③支持条件查询、关键字检索、时空范围检索，提供数据在线预览、统计分析、数据收藏和订阅功能，以及基于地图服务的数据可视化\n2.专题信息产品\n①海洋环境统计分析产品、实况分析和再分析产品，以及海洋经济、海域海岛、海洋灾害等专题产品、图集图件\n②海底地形命名查询（中国、国际、美国、日本）、海洋经济产品（中国海洋经济图集、年鉴、公报、指数）、海域海岛产品（中国四大海域和南海重点岛礁）、潮汐潮流预报（沿海港口、岛屿和海区的每日预报）、海洋灾害产品（中国海平面公报、热带气旋和风暴潮统计分析）", url: "https://mds.nmdis.org.cn/", tags: "数据库,海洋数据" },
{ category: "数据查找", name: "国家极地科学数据中心", brief: "国家级极地科学数据中心，负责极地领域科学数据统一管理和长期保存。", functions: "1.数据查询\n①可查找极地海洋学、冰川学、生物与生态学、地质与地球物理学、大气科学、空间物理、遥感以及极地环境污染（微塑料、核素等）等领域的观测数据，以及我国历次南北极科学考察的航次数据和样品分析数据\n②支持按数据年份、考察队/航次等条件检索，提供在线预览及部分数据直接下载\n2.数据汇交与管理\n①承担国家重点研发计划、极地科学考察专项等项目数据汇交，负责极地领域科学数据的统一管理和长期保存", url: "https://datacenter.chinare.org.cn/data-center/dindex", tags: "数据库,极地数据" },
{ category: "数据查找", name: "国家生态科学数据中心", brief: "国家生态系统观测研究网络，提供长期生态监测数据。", functions: "1.数据查询\n①可查找生态系统长期联网定位监测数据（水分、土壤、大气、生物等4个学科大类约300个监测项目的数据，已积累近30年）、中国碳氮水通量观测数据、生态遥感数据、生态站野外科技设施与样品资源、空间栅格气象数据、模型模拟数据、科学实验数据、野外调查数据、期刊论文关联数据、科技计划项目数据、科研团队数据等\n②可查找生态系统重要服务功能专题评估数据产品，包括生产力与固碳、生物多样性、水源涵养、土壤保持、防风固沙等多个层级的标准化数据产品\n③支持按主题、标签、内容及关联关系的数据发现模式，提供在线数据预览、批量下载及基于GIS地图服务的可视化展示\n2.生态数据分析与挖掘\n①基于生态网络云（Eco‑Cloud）平台，提供跨站点联网分析、模型模拟、数据同化等深度数据挖掘功能，支撑长期生态监测数据的多源融合与综合分析\n②提供生态站监测数据产品生产系统（EcoFlow），实现生态系统关键要素长期观测数据的自动化质量控制和统计分析，支持多层级标准化数据产品的加工生产以及一键汇交发布\n③可视化分析系统与全国野外站综合信息管理系统互联，以增强现实、实时视频等方式在线展示全国野外站监测设施资源分布及实时监测活动", url: "https://www.nesdc.org.cn/", tags: "数据库" },
{ category: "数据查找", name: "国家计量科学数据中心", brief: "国家级计量科学数据中心，提供计量参考数据、国家标准物质等信息。", functions: "1.数据查询\n①可查找计量参考数据（4.29TB结构化数据，含5298个数据集）、计量科研数据、计量基标准数据及计量检测数据（通过检定、校准等方式获得的权威计量器具数据）\n②可查找国家标准物质（涵盖13个领域6000余种国家有证标准物质）及获得国际互认的国家校准测量能力数据（截至2025年11月已达2010项）\n③支持按主题分类导航（如时间频率传递、计量基础设施、计量服务产业、放疗计量、重力计量等）及计量技术资源（社会公用计量标准、计量技术法规、机构服务能力等）的一站式综合检索\n2.专题数据库\n①标准物质数据库：集成标准物质信息查询、实物共享推广与技术交流功能\n②社会公用计量标准数据集：收集整理自248家机构，涵盖15项数据类别的计量标准权威信息\n③校准测量能力数据库：收录获得国际互认的校准测量能力数据\n④计量技术法规数据库：提供国家计量技术规范、政策法规等标准文件的检索与查阅\n3.AI与数据挖掘\n①基于人工智能、机器学习、模式识别等技术对海量计量检测数据进行自动化分析挖掘\n②利用爬虫与深度学习技术开发计量信息智能推送系统，实现多维度主题地图构建与个性化订阅推送\n③以数据为中心推进计量科研智能化，聚焦数据的准确性、溯源性及量值统一，支撑数字经济时代的质量基础设施建设", url: "https://www.nmdc.ac.cn/main/#/pages/index", tags: "数据库" },
{ category: "数据查找", name: "国家地震科学数据中心", brief: "国家级地震科学数据中心，提供测震、强震动、地磁等地震科学数据。", functions: "1.数据查询\n①可查找地震科学数据，包括地震观测类数据（测震、强震动、地磁、地电等）、地震探测类数据（地震测深、地球物理探测等）、地震调查数据（地震地质、活断层、灾害调查等）、地震专题数据（地震目录、震源机制、余震分布等）以及防震减灾综合数据\n②可查找“谛听”人工智能地震学训练数据集、青藏高原东北缘InSAR形变速率场、新疆/西藏地区基于三维速度模型的地震重新定位目录等特色专题数据\n③支持按数据类型、分区、关键词和时空范围进行多维度组合检索\n2.数据汇交与共享服务\n①承接国家各级科技计划项目科学数据的汇交任务，提供数据长期保存和管理服务\n②部分地震目录等基础数据集支持在线直接下载；其他数据需通过网站下单申请，按数据量和复杂度提供在线下载、邮件发送、硬盘邮寄和定向推送等方式交付\n③提供电话咨询、信息咨询以及根据用户需求线下定制专题数据产品等离线数据服务\n④网站具备用户管理、数据管理、元数据查询、数据可视化服务等功能，实现统一登录管理和一站式数据服务", url: "https://data.earthquake.cn/", tags: "数据库,地震数据" },
{ category: "数据查找", name: "国家空间科学数据中心", brief: "空间科学领域唯一的国家级数据中心，提供空间物理、空间天文等数据。", functions: "1.数据查询\n①可查找空间科学领域的数据资源，包括空间物理、空间环境、空间天文、太阳物理、行星科学、空间探测及卫星载荷数据\n②可查找南极中山站极光光谱仪图像数据、云南天文台地面日冕仪绿线数据、EP卫星FXT载荷数据等特色数据集\n③支持按卫星任务、载荷类型、学科领域等多维度浏览，提供泛在的数据检索与应用服务\n2.数据汇交与管理\n①承担国家重大科研专项任务和长期野外台站观测产生的科学数据及学术论文关联数据资源的汇交任务\n②实施数据的分级存储，确保数据安全与长期可用\n③牵头或参与起草了国家标准20余项，从资源描述、操作活动、过程管理三个维度贯穿空间科学数据全生命周期\n3.AI与数据分析\n①构建开放研究服务平台，与一线科研团队合作开展空间科学大数据分析、挖掘和应用核心技术研发\n②开发数据应用软件工具，提升数据应用效益，营造科学数据创新应用生态系统", url: "https://www.nssdc.ac.cn/nssdc_zh/html/index.html", tags: "数据库" },
{ category: "数据查找", name: "国家基因组科学数据中心", brief: "国家级基因组科学数据中心，提供多组学数据资源。", functions: "1.数据查询\n①可查找多组学数据，包括生物项目数据、生物样本数据、组学原始数据、基因组序列数据、基因组变异数据、非编码RNA数据、甲基化数据、单细胞数据、空间转录组数据等9大数据类型\n②可查找人类遗传资源和重要战略生物资源的多组学数据，支持一站式多组学数据检索\n③支持数据浏览、关键词检索和高级查询，所有数据资源免费向国内外用户开放\n2.AI与数据分析\n①提供严格质控的AI-ready数据，支持基因组注释和多组学数据关联\n②开发癌症剪接智能体（SpiceAgent），实现智能审编、问答与分析；构建ViralBERT核酸语言模型，优化病毒宏基因组分析\n③支持BLAST比对、基因组浏览器、数据可视化等在线分析工具", url: "https://ngdc.cncb.ac.cn/", tags: "数据库" },
{ category: "数据查找", name: "国家地球系统科学数据中心", brief: "国内规模最大的地球系统科学数据库群，涵盖18个一级学科。", functions: "1.数据查询\n①可查找地球系统科学与全球变化领域数据，涵盖大气圈、水圈、冰冻圈、岩石圈、陆地表层、海洋以及外层空间等18个一级学科\n②包括大气科学、水文学、冰冻圈科学、地质学、地球物理学、海洋科学、陆地表面科学、自然资源、生态环境、遥感与地理信息系统等主题数据\n③可获取国家科技计划项目汇交数据、多源卫星遥感产品、长期定位观测数据、全球变化模拟数据等\n④支持按学科分类导航、关键词检索、时空范围检索，提供在线预览和数据下载\n2.数据挖掘与知识发现\n①支持科学数据挖掘分析和重组，通过整合多源数据并利用知识可视化服务技术，直观呈现复杂数据的分析结果\n②提供数据在线分析、模型计算和知识发现等增值服务", url: "https://www.geodata.cn/", tags: "数据库,青藏高原数据" },
{ category: "数据查找", name: "国家青藏高原科学数据中心", brief: "针对青藏高原及周边地区最权威的科学数据中心。", functions: "1.数据查询\n①可查找冰冻圈数据（冰川、冻土、积雪）、固体地球数据（地质、地球物理）、古环境数据、陆地表层数据、人地关系数据、大气数据、遥感数据、日地空间物理与天文数据、海洋数据等青藏高原及周边地区的科学数据\n②可查找青藏高原大于0.01平方公里湖泊数据集（2020）、青藏高原500m日尺度表层土壤湿度数据集、青藏高原七大河流源区径流深数据集、中国1km分辨率逐月降水量数据集等明星数据产品\n③支持按数据目录导航、关键词检索、时空范围检索，提供中英文双语共享平台，3500多个数据集支持开放获取", url: "https://data.tpdc.ac.cn/", tags: "数据库" },
{ category: "数据查找", name: "国家人口健康科学数据中心", brief: "国家级人口健康科学数据中心，整合基础医学、临床医学、公共卫生等领域数据。", functions: "1.数据查询\n①可查找基础医学、临床医学、公共卫生、药学、中医药学、人口与生殖健康等领域的人口健康科学数据\n②可查找行业顶级专业机构的工作数据、监测数据、研究数据以及国家科技计划课题产生的科学数据\n③涵盖疾病监测、卫生统计、临床病例、药物信息、医学术语、标准、报告、人才等科技资源\n④普通注册用户可在系统上在线浏览、查询和下载数据", url: "https://www.ncmi.cn/", tags: "数据库" },
{ category: "数据查找", name: "国家林业和草原科学数据中心", brief: "国家级林业和草原科学数据中心，覆盖森林、草原、湿地等12大类数据。", functions: "1.数据查询\n①可查找12大类别的林草科学数据，包括森林资源数据（森林分布、蓄积量、树种组成）、草原资源数据（草地类型、产草量、载畜量）、湿地资源数据（湿地类型、面积）、荒漠资源数据、自然保护地资源数据等\n②可查找中国陆地生态系统定位观测研究站网数据、林草科学大数据、三北工程专题数据等\n③支持按数据目录浏览、关键词搜索等多种检索方式，提供在线浏览和数据下载服务", url: "https://www.forestdata.cn/", tags: "数据库" },
{ category: "数据查找", name: "国家冰川冻土沙漠科学数据中心", brief: "国家级冰川冻土沙漠科学数据中心，提供寒区旱区科学数据。", functions: "1.数据查询\n①可查找冰川数据（冰川编目、冰川变化、物质平衡）、冻土数据（多年冻土分布、活动层厚度、地温）、沙漠数据（沙漠边界、沙丘移动）、积雪数据、黄土数据、雪冰灾害数据及其作用区域的科学数据\n②资源涵盖我国寒区旱区的3大高原（青藏、蒙新和黄土），3条跨境河流、4大内陆河流域、3大廊道、4大盆地、8大沙漠、4大沙地、11大盐湖以及重点线状工程等区域的野外观测、调查考察、模拟、多源遥感等10种数据来源\n③已集成4005条高质量数据集，支持多维度数据查询，可解析复杂检索指令（如“近十年黄河流域植被覆盖数据”），自动关联卫星遥感、地面观测等多源数据\n④支持按专题浏览（如湖北巴东地质灾害数据专题）、关键词检索和时空范围检索\n2.AI与数据分析\n①推出智能数据助理（NCDC数据助理），提供智能化数据问答和推荐服务\n②发布全球冰冻圈研究引擎（GCE），集成了9大核心功能模块，汇聚了卫星影像、观测数据、冰冻圈特色数据、AI数据集、模拟数据等约1.1PB数据资源", url: "https://www.ncdc.ac.cn/portal/", tags: "数据库" },
{ category: "数据查找", name: "艾瑞网", brief: "国内首家新经济门户网站，提供互联网产业数据、报告、行业数据库。", functions: "1.数据查询\n①可查找电子商务、移动互联网、人工智能、医疗健康、网络游戏、网络广告、网络营销、媒体文娱等新经济领域的数据报告和行业数据库\n②可查阅网民行为研究数据（家庭办公用户等）、网络广告监测数据等，通过多种指标研究帮助行业建立评估标准\n③支持按行业、时间、指标等多维度定制化数据查询和分析\n2.行业服务\n①提供产业资讯、研究报告、行业数据库等综合信息服务，通过自主开发的各类数据库推动产业对互联网的量化认知\n②艾瑞指数板块提供APP活跃用户规模、行业渗透率等移动应用排名数据\n③研究报告支持在线预览和免费下载（官网上收费栏目无报告）", url: "https://www.iresearch.cn/mindex.shtml", tags: "数据库,金融数据" },
{ category: "数据查找", name: "同花顺数据", brief: "同花顺旗下金融市场数据服务平台，涵盖股票、基金、债券、期货、宏观经济等。", functions: "1.数据查询\n①可查找A股/港股/美股行情数据、历史K线数据、市盈率、市净率、总市值、换手率等股票数据\n②可查找融资融券数据（融资余额、融券余量）、资金流向数据、大宗交易记录、限售解禁安排等特色交易数据\n③可查找上市公司财务数据（资产负债表、利润表、现金流量表）、业绩预告、业绩公告等\n④可查找龙虎榜数据（涨跌幅/换手率异常个股的买卖详情）、机构席位动向，以及宏观经济数据（GDP、CPI、PPI、PMI等）、产业数据、产品价格数据\n⑤数据支持表格导出为Excel格式，所有历史数据和机构专用数据公开发布\n2.辅助功能\n①提供财经日历、业绩预测、投资机会、涨停聚焦等交易提醒和投资机会数据\n②同花顺iFinD金融大数据终端面向机构投资者提供股票、基金、债券、期货、外汇等全品类金融数据，支持API调用、Excel插件\n③部分数据需免费注册账号后获取完整权限", url: "https://data.10jqka.com.cn/", tags: "数据库" },
// ===================== 数据分析与可视化 =====================
{ category: "数据分析与可视化", name: "SPSS", brief: "SPSS是全球应用最广泛的统计分析软件之一，由IBM开发，广泛应用于社会科学、市场研究、医疗健康等领域。", functions: "1.数据分析\n①可对数值型数据进行描述性统计（均值、标准差、频数分布等）、假设检验（t检验、卡方检验）、方差分析（ANOVA）、相关性检验、非参数检验以及回归分析（线性回归、逻辑回归）等统计分析\n②可对分类变量进行卡方检验，评估变量间的关联性\n③可对时间序列数据使用Hodrick-Prescott、Baxter-King、Christiano-Fitzgerald等过滤器分解趋势和周期成分，支持趋势、季节性、残差分析\n④可执行高级建模，包括决策树、神经网络、生存分析、聚类分析等机器学习方法\n2.数据管理\n①支持Excel、CSV、文本文件及数据库等多源数据导入，兼容各类主流数据格式\n②提供变量定义与标签、缺失值处理、数据转换与计算、个案筛选与拆分等数据预处理功能\n③内置数据编辑器，采用类电子表格界面，可直观查看和编辑原始数据\n3.可视化与服务\n①支持生成直方图、散点图、箱线图、条形图、饼图等多种统计图表\n②提供互动式散点图等高级可视化功能，支持图表编辑和美化\n③提供定制化相关性表等内置脚本工具，提升分析流程效率\n④提供Curated Assistance上下文感知统计指导功能，可智能解读统计结果并给出修改建议", url: "https://www.ibm.com/products/spss", tags: "数据分析,数据可视化" },
{ category: "数据分析与可视化", name: "Stata", brief: "Stata是一款功能完整的集成统计分析软件，广泛用于数据操作、统计分析、可视化及自动化报告。", functions: "1.数据查询与分析\n①可对各种类型数据进行数据管理、清洗、转换、合并等操作\n②可执行描述性统计、t检验、方差分析、回归分析（含工具变量回归）、面板数据分析、生存分析、时间序列分析等统计模型\n③支持高级计量方法，包括异质性双重差分、中介效应、多向聚类标准误、野聚类自助法、工具变量分位数回归、贝叶斯模型平均等现代因果推断与计量建模方法\n④支持机器学习方法、结构方程模型等更复杂的数据建模\n⑤19版本进一步引入机器学习和面板数据分析的新功能\n2.可视化\n①支持绘制散点图、折线图、箱线图、核密度图等多种专业统计图形\n②通过图形编辑器可实现图形的精细调整和自定义\n③所有图形均以高分辨率输出，符合专业出版标准\n④统计图形设计精美，满足学术论文和报告的专业化诉求", url: "https://www.stata.com/", tags: "数据分析,数据可视化" },
{ category: "数据分析与可视化", name: "FineBI", brief: "FineBI是帆软软件推出的自助式BI数据分析平台，支持指标管理、自助分析、报表查询。", functions: "1.数据查询\n①支持Excel、CSV、数据库、数据仓库、云端数据等多种数据源的接入\n②提供数据准备功能：新建业务包、新建数据表、进行基础表处理操作（如关联、合并、行列转换等）\n③支持构建SPL、视图等复杂的数据模型，处理多表关联和复杂业务逻辑\n④核心支持一站式指标创建、管理、检索、申请审批和分析，通过“语义层”实现全局搜索+自由过滤快速定位所需数据\n2.数据可视化\n①提供折线图、柱状图、饼图、散点图、地图、仪表盘、漏斗图等数十种可视化组件，满足用户各种可视化需求\n②通过拖拽式操作，用户几秒内即可完成图表创建和调整\n③提供丰富的经营分析场景模板（如月度经营分析、应收账款分析、客户毛利分析等），可直接套用\n④支持实时数据自动更新，帮助用户及时了解数据变化趋势\n3.智能分析\n①对话式BI分析：支持自然语言问答取数和智能分析，支持对话结果一键生成仪表板\n②支持时序预测、聚类分析、趋势分析等内嵌算法\n③提供异常检测、明细下钻、归因分析等智能数据解读能力", url: "https://sem.fanruan.com/sem/finebi?utm_source=ad&utm_medium=sgtg&utm_campaign=bi-sqljp&utm_term=D74637&msclkid=9e94df274efc15871e8fb6ce8f1c1729", tags: "数据分析,数据可视化" },
{ category: "数据分析与可视化", name: "Tableau", brief: "Tableau是一款由斯坦福大学技术驱动的数据可视化分析软件，通过拖放式界面生成图表与仪表盘。", functions: "1.数据查询与接入\n①支持Excel、CSV、SQL数据库、云数据库（AWS、Azure等）、API接口等几十种数据源的无缝连接\n②支持跨数据库数据整合和实时数据连接\n③支持几十种数据源的无缝集成，支持多表关联和自定义SQL\n2.可视化分析\n①拖拽式操作，无需编程即可创建复杂的交互式图表和仪表盘\n②支持柱状图、折线图、饼图、散点图、地图、热力图、树状图、盒须图、甘特图等多种图表类型\n③高级分析功能：支持数据钻取、筛选、排序、计算字段、表计算、聚类分析、趋势线、预测等\n④提供自定义视图、布局、形状、颜色等个性化设置能力\n⑤支持地图可视化与地理坐标数据分析", url: "https://www.tableau.com/zh-cn", tags: "数据可视化" },
{ category: "数据分析与可视化", name: "Python", brief: "Python是一种通用编程语言，通过NumPy、pandas、Matplotlib等库成为数据科学领域最重要的工具之一。", functions: "1.数值计算（NumPy）\n①提供高效的多维数组对象（ndarray），支持大规模数据存储和运算\n②提供数学函数、线性代数、随机数生成、傅里叶变换等数值计算功能\n③数组运算速度接近C语言级别，是pandas、Matplotlib等高级库的底层依赖\n2.数据处理（pandas）\n①提供DataFrame和Series数据结构，便于处理结构化表格数据\n②支持数据清洗（缺失值处理、重复值删除）、数据转换、数据合并与连接、分组聚合等操作\n③支持多格式数据读写：CSV、Excel、SQL、JSON、Parquet等\n④时间序列处理能力强大，支持重采样、滑动窗口等操作\n3.数据可视化（Matplotlib、Seaborn等）\n①Matplotlib提供底层绘图API，支持折线图、散点图、柱状图、饼图、等高线图、3D图等各种图表类型\n②Seaborn基于Matplotlib封装，提供更美观的统计图形和高级绘图接口\n③Plotly、Bokeh等库支持交互式网页可视化\n④自定义能力强，满足学术出版级图表质量要求", url: "https://www.python.org/", tags: "数据分析,数据可视化" },
{ category: "数据分析与可视化", name: "SAS", brief: "SAS是全球领先的统计分析系统，由数十个专用模块构成，功能涵盖数据管理、分析、报告等。", functions: "1.数据管理与处理（SAS Base）\n①支持多源数据导入导出（Excel、CSV、数据库等）和跨平台数据访问\n②提供强大的数据清洗、数据转换、数据集合并、排序、筛选等功能\n③支持SQL过程进行数据库查询和操作\n④支持大数据集的批量处理和哈希表等内存处理技术\n2.统计分析\n①提供描述性统计、假设检验（t检验、卡方检验等）、方差分析、相关性分析、回归分析（线性、逻辑、非线性、广义线性）等基础统计功能\n②支持生存分析、时间序列分析（ARIMA、指数平滑等）、多变量分析（主成分分析、因子分析、聚类分析、判别分析）\n③支持运筹学方法（线性规划、整数规划）和计量经济学模型（面板数据等）\n④SAS Viya添加了贝叶斯网络、因子分解机、随机森林、梯度提升、神经网络、支持向量机等机器学习算法\n⑤支持数据分段、监督/无监督变量转换、分层建模、离群值检测、交互式特征生成、后模型可视化等预测建模任务\n3.可视化与报告\n①SAS Visual Statistics和SAS Visual Analytics提供可视化建模和分析环境\n②支持散点图、直方图、箱线图、等高线图、热力图、饼图等图形输出\n③可生成PDF、HTML、RTF等多种格式的专业报告\n④提供报表设计和交互式仪表盘制作功能", url: "https://www.sas.com/en_hk/home.html", tags: "数据分析,数据可视化" },
{ category: "数据分析与可视化", name: "R语言", brief: "R语言是一种专为统计计算和图形绘制设计的编程语言，广泛应用于数据科学和学术研究。", functions: "1.数据操作与处理\n①支持多种数据格式导入导出，包括CSV、Excel、SPSS、SAS、Stata、SQL数据库等\n②dplyr包提供数据清洗与整理：select（选取列）、filter（筛选行）、arrange（排序）、mutate（创建新列）、summarise（汇总）等函数\n③tidyr包支持数据重塑，包含数据透视、长宽格式转换等\n④data.table包提供高性能的大数据处理能力，适合百万级以上数据集\n⑤tidyverse是一套统一数据处理哲学的核心包集合，大幅简化数据工作流\n2.统计分析与建模\n①内置描述性统计、t检验、方差分析、线性回归、广义线性模型等基础统计方法\n②丰富的专业统计包覆盖时间序列分析（forecast）、生存分析（survival）、混合效应模型（lme4）、空间统计学（sp）等专门领域\n③机器学习：随机森林（randomForest）、支持向量机（e1071）、梯度提升（gbm、xgboost）、神经网络（nnet、keras）、聚类分析\n④R是统计建模新方法的首选发布平台之一，许多前沿统计方法最早以R包形式出现\n3.数据可视化\n①ggplot2提供基于图形语法的声明式绘图系统，通过图层叠加创建从简单到高度定制化的专业级图表\n②基础绘图系统支持快速绘制散点图、直方图、箱线图等常规统计图形\n③plotly、shiny支持创建交互式图表和Web应用，方便动态数据探索和仪表盘制作\n④可视化输出质量高，能够满足顶级学术期刊对图表风格的严格要求", url: "https://www.r-project.org/", tags: "数据分析,数据可视化" },
{ category: "数据分析与可视化", name: "Origin", brief: "Origin是科学与工程领域数据分析和绘图方面的领导软件，广泛应用于科技论文出版。", functions: "1.数据分析\n①支持描述性统计、假设检验、方差分析、相关性分析、非参数检验等基础统计分析\n②提供强大的曲线拟合功能，支持线性/非线性拟合、自定义拟合模型、批量拟合等\n③支持数据平滑、滤波、插值、积分/微分、峰值分析、基线校正等信号处理\n④支持正交试验设计与结果分析、方差分析等实验数据处理\n⑤具备数据溯源功能，可全程追踪图表生成所使用的原始数据与操作步骤，满足科研可重复性要求\n2.图形绘制\n①内置超过170种图形模板，覆盖2D和3D图形，包括散点图、线图、柱状图、箱线图、饼图、气泡图、瀑布图、极坐标图、等高线图、热图、向量图、3D曲面图、3D条状图等\n②可通过模板保存绘图设置，支持一键应用、批量化制图，批量处理成百上千个相似数据集\n③支持多轴图、多面板图，可组合多个图表形成复合图形\n④图形编辑器支持对象属性精细调整（颜色、符号、线型、字体、刻度等），满足期刊投稿的严格出版配图标准", url: "https://www.originlab.com/", tags: "数据分析,数据可视化" },
{ category: "数据分析与可视化", name: "GraphPad", brief: "GraphPad Prism专注于生物医学和生命科学研究的数据分析与科学绘图，统计与绘图高度集成。", functions: "1.数据分析\n①提供与实验设计相匹配的统计模块：t检验、单因素/双因素/重复测量方差分析（含事后多重比较）、非参数检验、线性/非线性回归（含自定义方程）\n②内置生存分析（Kaplan-Meier曲线）、列联表、受试者工作特征曲线分析等生物研究常用统计方法\n③支持定量分析和分类数据分析，自动识别数据类型并推荐最佳分析方案\n④回归模块支持标准曲线拟合（用于ELISA、qPCR等实验室数据换算）和剂量-反应曲线模型（计算半数抑制浓度、EC50等药理学关键参数）\n⑤多变量数据模块提供类似电子表格的计算列和数据转换操作\n2.图形绘制\n①提供超过35种与统计方法协同的图形类型，包括散点图、柱状图（含个体值叠加）、箱线图、小提琴图、折线图、气泡图、生存曲线、热图等\n②基于原始数据自动生成误差条（标准差、均值的标准误、置信区间），并可在数据和统计结果视图间自由切换\n③提供丰富的图形自定义选项：配色方案、数据样式、标签字体等\n④支持图形布局功能，可在单张页面上排列多张相关图表，适用于论文多图版组合", url: "https://www.graphpad.com/", tags: "数据可视化" },
{ category: "数据分析与可视化", name: "镝数图表", brief: "镝数图表是国内领先的零代码数据可视化平台，提供140多种图表模板。", functions: "1.零代码可视化编辑\n①无需编程，通过拖拽式操作和模板套用即可快速创建专业图表\n②提供140多种图表模板，涵盖柱状图、折线图、饼图、散点图、雷达图、漏斗图、极坐标图等13大类常用可视化类型\n③支持多场景图文模板（PPT、海报、信息长图、新媒体配图），满足数据新闻、商业报告、社交媒体营销等多种需求\n2.数据联动与呈现\n①上传Excel、CSV文件后自动识别数据并生成图表，支持实时数据更新\n②图表与数据源联动，数据修改后可视化结果同步自动更新\n③支持数值的排序、筛选、聚合运算等基础数据处理\n④可自由切换颜色、字体等样式配置\n⑤图表支持交互式功能（悬浮显示数值、图例筛选），并可导出为静态/交互式多种格式\n3.AI智能图表\n①AI Agent驱动：上传Excel或Word文件后，系统自动识别并快速生成可深度编辑的图表与数据报告\n②自动分析数据维度，智能推荐最适合的图表类型，一秒生成专业级别图表\n③自有算法和智能编辑器，支持图表、文本、图像等多元素灵活组合和精确编辑", url: "https://dycharts.com/", tags: "数据可视化" },
{ category: "数据分析与可视化", name: "Qlik", brief: "Qlik是全球领先的数据集成与分析平台，提供Qlik Sense和QlikView等商业智能产品。", functions: "1.数据查询\n①支持100+种数据源接入：数据库（SQL Server、Oracle等）、数据仓库（Snowflake、Redshift等）、云应用（Salesforce、Google Analytics等）、本地文件（Excel、CSV、XML、JSON等）\n②通过直观的拖拽操作，跨库连接和整合多个异构数据源，无需编写SQL代码即可构建数据模型\n③提供元数据目录管理功能，可查看和理解组织中所有可用数据集的详细信息\n2.数据可视化与分析\n①提供丰富的可视化组件库（条形图、折线图、散点图、饼图、地图、热力图、盒须图等），支持多角度分析、向下钻取、数据分组等交互操作\n②支持自定义和可扩展的仪表板，提供多个预置图表模板和布局选项\n③支持高级分析，包括趋势线、聚类分析、预测、统计检验等\n④可视化组件之间自动联动，点击任一图表即可自动筛选关联图表，无需手动配置\n3.智能AI与增强分析\n①智能分析Agent集成问数、解读、报告三大核心能力，支持自然语言查询，快速生成可视化结果\n②Smart visual suggestions智能可视化推荐\n③可自动识别生产异常并完成根因归因，自动生成数据洞察与优化建议", url: "https://www.qlik.com/", tags: "数据分析" },
{ category: "数据分析与可视化", name: "Apache Echarts", brief: "Apache ECharts是一款基于JavaScript的开源可视化图表库，支持20多种图表类型。", functions: "1.图表类型\n①基础图表：柱状图（条形图）、折线图（面积图）、饼图（环形图、南丁格尔玫瑰图）、散点图（气泡图），几乎覆盖所有数据分析常规需求\n②统计图表：K线图（股票烛台图）、盒须图（箱线图），支持统计分布和财务数据展示\n③地理信息图表：地图、热力图、线图（迁徙图），支持GeoJSON和SVG扩展\n④关系图表：关系图、矩形树图、旭日图（多层环形饼图），展示层级和网状关系数据\n⑤多维及专业图表：平行坐标轴、漏斗图、仪表盘、桑基图、词云、主题河流图、日历坐标图等\n⑥支持图表混搭，在一个坐标系内混合多种图表类型，以及图与图之间组合布局\n2.交互特性\n①提供数据区域缩放、图表切换、图例开关、Tooltip悬浮提示、数据刷选（框选高亮）、图表下钻/上卷等丰富的交互组件\n②支持多图表联动，点击任一图表可触发其他图表的筛选高亮，强化数据关联性发现\n③支持大数据量场景下的渐进式渲染和数据采样，保证界面流畅度", url: "https://echarts.apache.org/zh/index.html", tags: "数据可视化" },
// ===================== 科研绘图 =====================
{ category: "科研绘图", name: "Nano Banana", brief: "Nano Banana是由Google Gemini系列多模态大模型驱动的AI图像生成与编辑平台。", functions: "1.AI图像生成\n①支持输入自然语言提示词生成高质量图像，用时约1-3分钟\n②可自定义图像尺寸/比例及画质精细度\n③采用Gemini Flash Image模型，具备序列上下文感知和交错生成能力\n2.Nano Banana Pro高级功能\n①突破性文本渲染：生成带有清晰文字的图像，适用于海报、LOGO、UI界面\n②多图融合：最多融合10张参考图像，进行创造性重组\n③专业4K输出：原生高分辨率，满足商业出版需求\n④空间布局理解：支持3D对象操作，多主体编辑时保持特征一致性\n3.图像编辑与创意处理\n①支持风格转换（美妆、时尚、插画等）\n②多角度角色保持：在不同视角下保持角色外观稳定\n③多图合并与序列生成：将最多3张图组合成连贯构图或连续叙事\n④超现实艺术创作与风格集成", url: "https://nanobanana.co/zh", tags: "科研绘图" },
{ category: "科研绘图", name: "boardmix", brief: "博思白板boardmix是一款AI驱动的在线协作白板，提供思维导图、流程图等多种图表绘制工具。", functions: "1.AI智能绘图\n①输入主题关键词或自然语言描述，AI可一键生成结构化思维导图、流程图，并能根据上下文自动推荐SWOT、五力模型等商业分析框架\n②支持通过自然语言描述逻辑步骤，AI自动识别判定条件、执行动作和数据流向，按标准符号库自动排版生成流程图\n③内置50+图形库，涵盖业务流程图、UML、架构图、组织架构图、用户旅程图等多种图表类型\n2.团队协作办公\n①支持多人同时在线编辑，实时同步更新，最高支持500人团队协作\n②支持将白板内容一键转换为演示文稿（PPT），实现从创意到可视化表达的一站式输出\n③支持与视频会议、项目管理工具等集成，适配课堂教学、企业培训等场景", url: "https://boardmix.cn/ai-whiteboard/?code=Gc0GUAjDRBrz", tags: "科研绘图" },
{ category: "科研绘图", name: "MedPeer", brief: "MedPeer是一款专为科研人员设计的AI科研绘图工具，内置10万+多学科矢量图标和2000+顶刊模板。", functions: "1.素材与模板\n①内置10万+多学科矢量图标，覆盖生物医学、化学、材料科学等30+学科，包含细胞通路、实验流程、分子结构、数据图表等科研全场景\n②提供2000+模仿Nature、Cell等顶刊风格的专业模板，涵盖示意图、流程图、数据可视化图等类型，可直接替换数据进行套用\n③系统根据绘图主题智能推荐相关图标，提升找图效率\n2.AI图片创作\n①支持自由自定义画布比例和图片分辨率，完美适配各大SCI期刊、基金申报书的格式规范\n②支持上传手绘草图或简易草稿，AI能精准还原设计思路并完成专业化渲染\n3.格式导出与合规\n①支持PNG、TIFF、PDF、JPEG等多种格式导出，TIFF格式最高可达1200dpi分辨率\n②内置符合学术规范的色彩搭配和元素布局，提供AI一键智能改色功能", url: "https://product.medpeer.cn/product/index/productDetails?page=drawing&P_S_C=keyanmate", tags: "科研绘图" },
{ category: "科研绘图", name: "ColorDrop", brief: "ColorDrop是一款便捷的在线色彩提取与配色工具，支持AI生成配色方案。", functions: "1.配色方案\n①提供成千上万种精美配色方案，按柔和、明亮、动感等印象类型分类，以四宫格颜色为一组展示\n②每天自动生成新的配色方案，涵盖每年流行的颜色搭配及CSS色彩分类，每年流行渐变色彩均可一键预览\n③支持AI生成配色方案，用户可通过英文输入生成精美化配色主题\n2.色彩获取\n①点击任意颜色即可显示并一键复制其十六进制（HEX）颜色值，方便在设计软件中直接使用\n②支持上传图片，AI自动识别并提取图片中最显眼的颜色，生成相应配色方案\n3.交互与预览\n①支持更换不同背景颜色，预览在不同背景配色中套用某种颜色的视觉效果\n②网站包含日本传统色辞典等特色功能，可查阅中国传统/日本传统色彩命名，点击色彩可直接吸取色值\n③支持颜色搜索与筛选，便于用户根据需求查找特定配色", url: "https://colordrop.io/", tags: "科研绘图,配色工具" },
{ category: "科研绘图", name: "FigDraw", brief: "FigDraw是国内首个开放式原创素材在线绘图平台，拥有1.6万个原创矢量素材。", functions: "1.原创素材与模板\n①拥有超过1.6万个原创矢量素材，包含国自然技术路线图、通路图、蛋白质修饰、单细胞测序、细胞、蛋白、核酸、人体结构、医学手绘、国风素材、3D元素等\n②提供大量顶刊级原创模板，涵盖示意图、流程与技术路线图等常见科研配图类型，可给用户带来排版与用色灵感\n③支持用户上传自有素材（支持svg、jpg、png等格式），并可对上传图进行裁剪、修改色系、饱和度等调整\n2.智能绘图工具\n①支持对矢量素材进行简单的拖拽、拆分、组合等操作，无需专业绘图技能即可完成个性化绘制\n②内置AI智能改色系统，基于上千张CNS配图总结的配色方案，结合中国传统色，一键修改图色的色相与饱和度\n③智能流程图板块提供大量可编辑形状，支持任意改动圆角、边线、颜色、角度，配备可追随箭头辅助排版", url: "https://www.figdraw.com/#/", tags: "科研绘图" },
{ category: "科研绘图", name: "Biorender", brief: "BioRender是一款专为生命科学领域设计的在线科研绘图工具，提供超过4万种预绘制科学图标。", functions: "1.图标库与模板\n①提供超过4万种预绘制科学图标，覆盖神经科学、免疫学、微生物学、细胞生物学等30多个生命科学领域\n②搭配多种图库分类、版型以及官方授权模板，涵盖实验方法、生化通路、细胞结构等常见科研场景\n2.AI编辑功能\n①集成BioRender AI，支持Apply BioRender Style（一键应用BioRender风格）、Remove Background（移除背景）、Apply 3D Style（应用3D风格）、Adjust Colors（颜色调整）、Remove Text（移除文本）等AI操作\n②提供Smart Search智能搜索功能辅助快速查找图标\n3.协作与出版\n①支持直观的拖拽式创建和修改功能，可轻松更新或修改图表\n②支持导出为出版、展示、网页和打印等多种格式，享有出版许可保护，可将图表用于期刊、文章、宣传材料等\n③安全Web门户自动保存工作，支持团队云端存储和安全共享图标及文件", url: "https://www.biorender.com/", tags: "科研绘图" },
{ category: "科研绘图", name: "Freepik", brief: "Freepik是一个AI驱动的创意平台，集成超过36种AI图像模型，提供矢量素材和AI图像生成。", functions: "1.AI图像与视频生成\n①提供超过39种AI图像生成模型访问权限（截至2026年3月），包括Nano Banana、Nano Banana Pro、Kling 2.5、Google Veo 3.1、Seedream 4.5等市场领先模型\n②Premium+和Pro订阅用户享2K分辨率的Nano Banana Pro无限生成服务，4K分辨率生成信用成本大幅降低至150积分/次（原500积分）\n③支持Kling 2.5视频生成（720p、5秒）无限使用，Kling 2.6 Motion Control信用成本降至250积分/次（原325积分）\n2.图像编辑与处理\n①集成Magnific AI图像放大技术，提供图像高清无损放大功能\n②支持AI图像变体工具，基于单张参考图进行图像重构、故事板延展、人物模式保持身份、自定义模式修改场景与细节等操作\n③提供背景移除、图像转制、AI图像生成器、AI变体等全套编辑工具\n③支持多模型并行，最多支持8个并行生成\n3.素材库与变体工具\n①收录海量矢量图、PSD模板、照片和图标，涵盖Adobe Stock、Shutterstock等高质量资源\n②支持基于单张参考图进行四类可控编辑：图像重构（补全视角/构图）、故事板延展（生成连贯视觉叙事）、人物模式（保持身份一致调整特征）、自定义模式（灵活修改场景、光影、细节等），所有操作均通过提示词预设实现", url: "https://cn.freepik.com/", tags: "科研绘图" },
{ category: "科研绘图", name: "Vecteezy", brief: "Vecteezy是一个在线矢量素材和创意资产交易平台，提供数百万高质量免费的矢量图、照片、视频。", functions: "1.素材库\n①提供数百万高质量免费矢量图、照片、视频和模板，涵盖矢量插画元素、可编辑SVG模板、AI生成素材等\n②2025年新增社论影像板块，提供体育、新闻和娱乐类图像供社交媒体使用\n2.搜索与筛选\n①提供九种搜索筛选器，支持按许可证类型（免费/Pro/社论/AI生成/全部）、颜色（色轮或十六进制码输入）、方向（横向/纵向/方形/全景）、图片风格（抽象/特写/剪切/留白空间/静物）等条件筛选\n②支持排序（最佳匹配/最新）和AI内容过滤（AI图像/非AI图像/全部）", url: "https://www.vecteezy.com/", tags: "科研绘图" },
{ category: "科研绘图", name: "SciDraw", brief: "SciDraw是由AI驱动的科研绘图平台，支持自然语言描述、草图上传生成出版级科研配图。", functions: "1.AI生成模式\n①Prompt模式：用户输入自然语言描述，AI即可生成结构化科研插图，支持多轮对话迭代调整细节，内置TOC图形摘要、实验工作流、信号通路等常用模板及多种艺术风格\n②Sketch模式：支持上传手绘草图照片，AI自动识别拓扑结构并转化为出版级别专业示意图，保留原始草图的节点位置和连接关系\n③Free Edit模式：用户上传已有图片后通过自然语言下达编辑指令，支持背景更换、标注字体统一、元素添加/删除等操作，无需专业图像处理软件\n2.格式与发表\n①支持导出SVG矢量格式，可在Illustrator、Inkscape、PowerPoint中进行二次编辑，区别于通用AI生图工具仅输出光栅图的限制\n②内置期刊投稿格式检查器，自动检测图片分辨率（照片300 DPI、线稿600-1200 DPI）、格式（PNG/TIFF/SVG）和色彩方案是否通过色盲友好测试\n③提供图形摘要生成功能，支持根据不同期刊的尺寸和配色规范调整输出；内置技术路线图制作器，输出项目时间线和研究方案流程图\n3.免费模式\n①免费注册后每月赠送20积分，足量生成多张图片\n②已覆盖全球20多个国家，累计生成超10万张科研配图", url: "https://scidraw.io/", tags: "科研绘图" },
{ category: "科研绘图", name: "Hiplot", brief: "Hiplot是一款免费且功能强大的生物医学数据可视化平台，提供上千种图表模板。", functions: "1.图表矩阵\n①提供上千种图表模板，包括散点图、线图、热图、柱状图、饼图、热力图、火山图、生存分析图、韦恩图、PCA图、箱线图等，覆盖数据统计与生物信息学分析的主流可视化需求\n②支持平行坐标图等高维数据可视化，用于深度学习调参和超参数探索等场景\n③提供多样化的图形展示方式，用户可根据实验数据特点选择最适合的展示形式\n2.AI分类推荐与数据处理\n①基于AI智能推荐系统，通过多维度数据理解和用户意图识别技术，精准推荐图表类型\n②支持上传标准化数据（整合多种组学数据），AI自动识别数据特征并推荐最佳可视化形式③实时调整图表参数，支持图片在线预览和导出，导出格式适配SCI投稿要求\n3.全流程平台整合\n①整合绘图、分析、学习和需求解决等功能，一个平台即可完成从数据可视化到深度分析的全过程\n②免费功能完全满足日常科研绘图需求，部分高级功能可能需要付费升级", url: "https://hiplot.com.cn/home/index.html", tags: "科研绘图,免费" },

{ category: "AI学术工具", name: "DeepSeek", brief: "DeepSeek是深度求索自主研发的大语言模型，专注于代码、数学、逻辑推理与通用任务。", functions: "1.编程开发\n①支持80+编程语言（Python、Java、C++、JavaScript、Go、Rust、SQL、MATLAB等）\n②生成可直接运行的代码（带注释、符合规范、处理边界条件）\n③调试与优化：指出Bug、提升性能、转换语言（如Python→C++）\n④工程级项目：搭建Web应用、数据分析脚本、机器学习pipeline\n2.数学与科学计算\n①解高中/大学数学题（微积分、线性代数、概率统计、微分方程）\n②物理/化学公式推导与数值计算\n③支持LaTeX输出，适合论文写作\n④在AIME、MATH等权威评测中超越GPT-4\n3.学术与技术写作\n①撰写论文引言、方法、结论\n②生成技术报告、项目文档、API说明\n③中英文学术翻译（保留专业术语）\n④自动整理参考文献格式（APA/GB/T 7714）\n4.智能问答与知识检索\n①回答计算机、电子、金融、工程等领域专业问题\n②结合最新技术趋势（如AI、量子计算、6G）\n③支持128K超长上下文，可分析整篇PDF或长文档", url: "https://chat.deepseek.com/", tags: "AI智能工具" },
{ category: "AI学术工具", name: "AiPy", brief: "AiPy是一款“AI大模型+Python执行环境”的数字员工，能理解需求并直接执行代码交付结果。", functions: "1.自动化任务执行\n①AI理解需求后，结合 Python 生态自动生成执行方案，直接运行并交付结果\n②可完成数据分析、文件批量处理、爬虫、自动化办公流程等具体任务\n③案例：22 万条无格式存储科研数据，十分钟内完成分析\n④帮助财务人员发现电商结算账单错误，挽回了 150 万元损失\n⑤非技术背景用户借助 AiPy 开发了 HR 智能简历筛选系统\n2.大文件与海量数据处理\n①支持分析 10GB 以上的超大规模文件，以及同时分析 1000 个海量文件\n②可分析内网数据库、本机 CAD 图纸、Excel/CSV 等非格式化科研数据\n3.多场景应用\n①可生成数百页招标文件、编写计算机辅助设计程序、生成测试用例等\n②生成产品原型图设计（直接输出 HTML 文件）、小说创作智能体等\n③支持分析实验室仪器的实时数据并生成监测报告\n4.平台特色\n①对非技术人员友好，支持中文界面，中国大陆无门槛使用\n②支持控制本机其它软件、APP 和局域网设备\n③支持生成图片、音视频等多模态内容\n④提供免费下载试用", url: "https://www.aipyaipy.com/?referral=BJ5OOSP&utm=cg&cgv=yanweb", tags: "AI智能工具" },
{ category: "AI学术工具", name: "沁言学术", brief: "沁言学术是一款面向高校、科研机构的一站式AI学术科研平台，覆盖科研全生命周期。", functions: "1.全流程学术服务\n①覆盖从 AI选题、文献检索、文献下载、文献阅读，到笔记整理、学术问答、辅助写作的全链路\n②支持多源一站式检索，可智能筛选与多维检索，平均节省 80% 检索时间\n③支持 95% 以上文献一键批量下载与自动整理\n2.AI辅助写作与研究\n①支持文献综述智能生成，综述效率提升 70%\n②支持润色、翻译、出提纲、方法设计、研究论述撰写\n③支持调研报告自动生成、脑图梳理（文献脉络可视化）、研究设计大纲规划", url: "https://app.qinyanai.com/?utm_source=cakegrowth&utm_medium=vzdkjq8n1r&sourceCode=MEZ7I0R6", tags: "AI智能工具" },
{ category: "AI学术工具", name: "AskManyAI", brief: "AskManyAI是一站式多模型AI聚合平台，支持“一问多答”同时向多个顶尖AI模型提问。", functions: "1.多模型协同问答\n①支持一次性向多个顶尖 AI 模型提问，获取多角度答案，便于分析对比，筛选最优解\n②集成模型覆盖主流国内外大模型，如 GPT-4、Claude、Gemini、Grok、Kimi、DeepSeek、文心 4.0 等\n2.多功能集成\n①支持文本对话、联网搜索，提供实时信息获取能力\n②支持文档分析和代码编程、AI 绘画等高级功能\n3.教育与科研应用\n①为复杂问题（如科研假设验证、学术观点论证）提供不同模型的交叉验证\n②支持对上传的文档（如实验报告、复习资料）进行多模型智能分析与对比\n4.使用便捷性\n①提供友好的免费试用额度，方便新用户探索和体验\n②适配团队协作和项目管理，为企业和开发团队提供多模型一体化的使用环境", url: "https://askmany.cn/login?i=c18638ff", tags: "AI智能工具" },
{ category: "AI学术工具", name: "Gemini", brief: "Gemini是Google开发的原生多模态大模型，支持文本、图像、音频、视频的统一理解与推理。", functions: "1.原生多模态交互\n①支持文本、图像、代码、音频、视频的统一理解与推理，无需多步骤转换，实现真正的“原生多模态”\n②可处理复杂跨模态信息，如解读图表、生成视频字幕、理解屏幕内容并做出智能反应\n③结合图像生成模型（如 Nano Banana）可实现文生图、科研绘图等高级视觉创作\n2.超长上下文与推理能力\n①支持 200 万 Token 的超长上下文窗口，可一次性处理整部《战争与和平》或多篇长篇论文\n②在 AIME、MATH 等数学推理权威评测中展现高水平性能\n③具备强大的代码理解与生成能力，支持多种编程语言\n3.跨应用智能与生态集成\n①可通过自然语言直接调用 Gmail、Google Drive、地图、YouTube、日历等 Google 生态应用执行任务\n②可跨应用整理资料、生成报告、管理日程、处理邮件，实现端到端的智能体工作流", url: "https://gemini.google.com/?hl=zh-HK", tags: "AI智能工具" },
{ category: "AI学术工具", name: "千问", brief: "千问是阿里云自主研发的大语言模型系列，已演进为覆盖语言、数学、代码及视觉生成的全模态模型。", functions: "1.多模态理解与生成\n①原生统一架构整合文本、图像、视频、音频的全面理解与生成\n②包含多模态视觉生成基座模型，支持文生图、文生视频等创作能力\n③支持图像识别、视频分析和跨模态任务，可灵活应用于内容创作与智能交互场景\n2.超大上下文\n①最新模型支持百万级Token的上下文窗口，可一次性处理整部《红楼梦》并精准描述细节\n②适用于海量文档分析、超长记忆、复杂推理等企业级及科研场景\n3.编程与数学能力\n①专门优化的数学与代码模型在 MathQA、HumanEval 等专业评估中具备高水平性能\n②支持多种编程语言的代码生成、调试和转换\n③可用于学术研究、工程计算和软件开发等任务\n4.多语言与行业生态\n①支持 119 种语言，为全球开源社区下载量最高的中文大模型\n②Qwen-MT 模型擅长中英互译、中文与小语种互译（含日、韩、法、西、德、泰等 26 种）\n③构建全球最大开源大模型生态，衍生模型超 20 万款，全球下载量突破 10 亿次\n④千问App已全面接入淘宝、支付宝、飞猪、高德等阿里生态核心业务，形成智能体经济全场景覆盖", url: "https://www.qianwen.com/", tags: "AI智能工具" },
{ category: "AI学术工具", name: "ChatGPT", brief: "ChatGPT是OpenAI开发的最广泛使用的AI对话助手，具备强大的通用生成和理解能力。", functions: "1.通用对话与推理\n①支持从日常对话到复杂问题的自然语言理解与生成\n②内置多种推理版本模型（如 o1、o3-mini 系列），在数学、科学和编程等推理密集型任务中具有高水平表现\n2.多模态理解与创作\n①支持对上传的图像进行识别与分析\n②支持文档上传，提取并分析其中的文字信息，适用于文献阅读、数据处理等场景\n③结合 DALL-E 等模型集成可生成高质量图像\n3.编程辅助\n①支持 80+ 编程语言（Python、Java、C++、JavaScript、Go、Rust 等）的代码编写、调试、优化和解释\n②可辅助搭建完整应用、自动化脚本和数据分析流程，适用于科研和工程开发\n4.学术与研究辅助\n①支持文献摘要、学术文稿润色和修改、中英互译\n②自动整理满足主流格式（APA、MLA、GB/T 7714 等）的参考文献\n③适用于论文写作、研究报告和科研材料准备等场景", url: "https://chatgpt.com", tags: "AI智能工具" },
{ category: "AI学术工具", name: "秒哒", brief: "秒哒是百度开发的零代码应用生成式开发平台，通过对话即可创建网页、小程序、游戏等应用。", functions: "1.无代码对话式应用生成\n①通过自然语言表达需求，AI 自动生成完整可运行的应用，无需任何编程背景\n②生成时间约为 5 分钟左右，实现从“对话到应用”的一站式落地\n③支持生成多种应用类型：网页、小程序、游戏等\n2.Skill 与 OpenClaw 集成\n①发布全球首个应用生成 Skill，支持与 OpenClaw 智能体对接，形成开发生态\n②支持应用全生命周期操作：查询应用清单、新建或修改应用、追溯完整对话开发历史\n③支持配置微信授权，将开发的小程序发布至自有微信小程序渠道", url: "https://www.miaoda.cn/?invitecode=user-7600x2qp1edc", tags: "AI智能工具" },
{ category: "AI学术工具", name: "AskGo", brief: "AskGo是多模型集成AI聊天助手平台，将ChatGPT、DeepSeek、Claude、Gemini等数十个模型聚合统一界面。", functions: "1.多模型聚合与一站式入口\n①集成 GPT 系列、DeepSeek、Claude 系列、Gemini、Grok、Kimi 等数十个国内外主流顶尖模型\n②覆盖聊天、搜索、阅读、创意写作、程序开发、专业翻译、图像生成、视频生成全场景能力\n③为开发者简化多模型接入流程，无需为每个模型的更新进行重复适配\n2.课程与代码辅助\n①支持常规编程辅助：代码生成、调试、优化、跨语言转换\n②在复杂任务场景，用户可同时调用不同模型（如 Gemini + Claude + DeepSeek）协同完成\n3.科研绘图与应用创作\n①在中英文科研社区被广泛用于科研绘图（如结合图像生成模型进行 BioRender 风格的科研图表生成）\n②支持对不同模型生成的图像结果进行对比，选择最优可视化方案", url: "https://askgo.io/", tags: "AI智能工具" },

{ category: "AI学术工具", name: "Flowith", brief: "Flowith是基于画布的多智能体AI原生操作系统，支持同时在画布上组织和调度多个AI智能体并行执行。", functions: "1.画布式多智能体协作\n①AI 智能体以节点形式进入画布，用户可将智能体工作组织为节点和分支进行视觉化编排\n②支持子智能体并行执行批量任务，从历史画布中提取上下文\n③支持超过 1000 个步骤的开放式任务执行（如网站开发、代码构建、演示文稿生成的全流程自动化）\n2.超长上下文与并行工作\n①拥有超大规模无限上下文支持，可处理科技项目全周期记忆和分析超长文档\n②可实现多任务并行处理，多个 AI 智能体在同一画布上执行不同子任务\n③Agent 调度支持长期监控分析（如高频交易监控、社交媒体运营）\n3.多模型访问与多模态生成\n①平台支持 GPT-5、Claude 4.5/4.7 Opus、DeepSeek、Kimi 等 40 多个模型的访问\n②支持图像生成、视频生成、代码构建、PPT 生成等多种内容创作类型\n③可同时调用多个模型对比不同生成结果，便于筛选最优方案", url: "https://flowith.io/blank", tags: "AI智能工具" },

{ category: "PPT工具", name: "AiPPT", brief: "AiPPT是一款全智能AI一键生成PPT的在线创作平台，输入一句话，1分钟生成专业演示文稿。", functions: "1.AI一键生成完整PPT\n①输入任意主题（如“碳中和政策解读”“大学生创新创业计划书”），AI自动生成逻辑清晰的大纲（含章节结构）\n②自动撰写每页文案内容（标题+要点）\n③自动匹配行业风格模板（科技、教育、医疗、党政等）\n④输出可直接编辑的PPT，支持下载.pptx或在线演示\n2.智能润色与排版\n①AI内容优化：对已有文案进行精炼、扩写或风格调整（如“更正式”“更简洁”）\n②智能配色与字体：自动应用视觉协调的设计方案\n③一键换装：已有PPT可快速更换整套模板风格\n④文档转PPT：上传Word/PDF/TXT，AI提取核心信息生成演示文稿\n3.海量模板与场景覆盖\n①覆盖50+行业与100+场景，包括教育（教学课件、说课稿、家长会）、职场（年终总结、项目复盘、述职报告）、创业（BP商业计划书、融资路演）、学生（毕业答辩、社团招新、课堂展示）、党政（党建汇报、政策宣讲、乡村振兴）等", url: "https://www.aippt.cn/?utm_type=Navweb&utm_source=keyan&utm_page=aippt&utm_plan=aippt&utm_unit=AIPPT&utm_keyword=40517289", tags: "PPT制作" },

{ category: "PPT工具", name: "麦当秀", brief: "麦当秀是一款AI驱动的智能演示文稿生成工具，免费使用，输入一句话主题即可1分钟生成PPT。", functions: "1.AI一键生成PPT\n①输入标题或关键词，AI在1分钟内自动生成包含布局、文本、图片的完整PPT\n②支持多轮优化和局部内容修改\n2.多格式文档导入\n①支持Word、PDF、Markdown、TXT等格式文件导入，智能解析自动转换\n②本地模板可一键转为在线PPT\n3.AI智能配图与多语言\n①根据PPT内容或关键词快速生成匹配图片，用户可自定义调整\n②支持中文、英文、日语、韩语等多种语言，系统自动翻译并保留原有排版\n4.云端多端同步\n①浏览器端自动保存，支持在线编辑，手机和电脑实时同步\n②完全免费，支持无水印导出", url: "https://www.mindshow.vip/workstation/?from=aito001#/home_page", tags: "PPT制作" },
{ category: "PPT工具", name: "秒篇AIPPT", brief: "秒篇AIPPT采用“说明书”式定制机制，生成PPT前先输出内容说明书，用户确认后再生成。", functions: "1.AI一键生成PPT\n①输入PPT主题，30秒内生成完整PPT\n②支持链接生成PPT、大段文本生成PPT等多种方式\n2.“说明书”式内容定制\n①生成PPT前，AI先输出内容说明书，将内容细化到每一页的文字和设计要求\n②用户可将说明书微调确认后，再由AI生成最终PPT\n3.多格式导入\n①支持Word/PDF一键转PPT，保留文档结构与关键元素\n②支持链接生成和大段文本生成\n4.AI辅助编辑\n①AI自动生成结构化大纲，带内容解析，支持自定义编辑和修改\n②自动生成匹配主题风格的演讲逐字稿，确保演示流畅\n5.海量模板与全场景覆盖\n①内置丰富PPT模板库，涵盖学术报告、教学备课、政策宣讲、心得体会、工作总结等场景\n②覆盖学术、教育、职场、营销、设计方案等全行业场景", url: "https://www.miaopian.cn/?from=tomyres", tags: "PPT制作" },
{ category: "PPT工具", name: "文多多AIPPT", brief: "文多多AIPPT是AI驱动演示文稿自动化工具，核心特色是私有化可部署、全场景适配、定制化服务。", functions: "1.AI一键生成PPT\n①输入PPT主题或要求，AI在1分钟内自动生成大纲与完整PPT\n②生成内容为100%可编辑的结构化源文件\n2.多格式导入\n①支持Word、PDF、思维导图等文档格式一键转换为PPT\n②保留文档中的结构、图像和表格等关键元素\n3.私有化部署\n①支持企业本地化独立部署，保障数据安全和合规性\n②基于企业VI规范的全链路模板定制，适配企业字体、配色、LOGO位置等视觉要求\n4.智能编辑美化\n①智能排版与自动配图，提供海量专业模板选择\n②基于预设排版方案和行业规范化布局，无需手动调整", url: "https://docmee.cn/zh?source=ai-to", tags: "PPT制作" },
// ===================== 翻译工具 =====================
{ category: "翻译工具", name: "DeepL", brief: "DeepL是一款基于神经网络的翻译与写作辅助工具，以“世界最准确的机器翻译”著称。", functions: "1.文档翻译与排版保留\n①支持PDF、Word、PPT、TXT等格式文件直接翻译，译文保留原文排版布局、表格结构与图表位置\n②支持网页即时翻译及浏览器插件（Edge、Chrome），可在Google Workspace中无缝使用\n2.专业术语与写作辅助\n①支持自建术语表，可上传学术或行业术语进行定制化训练，确保术语翻译一致性\n②AI写作助手可生成多种风格的文本变体，辅助润色和表达\n3.高精度翻译引擎\n①采用专有深度神经网络技术，具备上下文感知能力，自动修正歧义，译文流畅自然\n②Pro版不存储用户翻译内容，适合处理涉密或未发表学术文档", url: "https://www.deepl.com/zh/translator/l/en/en", tags: "翻译工具" },
{ category: "翻译工具", name: "Doclingo", brief: "Doclingo是一款面向PDF与Office文档的AI翻译工具，可永久免费、不限次数翻译文档。", functions: "1.多格式文档翻译\n①支持PDF、Word、Excel、PowerPoint、SRT字幕、ePub等格式直接翻译，无需转换\n②支持中文、英文、日文等80+目标语言互译\n2.高质量翻译与排版保留\n①采用AI翻译引擎，可切换至ChatGPT、Gemini等高级引擎\n②翻译过程保留表格、公式、特殊符号等排版格式\n③支持图文混排翻译及OCR文字识别，可自定义排除LOGO、公式、公章等区域\n3.可永久免费翻译文档", url: "https://doclingo.cn/zh", tags: "翻译工具,免费" },
{ category: "翻译工具", name: "知云文献翻译", brief: "知云文献翻译是一款自带PDF阅读器的划选翻译软件，专为科研人员设计。", functions: "1.文献阅读与集成翻译\n①内置PDF阅读器，可直接打开文献，无需在多个软件间切换\n②核心“划词翻译”功能：用鼠标选中单词、句子或段落，右侧立即显示译文\n③支持同时打开多篇文献及拆分视图对比阅读\n2.多引擎翻译与专业支持\n①内置百度、谷歌、DeepL及生物医学专用引擎等二十余种翻译引擎，可按需自由切换\n②涵盖生物医学专用引擎，对专业术语做了特别优化，适合医学、理工科领域\n③支持“输入翻译模式”，手动输入或粘贴文本进行翻译\n3.PDF智能批注与页面管理\n①提供高亮、附注、下划线、手写批注等多种注释工具\n②支持将同一篇文献拆分成多个视图，实现图文对照阅读\n③支持页面提取、拆分及从其他文档提取页面插入", url: "https://www.zhiyunwenxian.cn/", tags: "翻译工具" },
{ category: "翻译工具", name: "WordStalk", brief: "WordsTalk 翻译助手是一款面向论文翻译和文献阅读的极简网页翻译工具，支持多模型直连。", functions: "1.多模型一站式接入，提升翻译效率\n①WordsTalk整合GPT、Claude、Gemini、DeepSeek、Grok、Perplexity等多款主流大模型，用户无需注册任何模型账号（含国外模型）、无需在多平台间切换，单网页即可获取所有模型译文\n②系统自动推荐最优模型，同时支持自主选择及多模型译文对比，彻底解决国外模型注册难、切换繁的痛点\n2.学科场景智能识别，保障专业适配\n①支持论文内容粘贴后自动识别所属学科与使用场景，涵盖经济学、法学、医学、理学、工学、管理学等细分学科，以及学术投稿、商务沟通、邮件往来等场景\n②精准匹配专属翻译策略，确保译文符合专业语境与表达规范\n3.百万级术语库支撑，确保术语精准统一\n①WordsTalk内置80万+专业术语资源，覆盖顶刊术语、WHO标准术语、国标术语、微软专业术语等权威来源\n②可自动识别原文术语并精准匹配，从根源上规避术语错译、前后表述不一致问题，保障译文的专业性与严谨性\n4.个人术语库自定义，适配长期科研场景\n①系统可自动提取原文常用术语，一键保存至个人定制术语库，后续翻译自动调用\n②个人术语库随使用积累优化，越用越贴合个人科研需求，适合论文、课题、项目中需要长期保持术语一致的场景\n5.翻译润色同步进行，降低后续优化成本\n①WordsTalk在翻译时会同步优化句式、语气和逻辑衔接，让译文更正式、克制、自然，减少直译感和“AI味”，更接近论文或投稿初稿的表达\n6.句句对照与回译核查\n①支持原文与译文句句对照，便于随时核查关键句、专业术语及逻辑细节，避免核心信息遗漏\n②配备回译核查功能，通过反向翻译验证译文准确性，保障译文严谨可用", url: "https://wordstalk.net/?stat=yanweb", tags: "翻译工具" },
{ category: "翻译工具", name: "CNKI学术翻译", brief: "CNKI学术翻译是中国知网推出的专业学术翻译工具，依托知网海量中英双语学术文献语料库。", functions: "1.翻译助手\n①输入单词或短语（限500字符以内），系统展示来自专业词典的释义，并提供大量中英双语对照的真实学术论文例句，便于结合上下文判断最合适译法\n2.CNKI词典\n①专门用于查询专业术语、缩略语，支持中英文互查，结果精准", url: "https://dict.cnki.net/index", tags: "翻译工具" },
{ category: "翻译工具", name: "arXiv论文翻译", brief: "arXiv论文翻译是有道翻译提供的专项学术翻译入口，针对arXiv预印本平台论文进行优化。", functions: "1.多格式翻译\n①支持文本、文档、网页的在线即时翻译\n2.arXiv论文一键翻译\n①直接输入arXiv论文摘要页面链接、PDF下载链接或其他格式源链接，系统快速提供全文翻译结果，并支持双语对照和译文两种查看模式，方便科研人员快速阅读和理解预印本论文\n3.翻译网页\n①通过输入网址翻译整个网页", url: "https://fanyi.youdao.com/trans/#/home", tags: "翻译工具" },
{ category: "翻译工具", name: "讯飞同传", brief: "讯飞同传是科大讯飞推出的AI同声传译与字幕翻译平台，支持实时语音转写翻译。", functions: "1.实时同声传译\n①支持中英日韩俄法西等多语种实时语音识别与翻译\n②提供悬浮字幕条，可嵌入Zoom、腾讯会议等视频会议软件\n2.文件翻译与字幕生成\n①上传音频或视频文件，自动转写并生成双语字幕\n②支持PPT、PDF等文档内文字识别翻译\n3.专业术语定制\n①可上传行业术语表，提升翻译准确性\n②教育版、学术版针对科研场景有专项优化", url: "https://tongchuan.iflyrec.com/?channel=TJTC021", tags: "翻译工具,同声传译" },
{ category: "翻译工具", name: "Wordtune", brief: "Wordtune是一款AI驱动的写作与改写工具，专注于提升英文文本的表达质量和风格。", functions: "1.智能改写与润色\n①输入一句话，AI提供多种改写版本，调整句式结构、词汇选择和语气\n②支持正式、轻松、简短等风格切换，适合英文论文语言优化\n2.扩写与总结\n①输入关键词或短语，AI可扩写为完整句子或段落\n②对长段落可生成精简摘要\n3.浏览器插件集成\n①支持在Google Docs、邮件等网页中直接调用Wordtune进行润色\n②免费版提供基础改写，付费版解锁更多词数和无限制使用", url: "https://www.wordtune.com/", tags: "翻译工具" },
{ category: "翻译工具", name: "Quillbot", brief: "Quillbot是一款AI写作与改写助手，以强大的释义功能为核心，支持7种改写模式。", functions: "1.多模式释义改写\n①提供标准、流畅、创新、正式、缩短、扩充、学术共7种改写模式\n②一键生成同义替换版本，有效降低重复率，同时保留原意\n2.语法检查与摘要\n①实时检查语法、拼写和标点错误，给出修改建议\n②上传文本或文档，AI生成核心要点摘要\n3.浏览器插件与软件集成\n①支持网页、Chrome插件、Word桌面插件等多种使用方式\n②免费版限制125词/次，付费版无限字数并开放更多模式", url: "https://quillbot.com/", tags: "翻译工具" },
{ category: "翻译工具", name: "Doc2X", brief: "Doc2X是一款PDF科学文献识别与翻译工具，主打高精度OCR识别复杂排版。", functions: "1.高精度公式与版面识别\n①专门优化的OCR引擎，可精准识别多栏排版、数学公式、化学结构式、表格\n②输出为LaTeX、MathML或Word格式，保留原始排版结构\n2.全文翻译\n①识别后可进行全文中英互译，生成双语对照文档\n②支持批量处理多篇文献\n3.学术场景定制\n①针对数学、物理、计算机、生物等学科的论文版面进行训练\n②提供网页版和API接口，满足个人与机构使用需求", url: "https://doc2x.noedgeai.com", tags: "翻译工具" },
{ category: "翻译工具", name: "Smallpdf", brief: "Smallpdf是一款在线PDF处理工具包，提供压缩、转换、合并、分割、编辑、翻译等30余项功能。", functions: "1.PDF翻译\n①上传PDF文档，选择目标语言（中、英、日、韩、法、德等30+种），AI翻译后保留原排版\n②支持整篇翻译和摘要式翻译两种模式\n2.可与PDF处理流程集成\n①翻译前可先压缩、合并或转换格式，翻译后可直接导出为PDF或Word\n②支持多文档批量翻译\n3.免费与付费\n①免费用户每小时可处理1个任务，文档大小限制5MB\n②Pro版解锁无限制任务、更大文件和大文档翻译", url: "https://smallpdf.com/cn/translate-pdf", tags: "翻译工具" },

{ category: "代码工具", name: "Trae", brief: "Trae是一款面向开发者的AI智能编程助手，定位为“真正的AI工程师”，深度参与软件开发全流程。", functions: "1.代码生成与自动化\n①支持中文自然语言一键生成完整代码框架，实时预览前端效果并智能修复Bug\n②Builder模式将产品需求通过自然语言描述自动转化为可运行的完整代码\n2.SOLO模式\n①以AI为主导，自动规划并执行从需求理解、代码生成、测试到成果预览的全流程\n②支持多任务并行、上下文压缩和DiffView代码变更工具，支持超大项目上下文管理\n3.智能辅助\n①Tab-Cue模块提供代码补全、多行修改、修改点预测功能\n②支持DeepSeek-V3.1、V3.2等最新模型，全部功能完全免费", url: "https://www.trae.cn/?utm_source=advertising&utm_medium=yanweb_ug_cpa&utm_term=hw_trae_yanweb", tags: "代码工具" },
{ category: "代码工具", name: "InsCode", brief: "InsCode是CSDN、GitCode与华为云CodeArts IDE联合开发的AI跨平台集成开发环境。", functions: "1.代码生成与修改\n①通过嵌入式AI对话框，输入自然语言描述即可自动生成代码\n②支持全局代码生成/改写，可理解整个项目并生成/修改多个文件\n2.智能辅助功能\n①代码补全：在光标位置提供单行和多行代码补全建议，按Tab键接受\n②代码解释：快速解释选中代码或整个文件的逻辑\n③添加注释：自动为代码添加中文或英文注释\n④单元测试生成：自动生成测试用例\n⑤错误修复：分析代码并提供修改建议\n3.智能问答\n①支持编程问题的智能问答，涉及代码理解、Bug修复、优化建议等\n②关联多种知识库，快速理解项目需求并提供解决方案\n4.IDE特性\n①支持语法高亮、括号匹配、自动缩进、代码片段等基础功能\n②集成Git版本控制，支持与构建和脚本工具集成", url: "https://inscode.net/?u=csdn_2501_94703505&utm_source=refer_friend", tags: "代码工具" },
{ category: "代码工具", name: "CodeGeeX", brief: "CodeGeeX是由清华大学KEG实验室与智谱AI联合研发的智能编程助手，支持中英双语混合编程。", functions: "1.代码生成与补全\n①根据自然语言注释自动生成所需代码，可生成完整的方法级函数\n②提供实时代码补全功能，支持单行和多行补全\n③函数重构：快速梳理代码逻辑，降低出错风险\n2.代码理解与审查\n①自动添加行级注释，可选中文或英文\n②解释选中代码的用途、作用和逻辑流程，提供改进建议\n③代码审查（Code Review）：对代码变更进行详细检查并提供优化建议\n3.跨语言与智能功能\n①支持Java/Python/C++等20+种语言的代码互译\n②自然语言转SQL：根据表结构和查询需求生成SQL语句\n③自动修复Bug、生成Commit Message完成Git提交\n4.智能问答与扩展\n①通过侧边栏智能问答，快速解答技术和代码问题\n②Code Interpreter支持批量处理文件、数据分析和可视化\n③支持接入本地API服务，满足安全、隐私、高效编码需求", url: "https://codegeex.cn/", tags: "代码工具" },

];

// 初始化页面
let currentPage = 1;
let pageSize = 20;
let filteredData = [...toolsData];
let activeCategory = "all";
let searchKeyword = "";

// 颜色映射：根据分类分配urgency色条颜色
const categoryColors = {
    '中文文献检索': 'blue', '英文文献检索': 'green', '专利检索': 'orange',
    '文献阅读与管理': 'purple', '论文写作': 'pink', '论文查重查AI率': 'teal',
    '论文降重降AI率': 'teal', '数据查找': 'purple', '翻译工具': 'green',
    '科研绘图': 'orange', '代码开发': 'blue', '学术社交平台': 'pink',
    'AI工具': 'purple'
};

function getCategoryOrder() {
    try { return JSON.parse(localStorage.getItem('treasureCategoryOrder') || 'null'); } catch(e) { return null; }
}
function saveCategoryOrder(order) {
    localStorage.setItem('treasureCategoryOrder', JSON.stringify(order));
}

function buildCategoryMenu() {
    const defaultCategories = [...new Set(toolsData.map(t => t.category))];
    const savedOrder = getCategoryOrder();
    // 按保存的顺序排列，新增的分类放最后
    let orderedCategories;
    if (savedOrder && Array.isArray(savedOrder)) {
        orderedCategories = savedOrder.filter(c => defaultCategories.includes(c));
        // 把不在 savedOrder 里的新分类追加到末尾
        defaultCategories.forEach(c => { if (!orderedCategories.includes(c)) orderedCategories.push(c); });
    } else {
        orderedCategories = defaultCategories;
    }

    const menu = document.getElementById('categoryMenu');
    const counts = {};
    defaultCategories.forEach(c => { counts[c] = toolsData.filter(t => t.category === c).length; });
    const totalCount = toolsData.length;

    let html = `<div class="f-opt active" data-category="all"><div class="f-opt-dot"></div>全部分类 <span style="margin-left:auto;font-size:11px;color:var(--text-muted);">${totalCount}</span></div>`;
    orderedCategories.forEach((cat, idx) => {
        html += `<div class="f-opt" data-category="${escapeHtml(cat)}" draggable="true" data-idx="${idx}"><div class="f-opt-dot"></div>${escapeHtml(cat)} <span class="f-opt-handle" title="拖拽排序">⠿</span><span style="font-size:11px;color:var(--text-muted);margin-left:4px;">${counts[cat]}</span></div>`;
    });
    menu.innerHTML = html;

    // 绑定点击事件
    menu.querySelectorAll('.f-opt').forEach(item => {
        item.addEventListener('click', function(e) {
            // 如果点在拖拽手柄上，不触发筛选
            if (e.target.closest('.f-opt-handle')) return;
            activeCategory = item.getAttribute('data-category');
            menu.querySelectorAll('.f-opt').forEach(m => m.classList.remove('active'));
            item.classList.add('active');
            updateFilter();
        });
    });

    // ── 拖拽排序 ──
    let dragSrc = null;
    menu.querySelectorAll('.f-opt[draggable]').forEach(item => {
        item.addEventListener('dragstart', function(e) {
            dragSrc = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', this.getAttribute('data-idx'));
        });
        item.addEventListener('dragend', function(e) {
            this.classList.remove('dragging');
            menu.querySelectorAll('.f-opt').forEach(m => m.classList.remove('drag-over'));
            dragSrc = null;
        });
        item.addEventListener('dragover', function(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            if (this !== dragSrc) this.classList.add('drag-over');
        });
        item.addEventListener('dragleave', function(e) {
            this.classList.remove('drag-over');
        });
        item.addEventListener('drop', function(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            if (this === dragSrc) return;
            const fromIdx = parseInt(dragSrc.getAttribute('data-idx'));
            const toIdx = parseInt(this.getAttribute('data-idx'));
            const moved = orderedCategories.splice(fromIdx, 1)[0];
            orderedCategories.splice(toIdx, 0, moved);
            saveCategoryOrder(orderedCategories);
            // 保持当前选中状态
            const prevActive = activeCategory;
            buildCategoryMenu();
            if (prevActive !== 'all') {
                const el = menu.querySelector('[data-category="' + CSS.escape(prevActive) + '"]');
                if (el) { el.classList.add('active'); activeCategory = prevActive; }
            }
        });
    });

    // 更新统计
    document.getElementById('statTotal').textContent = totalCount;
    document.getElementById('statCats').textContent = defaultCategories.length;
}

function updateFilter() {
    let result = toolsData;
    if(activeCategory !== "all") result = result.filter(t => t.category === activeCategory);
    if(searchKeyword.trim() !== "") {
        const kw = searchKeyword.toLowerCase();
        result = result.filter(t => t.name.toLowerCase().includes(kw) || t.brief.toLowerCase().includes(kw) || (t.tags && t.tags.toLowerCase().includes(kw)));
    }
    filteredData = result;
    currentPage = 1;
    render();
}

function render() {
    const start = (currentPage-1)*pageSize;
    const pageData = filteredData.slice(start, start+pageSize);
    const container = document.getElementById("toolsContainer");
    const emptyDiv = document.getElementById("emptyMessage");
    if(pageData.length === 0) {
        container.innerHTML = "";
        emptyDiv.style.display = "block";
        document.getElementById("pagination").innerHTML = "";
        return;
    }
    emptyDiv.style.display = "none";
    container.innerHTML = pageData.map((tool, idx) => {
        const colorCls = categoryColors[tool.category] || ['blue','green','orange','purple','teal','pink'][idx % 6];
        return `
        <div class="tool-card">
            <div class="urgency-bar urgency-${colorCls}"></div>
            <div class="card-header">
                <div class="card-header-left">
                    <div class="card-badges"><span class="badge">${escapeHtml(tool.category)}</span></div>
                    <div class="tool-name">${escapeHtml(tool.name)}</div>
                    <div class="tool-brief">${escapeHtml(tool.brief.length>120?tool.brief.substring(0,120)+'...':tool.brief)}</div>
                </div>
                <button class="fav-btn" id="fav-${idx}" data-name="${escapeHtml(tool.name)}" onclick="toggleFav('${escapeHtml(tool.name)}', this)"></button>
            </div>
            <div class="card-body">
                <div class="tool-functions">${formatText(tool.functions)}</div>
                <div class="tool-tags">${(tool.tags||"").split(',').map(t=>`<span class="tag">${t.trim()}</span>`).join('')}</div>
                <div class="tool-link"><a href="${escapeHtml(tool.url)}" target="_blank">🔗 ${tool.url.length>40?tool.url.substring(0,40)+'...':tool.url}</a></div>
            </div>
            <div class="card-footer">
                <button class="btn-detail" data-name="${escapeHtml(tool.name)}" data-brief="${escapeHtml(tool.brief)}" data-func="${escapeHtml(tool.functions)}" data-url="${escapeHtml(tool.url)}" data-cat="${escapeHtml(tool.category)}" data-tags="${escapeHtml(tool.tags||'')}">查看详情</button>
            </div>
        </div>
        `;
    }).join('');
    document.querySelectorAll('.btn-detail').forEach(btn => {
        btn.addEventListener('click', () => {
            document.getElementById('modalTitle').innerText = btn.getAttribute('data-name');
            document.getElementById('modalCategory').innerText = btn.getAttribute('data-cat');
            document.getElementById('modalBrief').innerText = btn.getAttribute('data-brief');
            document.getElementById('modalFunctions').innerHTML = formatText(btn.getAttribute('data-func'));
            document.getElementById('modalTags').innerText = btn.getAttribute('data-tags');
            const url = btn.getAttribute('data-url');
            document.getElementById('modalUrl').href = url;
            document.getElementById('modalUrl').innerText = url;
            document.getElementById('detailModal').classList.add('active');
        });
    });
    renderPagination();
    updateFavBtns();
}

function renderPagination() {
    const totalPages = Math.ceil(filteredData.length / pageSize);
    const paginationDiv = document.getElementById("pagination");
    if(totalPages <= 1) { paginationDiv.innerHTML = ""; return; }
    let html = `<button class="page-btn" data-page="${currentPage-1}" ${currentPage===1?'disabled':''}>上一页</button>`;
    for(let i=1;i<=totalPages && i<=7;i++) {
        html += `<button class="page-btn ${i===currentPage?'active':''}" data-page="${i}">${i}</button>`;
    }
    html += `<button class="page-btn" data-page="${currentPage+1}" ${currentPage===totalPages?'disabled':''}>下一页</button>`;
    paginationDiv.innerHTML = html;
    document.querySelectorAll('.page-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const page = parseInt(btn.getAttribute('data-page'));
            if(!isNaN(page) && page>=1 && page<=totalPages) {
                currentPage = page;
                render();
                document.getElementById('toolsContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        });
    });
}

function formatText(text) {
    if (!text) return '';
    let h = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    // 处理代码块（用反引号包裹的内容）
    h = h.replace(/`([^`]+)`/g, '<span class="code">$1</span>');
    // 处理高亮文本（用**包裹的内容）
    h = h.replace(/\*\*([^*]+)\*\*/g, '<span class="highlight">$1</span>');

    // 逐行处理
    var lines = h.split('\n');
    lines = lines.map(function(line) {
        if (!line) return '';

        // 一级标题：以 "数字." 开头，标题到冒号或行末为止
        // 如 "1.文献检索"、"2. 查重查AI率（大雅相似度分析）"、"1.资源规模：外文文献..."
        var m = line.match(/^(\d+\.\s*[^：:\n]+)([：:])?(.*)$/);
        if (m) {
            var title = '<strong>' + m[1] + '</strong>';
            var rest = m[3] ? '<span class="func-text">' + m[3] + '</span>' : '';
            return title + rest;
        }

        // 二级子项：带圈数字开头
        // 如 "①一框式快速检索..."、"①Compound 数据库（化合物）"
        if (/^[①-⑳]/.test(line)) {
            return '<span class="func-sub-item">' + line + '</span>';
        }

        // 普通段落
        return '<span class="func-text">' + line + '</span>';
    });

    return lines.join('<br>');
}
function resetCategory() { activeCategory = 'all'; buildCategoryMenu(); updateFilter(); }
function escapeHtml(str) { if (!str) return ''; const div = document.createElement('div'); div.appendChild(document.createTextNode(str)); return div.innerHTML; }
function closeModal() { document.getElementById('detailModal').classList.remove('active'); }

let favs = JSON.parse(localStorage.getItem('treasureFavs') || '[]');

// ── 统一收藏辅助函数 ──
function addToResearchFavs(item) {
    const all = JSON.parse(localStorage.getItem('research_favorites') || '[]');
    if (!all.find(f => f.id === item.id)) {
        all.push(item);
        localStorage.setItem('research_favorites', JSON.stringify(all));
    }
}
function removeFromResearchFavs(id) {
    const all = JSON.parse(localStorage.getItem('research_favorites') || '[]');
    localStorage.setItem('research_favorites', JSON.stringify(all.filter(f => f.id !== id)));
}

function toggleFav(name, btn) {
    const idx = favs.indexOf(name);
    const tool = toolsData.find(t => t.name === name);
    if (idx > -1) {
        favs.splice(idx, 1);
        btn.classList.remove('on');
        removeFromResearchFavs('treasure-' + name);
        showToast('已取消收藏');
    } else {
        favs.push(name);
        btn.classList.add('on');
        if (tool) {
            addToResearchFavs({
                id: 'treasure-' + name,
                category: 'treasure',
                title: tool.name,
                description: tool.brief ? tool.brief.substring(0, 100) : '',
                meta: { cat: tool.category, url: tool.url },
                tags: tool.tags ? tool.tags.split(',').map(t => t.trim()) : [],
                favoritedAt: new Date().toISOString().split('T')[0]
            });
        }
        showToast('已收藏');
    }
    localStorage.setItem('treasureFavs', JSON.stringify(favs));
}
function updateFavBtns() {
    document.querySelectorAll('.fav-btn').forEach(btn => {
        const name = btn.getAttribute('data-name');
        if (name && favs.includes(name)) {
            btn.classList.add('on');
        } else {
            btn.classList.remove('on');
        }
    });
}
function showToast(msg) { 
    const t = document.getElementById('toast'); 
    t.textContent = msg; 
    t.classList.add('show'); 
    setTimeout(() => t.classList.remove('show'), 1500); 
}

document.getElementById('detailModal').addEventListener('click', function(e) { if(e.target === this) closeModal(); });
document.getElementById('pageSizeSelect').addEventListener('change', (e) => { pageSize = parseInt(e.target.value); updateFilter(); });

buildCategoryMenu();
updateFilter();

// ── 迁移旧收藏到统一存储 ──
(function migrateTreasureFavs() {
    var existing = JSON.parse(localStorage.getItem('research_favorites') || '[]');
    var hasNew = false;
    favs.forEach(function(name) {
        var key = 'treasure-' + name;
        if (existing.find(function(f) { return f.id === key; })) return;
        var tool = toolsData.find(function(t) { return t.name === name; });
        if (tool) {
            existing.push({
                id: key,
                category: 'treasure',
                title: tool.name,
                description: tool.brief ? tool.brief.substring(0, 100) : '',
                meta: { cat: tool.category, url: tool.url },
                tags: tool.tags ? tool.tags.split(',').map(function(t) { return t.trim(); }) : [],
                favoritedAt: new Date().toISOString().split('T')[0]
            });
            hasNew = true;
        }
    });
    if (hasNew) { localStorage.setItem('research_favorites', JSON.stringify(existing)); }
})();
